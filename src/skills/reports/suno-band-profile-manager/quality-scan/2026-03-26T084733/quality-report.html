 "file": "SKILL.md", "line": 170, "title": "Bare skill-internal path without ./ prefix — use ./references/, ./scripts/, ./assets/ to distinguish from {project-root} paths", "description": "- `validate-profile.py` — Validates band profile YAML against schema. Supports `--derive-filename \"Band Name\"` to get ke", "action": "", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "path-standards-019", "scanner": "path-standards", "section": "quality", "type": "issue", "severity": "high", "rank": 1, "category": "bare-internal-path", "file": "SKILL.md", "line": 171, "title": "Bare skill-internal path without ./ prefix — use ./references/, ./scripts/, ./assets/ to distinguish from {project-root} paths", "description": "- `list-profiles.py` — Scans `docs/band-profiles/` and returns profile summaries. Supports `--check \"profile-name\"` to v", "action": "", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "path-standards-020", "scanner": "path-standards", "section": "quality", "type": "issue", "severity": "high", "rank": 1, "category": "bare-internal-path", "file": "SKILL.md", "line": 172, "title": "Bare skill-internal path without ./ prefix — use ./references/, ./scripts/, ./assets/ to distinguish from {project-root} paths", "description": "- `tier-features.py` — Returns available/unavailable Suno features for a given tier. Run `scripts/tier-features.py --hel", "action": "", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "path-standards-021", "scanner": "path-standards", "section": "quality", "type": "issue", "severity": "high", "rank": 1, "category": "bare-internal-path", "file": "SKILL.md", "line": 173, "title": "Bare skill-internal path without ./ prefix — use ./references/, ./scripts/, ./assets/ to distinguish from {project-root} paths", "description": "- `diff-profiles.py` — Compares two profile YAML files and returns structured JSON diff. Run `scripts/diff-profiles.py -", "action": "", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "path-standards-022", "scanner": "path-standards", "section": "quality", "type": "issue", "severity": "high", "rank": 1, "category": "bare-internal-path", "file": "references/tier-features.md", "line": 5, "title": "Bare skill-internal path without ./ prefix — use ./references/, ./scripts/, ./assets/ to distinguish from {project-root} paths", "description": "**Note:** The `scripts/tier-features.py` script is the authoritative source for this data. This reference file is provid", "action": "", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "scripts-000", "scanner": "scripts", "section": "scripts", "type": "issue", "severity": "high", "rank": 1, "category": "lint", "file": "scripts/list-profiles.py", "line": 19, "title": "[F401] `os` imported but unused", "description": "", "action": "Remove unused import: `os`", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-001", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "high", "rank": 1, "category": "sections", "file": "SKILL.md", "line": 1, "title": "Missing ## Identity section", "description": "The SKILL.md has no dedicated Identity section. The Overview contains identity-like content ('Act as a music producer's assistant who understands sonic identity, vocal direction, and writing voice'), but this is not in the canonical location. Without a dedicated Identity section, the persona priming is weaker and less explicit.", "action": "Add a ## Identity section after Overview with a clear one-sentence persona statement, e.g., 'You are a music producer's assistant with deep knowledge of sonic identity, vocal direction, and songwriting voice — you help users define and evolve their band's sonic DNA.'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-002", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "high", "rank": 1, "category": "sections", "file": "SKILL.md", "line": 1, "title": "Missing ## Communication Style section", "description": "No Communication Style section exists. This skill involves extensive conversational discovery with users who range from experienced musicians to complete beginners. Without style guidance and concrete examples, the agent's tone will be inconsistent across interactions.", "action": "Add a ## Communication Style section with 3-5 concrete examples showing how to adapt language for musician vs. beginner users. E.g., 'Instead of: What dBFS range do you prefer? Say: How loud and punchy should it feel?'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-003", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "high", "rank": 1, "category": "sections", "file": "SKILL.md", "line": 1, "title": "Missing ## Principles section", "description": "No Principles section exists. This skill makes many judgment calls (how much to push for detail, when to accept vague answers, how to handle reference tracks for unknown artists). Without guiding principles, behavior in ambiguous situations will be inconsistent.", "action": "Add a ## Principles section with domain-specific decision frameworks. E.g., 'Meet users at their vocabulary level — never assume music theory knowledge', 'Prefer specific sensory descriptors over genre labels', 'Always verify sonic claims via search before storing them in profiles'.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-005", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "high", "rank": 1, "category": "progression", "file": "README.md", "line": 64, "title": "No progression condition keywords found in README.md", "description": "The README.md prompt has no progression conditions (e.g., 'proceed when', 'move to next when'). If this is a multi-stage prompt, missing progression logic means the agent cannot determine when to advance.", "action": "Add progression conditions to README.md if it represents a staged workflow, or restructure it as a single-pass reference if progression is not applicable.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-005", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "medium", "rank": 2, "category": "gap", "file": "SKILL.md", "line": 69, "title": "Reference track research mandate may fail silently without web search", "description": "The Create Profile flow has a 'research mandate' requiring web search to verify artist/song sonic characteristics, with a fallback to asking the user. However, the skill has no way to detect whether a search tool is available before attempting it. If the LLM tries and fails, the user experience degrades without explanation. This is a gap in the user journey for environments without web search.", "action": "Add an explicit check or note in the flow: 'If web search is unavailable, tell the user: I can not verify reference tracks right now -- describe what you love about these artists and I will decompose from your description.' Make the fallback feel intentional, not like a failure.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-006", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "medium", "rank": 2, "category": "gap", "file": "SKILL.md", "line": null, "title": "No export or share capability for profiles", "description": "Users can create, edit, and manage profiles, but there is no operation for exporting a profile in a portable format (e.g., shareable YAML snippet, JSON export for backup, or formatted summary for sharing with collaborators). The profiles live as YAML files which are technically portable, but a user who wants to share their band's sonic identity with a collaborator has no explicit workflow for it.", "action": "Consider adding an 'Export' operation that produces a clean, shareable version of a profile -- either as formatted text for pasting into a message, or as a standalone YAML file with a summary header. This is low priority since the YAML is already human-readable, but an explicit export pathway would complete the user journey.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "enhancement-opportunities-004", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "journey-friction", "file": "SKILL.md", "line": null, "title": "Expert user forced through 12-step conversational discovery even when they already know their sound", "description": "A musician who has been producing for years and knows exactly what they want — 'dark synthwave, male baritone, v5 Pro, experimental creativity, 70 weirdness' — is forced through a step-by-step conversational interview. The headless mode exists but requires YAML formatting knowledge. There is no middle ground for the expert interactive user who wants to say 'here is everything, build it' in natural language.", "action": "Add a 'fast-track create' detection at the start of the Create Profile flow: 'If the user's initial message contains enough detail to populate most required fields (genre, mood, vocal direction, model/tier), skip the step-by-step interview. Assemble what you can from their input, ask only about genuinely missing required fields, and go straight to review.' This respects expert users' time while still ensuring completeness.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-005", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "edge-case", "file": "SKILL.md", "line": null, "title": "Edit operation with natural language like 'make it more aggressive' has no guardrails against cascading unintended changes", "description": "The Edit operation accepts natural language changes and applies them to fields. 'Make it more aggressive' could touch genre, mood, vocal energy, vocal delivery, style_baseline, exclusion_defaults, and creativity_default all at once. The diff tool shows what changed, but a user who meant 'just the vocal delivery' might not catch that the agent also rewrote their carefully crafted style baseline. The broader the natural language instruction, the higher the risk of unwanted side effects.", "action": "Add a scope clarification step for broad natural language edits: 'When a user's edit request could plausibly affect 3+ fields, ask which dimensions they want changed before applying: Do you want the aggression across the whole sound, or specifically in the vocals / the production / the style prompt?' For narrow requests, apply directly.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-006", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "assumption-risk", "file": "SKILL.md", "line": null, "title": "Skill assumes band profiles map 1:1 to musical projects, but users may want context-dependent profiles", "description": "The schema and workflow assume each profile is a standalone band identity. But real musicians often want variations: 'midnight-echoes for live acoustic sets' vs 'midnight-echoes for full production' vs 'midnight-echoes for singles vs albums.' The Duplicate operation exists for versioning, but it creates fully independent profiles with no relationship tracking. A user with midnight-echoes-v1 through midnight-echoes-v5 has no way to see the evolution or understand which is current.", "action": "Consider adding an optional 'parent' or 'lineage' field to the profile schema, and have list-profiles.py group related profiles by lineage. When duplicating, auto-populate the lineage field. This turns isolated copies into a visible evolution chain. Low-effort schema addition with meaningful organizational value for prolific users.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-007", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "experience-gap", "file": "SKILL.md", "line": null, "title": "Success amnesia after profile creation — user has a YAML file but no clear next step", "description": "After creating or editing a profile, the post-operation flow asks 'Anything else you'd like to do with your profiles?' This keeps the user in profile-management land. But the real next step for most users is to USE the profile — build a style prompt, write lyrics, generate a song. The skill mentions that Style Prompt Builder and Lyric Transformer consume profiles, but never bridges the user to those workflows after a successful create/edit.", "action": "After saving a new or significantly edited profile, add a contextual suggestion: 'Your profile is saved. Ready to put it to work? You can invoke the Style Prompt Builder to create your first style prompt from this profile, or the Lyric Transformer to write lyrics in your voice.' This transforms the end of one workflow into the start of the next.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-008", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "facilitative-pattern", "file": "SKILL.md", "line": null, "title": "No soft-gate elicitation — discovery steps use 'Anything else to add, or move on?' but not at natural creative boundaries", "description": "The skill uses a soft gate ('Anything else to add, or move on?') between sections, which is good. But the gate is applied uniformly. Some steps are natural creative expansion points (reference tracks, vocal direction, exclusions) where users often have more to say if gently prompted, while others (model/tier, language) are factual and rarely need elaboration. A uniform gate is better than none, but tailored gates draw out richer input at creative junctions.", "action": "At the three richest creative junctions (reference tracks, vocal direction, style baseline review), replace the generic gate with a more evocative prompt. For reference tracks: 'Any other artists or songs that capture even a piece of what you are going for — even if they seem contradictory?' For vocal direction: 'Is there a specific vocal moment in a song that nails what you hear in your head?' These prompts draw out specificity that generic gates miss.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-009", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "autonomous-potential", "file": "SKILL.md", "line": null, "title": "Headless Analyze Writer Voice is not supported but could be", "description": "The headless mode covers CRUD operations comprehensively, but writer voice analysis — one of the most valuable capabilities — has no headless path. An automator or pipeline that wants to batch-analyze voice samples across multiple profiles must invoke the skill interactively. Yet the analysis is algorithmic: provide samples, extract patterns, store in profile. This is a natural fit for headless execution.", "action": "Add a --headless:analyze-voice <profile-name> mode that accepts file paths or inline text samples as input, runs the analysis, and stores results in the specified profile. Return JSON with the extracted voice dimensions and sample quotes. This enables batch voice analysis across profiles and lets other skills invoke voice analysis programmatically.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-010", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "edge-case", "file": "SKILL.md", "line": null, "title": "Confused user who invokes this skill wanting to 'make music' gets redirected but no warm handoff", "description": "The operation detection table handles 'wrong skill' invocations by explaining this skill manages profiles and suggesting the Band Manager agent or Style Prompt Builder. But a confused first-timer who excitedly said 'let us make some music!' gets a corrective explanation instead of excitement-matching guidance. The redirect is informational but not emotionally attuned — it deflates rather than redirects the energy.", "action": "Reframe the wrong-skill handling to match the user's energy: 'Love the energy! To make music with Suno, we start by defining your band's sound — think of it as creating the DNA for your musical project. Want to set that up now? It takes about 5 minutes and then you will be ready to generate.' This converts a dead-end redirect into an on-ramp.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-011", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "delight-opportunity", "file": "SKILL.md", "line": null, "title": "Band Identity Card is generated but never updated or leveraged after initial creation", "description": "The Create Profile flow generates a 'Band Identity Card' — a 3-4 sentence natural language summary — but it only appears once, at creation. After edits, the card is never regenerated. After loading, the profile is displayed as structured sections, not as the evocative identity card. The card is the most human-readable, emotionally resonant representation of the profile, and it is essentially single-use.", "action": "Regenerate the Band Identity Card whenever the profile is loaded or significantly edited. Store it as a field in the profile YAML (e.g., identity_card:) so it persists. Display it as the header when loading a profile. This gives users an immediate, visceral reminder of who their band is, not just a data dump.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "execution-efficiency-002", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "medium", "rank": 2, "category": "resource-loading", "file": "SKILL.md", "line": 62, "title": "Create Profile loads profile-schema.md but Edit Profile is the only operation with explicit batching guidance", "description": "Create Profile says 'Load references/profile-schema.md for the full schema definition' but does not specify batching it with any other reads. Health Check similarly reads a profile but does not specify batching the profile read with the schema load. Only Edit Profile has explicit parallel-batch guidance.", "action": "Add parallel-batch instructions to Create Profile (batch profile-schema.md with any user-provided file reads) and Health Check (batch profile read with schema load if both are needed).", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "script-opportunities-000", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "postprocessing", "file": "SKILL.md", "line": 86, "title": "LLM assembles profile YAML then validates — assembly could be scripted from structured fields", "description": "Determinism confidence: moderate. Estimated token savings: 300-500 per invocation. Implementation complexity: moderate. Language: python. Could be prepass: no. Feeds scanner: n/a. Reusable across skills: no. Help pattern savings: ~100 tokens. After the conversational discovery, the LLM assembles a full YAML file from the collected fields. A script could take a JSON dict of field values and produce a valid, correctly-formatted YAML profile file with comments, proper field ordering, and correct indentation — eliminating YAML formatting variance.", "action": "Create an assemble-profile.py script that accepts a JSON dict of profile fields (via stdin or file), applies profile-schema.md field ordering and YAML comment templates, and outputs a correctly-formatted YAML file. The LLM collects values conversationally; the script handles serialization.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-001", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "comparison", "file": "SKILL.md", "line": 103, "title": "LLM performs tier drift detection by comparing profile tier against user config", "description": "Determinism confidence: certain. Estimated token savings: 150-200 per invocation. Implementation complexity: trivial. Language: python. Could be prepass: yes. Feeds scanner: n/a. Reusable across skills: yes. Help pattern savings: ~50 tokens. Load Profile instructs the LLM to compare the profile's stored tier against the user's current tier and flag mismatches. This is a simple string comparison that a script could do deterministically.", "action": "Add a --check-tier-drift flag to list-profiles.py (or validate-profile.py) that accepts the current user tier and compares it against the profile's stored tier, returning structured JSON with drift details. The LLM only needs to present the result conversationally.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-002", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "preprocessing", "file": "SKILL.md", "line": 149, "title": "Health Check runs validate-profile.py but then LLM re-checks quality dimensions that are partially deterministic", "description": "Determinism confidence: high. Estimated token savings: 200-400 per invocation. Implementation complexity: moderate. Language: python. Could be prepass: yes. Feeds scanner: n/a. Reusable across skills: no. Help pattern savings: ~80 tokens. Health Check step 2 has the LLM assess: whether style_baseline is vague, whether writer_voice is populated, whether reference_tracks exist, whether exclusion_defaults are set, whether vocal direction is generic, whether generation_history has entries. Most of these are simple emptiness/existence checks. Only 'is it vague?' and 'is it generic?' require LLM judgment.", "action": "Create a health-check.py script that runs validate-profile.py plus additional completeness checks: writer_voice population (any non-empty fields), reference_tracks count, exclusion_defaults count, generation_history entry count, style_baseline character length and word count, vocal field word counts. Output a structured JSON completeness report with flags like 'writer_voice_populated: false', 'reference_tracks_count: 0', 'style_baseline_word_count: 3'. The LLM then only needs to assess the qualitative dimensions (vagueness, specificity) from the compact metrics.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "structure-000", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "frontmatter", "file": "SKILL.md", "line": 1, "title": "Name does not follow bmad-{code}-agent-{name} or bmad-agent-{name} pattern", "description": "Name \"bmad-suno-band-profile-manager\" does not follow the expected naming convention. This may affect discoverability and consistency with other agents in the ecosystem.", "action": "Consider renaming to follow bmad-{code}-agent-{name} pattern, e.g., bmad-suno-agent-band-profile-manager, if this is intended to be an agent-style skill.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-004", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "config-header", "file": "README.md", "line": 1, "title": "No config header with language variables found in README.md", "description": "The README.md prompt file lacks a config header declaring language variables. If this prompt is rendered with variable substitution, missing declarations could cause issues.", "action": "Add a config header to README.md if it uses language variables, or verify that it does not need one.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-007", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "gap", "file": "SKILL.md", "line": null, "title": "No import capability for profiles from external sources", "description": "Users can create profiles conversationally or via headless YAML, but there is no explicit 'import' operation for bringing in a profile someone else shared or from a backup. The headless:create partially covers this, but a dedicated import flow could validate, adapt tier settings, and resolve conflicts with existing profiles.", "action": "A dedicated 'Import' operation would complete the portability story. It could accept YAML, validate it, check for name conflicts, and optionally adapt tier/model settings to the user's current plan. Low priority since headless:create covers the mechanical need.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-010", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "misalignment", "file": "SKILL.md", "line": 56, "title": "Wrong-skill redirect mentions 'Band Manager agent' without clear invocation path", "description": "When a user asks to 'make a song' or 'create music', the skill says to suggest invoking the 'Band Manager agent or Style Prompt Builder.' But the user may not know how to invoke those. The redirect is helpful in intent but incomplete in execution -- it identifies the right destination without providing the route.", "action": "Include a concrete invocation example in the redirect guidance, e.g., 'Suggest: You can ask Mac to help with that -- say create a song with [band name].' This turns a dead end into a warm handoff.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-012", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "redundancy", "file": "bmad-manifest.json", "line": null, "title": "Capability decomposition in manifest could be consolidated", "description": "The bmad-manifest.json lists three capabilities: manage-profiles, analyze-writer-voice, and health-check. From a user perspective, analyze-writer-voice and health-check are both operations within the profile manager, not separate capabilities. The manifest correctly mirrors the SKILL.md operation table, but from a cohesion standpoint, these are sub-operations of profile management, not independent capabilities.", "action": "This is a minor structural observation, not a real problem. If the manifest schema supports sub-capabilities or if the orchestrating agent benefits from granular capability declarations, the current structure is fine. If not, consider consolidating into a single 'manage-profiles' capability with richer trigger phrases covering voice analysis and health checks.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "enhancement-opportunities-012", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "delight-opportunity", "file": "SKILL.md", "line": null, "title": "No profile comparison view for users choosing between profiles or evaluating evolution", "description": "The diff-profiles.py script compares two profiles structurally (used during edits), but there is no user-facing 'compare two profiles side by side' operation. A user with midnight-echoes-v1 and midnight-echoes-v2 cannot easily see how their sound evolved, or choose between two profiles for a session. The diff tool exists but is only invoked during edit confirmation.", "action": "Add a 'Compare' operation to the operation detection table that lets users compare any two profiles side-by-side using diff-profiles.py. Present the diff in a human-readable format highlighting sonic differences: 'v2 is heavier on the electronic textures, shifted from restrained to building energy, and added weirdness at 65.' This leverages an existing script for a new user-facing capability.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-013", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "journey-friction", "file": "SKILL.md", "line": null, "title": "Delete operation has no undo or soft-delete, and the confirmation is a single yes/no gate", "description": "Delete permanently removes a YAML file with a single confirmation. For a profile that took 20 minutes to create through guided discovery, this is a high-stakes irreversible action behind a thin gate. There is no archive, no trash, no 'deleted profiles' folder, and no way to recover.", "action": "Consider moving deleted profiles to a docs/band-profiles/.archive/ directory instead of permanent deletion. The confirmation message could say: 'This will archive the profile. You can recover it later if needed.' For headless delete, the same archive behavior would apply. This is a small file-system change that prevents grief.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-014", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "assumption-risk", "file": "SKILL.md", "line": null, "title": "Skill assumes user knows their Suno tier and model preference during profile creation", "description": "Steps 6 asks about model and tier, running tier-features.py to show options. But a first-timer may not know their tier (they signed up last week and are not sure which plan they chose) or may not understand the model differences. The tier-features script shows what is available, but the user must already know their tier to invoke it correctly.", "action": "Add a detection helper: 'Not sure which tier you are on? Check your Suno account settings at suno.com/account, or tell me what you can see in the Suno interface — I can figure out your tier from the features available to you.' Provide a quick diagnostic: 'Can you see the Weirdness slider? Do you have a Studio tab?' Two questions identify the tier without requiring the user to know the plan name.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-015", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "edge-case", "file": "SKILL.md", "line": null, "title": "Validation script dependency means profile operations fail opaquely if Python or scripts are missing", "description": "Every write operation depends on validate-profile.py, and list/load depend on list-profiles.py. If the scripts directory is missing, Python is not installed, or the scripts have import errors, the skill has no fallback. The hostile-environment user (running in a minimal container, broken Python install, or a context where bash execution is restricted) hits a wall.", "action": "Add a graceful degradation instruction: 'If a script fails to execute, perform basic validation inline (check required fields are present and non-empty, check tier is valid, check style_baseline length) and warn the user: Full schema validation was unavailable — I performed basic checks but recommend running validate-profile.py when possible.' This keeps the workflow moving when the environment is imperfect.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "execution-efficiency-003", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "low", "rank": 3, "category": "parallelization", "file": "SKILL.md", "line": 149, "title": "Health Check could batch validate-profile.py and profile reading", "description": "Health Check runs validate-profile.py for structural validity, then assesses quality dimensions which requires reading the profile content. The script run and the profile file read are independent and could execute in a single parallel batch, saving one round-trip.", "action": "Add instruction: 'Read the profile YAML and run scripts/validate-profile.py in a single parallel batch, then assess quality dimensions from the loaded content.'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "execution-efficiency-004", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "low", "rank": 3, "category": "parallelization", "file": "SKILL.md", "line": 99, "title": "Load Profile sequential check-then-read could be a single read with error handling", "description": "Load Profile first runs list-profiles.py --check to verify existence, then reads the profile file. Since a failed file read produces a clear error, the existence check is redundant when the profile name is unambiguous. This adds one unnecessary round-trip for the common case.", "action": "Consider reading the profile directly and falling back to list-profiles.py only when the read fails or the name is ambiguous. Alternatively, batch the check and read in parallel.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "execution-efficiency-005", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "low", "rank": 3, "category": "batching", "file": "SKILL.md", "line": 113, "title": "Edit Profile post-edit validation and diff could be batched", "description": "After editing, the skill runs validate-profile.py then diff-profiles.py sequentially. If the diff compares old (pre-edit snapshot) vs new (post-edit), both scripts could run in parallel since diff does not depend on validation passing.", "action": "Add instruction: 'Run validate-profile.py and diff-profiles.py in a single parallel batch after applying edits, then present combined results.'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-003", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "anti-pattern", "file": "SKILL.md", "line": 69, "title": "Dense multi-concern instruction in reference tracks discovery step", "description": "Line 69 packs three distinct concerns into a single numbered step: (1) prompting for reference tracks, (2) sonic decomposition instructions, (3) a research mandate with fallback behavior. At ~80 words, this is the densest single instruction in the file. While all content is load-bearing, the agent may lose the research mandate buried mid-paragraph.", "action": "Consider breaking into sub-bullets: one for the prompt and decomposition, one for the research mandate with its fallback. This improves scannability without adding tokens.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-004", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "anti-pattern", "file": "SKILL.md", "line": 75, "title": "Exclusion defaults step mixes user-facing guidance with downstream system behavior", "description": "Step 9 (exclusion defaults) combines the discovery question, a technical explanation of Suno's negative prompt limitation, how the Style Prompt Builder handles it, and a scripted user message. This is load-bearing context but the user-facing message template embedded in the instruction adds visual density.", "action": "Minor: separate the user-facing message into a quoted block or sub-bullet for clarity. The content itself is appropriate.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "script-opportunities-003", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "transformation", "file": "SKILL.md", "line": 108, "title": "LLM applies natural language edits and must re-serialize modified profile YAML", "description": "Determinism confidence: moderate. Estimated token savings: 100-200 per invocation. Implementation complexity: moderate. Language: python. Could be prepass: no. Feeds scanner: n/a. Reusable across skills: no. Help pattern savings: ~50 tokens. After Edit Profile, the LLM must serialize the modified profile back to YAML. The interpretation of natural language changes requires LLM judgment, but the re-serialization to YAML is deterministic. Combined with the assemble-profile.py opportunity above, this would also benefit from a script that writes YAML consistently.", "action": "Same assemble-profile.py script from finding #1 would handle the re-serialization. Additionally, a patch-profile.py script could accept a profile path and a JSON dict of field overrides, apply them to the existing YAML, and output the updated file — useful for both interactive edits and headless:edit.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-004", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "transformation", "file": "SKILL.md", "line": 119, "title": "Duplicate Profile operation copies and modifies YAML — entirely deterministic", "description": "Determinism confidence: certain. Estimated token savings: 150-250 per invocation. Implementation complexity: trivial. Language: python. Could be prepass: no. Feeds scanner: n/a. Reusable across skills: no. Help pattern savings: ~60 tokens. Duplicate Profile copies a YAML file to a new name, optionally increments the version field, and updates the name field. This is fully deterministic file copy + field update with no LLM judgment needed.", "action": "Create a duplicate-profile.py script that copies a source profile YAML to a new path, updates the 'name' field to the new name, optionally increments 'version', and validates the result. Accepts --source, --new-name, --increment-version flags. Returns JSON with status and new path.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-005", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "structure", "file": "SKILL.md", "line": 116, "title": "Delete Profile checks existence, then LLM deletes — file deletion is deterministic", "description": "Determinism confidence: certain. Estimated token savings: 50-100 per invocation. Implementation complexity: trivial. Language: python. Could be prepass: no. Feeds scanner: n/a. Reusable across skills: no. Help pattern savings: ~40 tokens. Delete Profile uses list-profiles.py --check for existence, but the actual deletion is done by the LLM. A script could handle the delete-with-confirmation-bypass for headless mode.", "action": "Create a delete-profile.py script (or add --delete flag to list-profiles.py) that deletes a profile by name from docs/band-profiles/, returning JSON status. Particularly valuable for headless:delete where no confirmation is needed.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-006", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "extraction", "file": "SKILL.md", "line": 23, "title": "Headless mode detection and routing is partially deterministic flag parsing", "description": "Determinism confidence: high. Estimated token savings: 50-100 per invocation. Implementation complexity: trivial. Language: bash. Could be prepass: yes. Feeds scanner: n/a. Reusable across skills: yes. Help pattern savings: ~30 tokens. The activation mode detection parses --headless flags and routes to operations. While the LLM handles this inline, a pre-pass script could parse the flags and return structured JSON indicating the mode and parameters, reducing the LLM's parsing burden.", "action": "Create a parse-headless-flags.py script that accepts the user's input string, detects --headless or -H flags, extracts the subcommand and arguments, and returns structured JSON: {\"mode\": \"headless\", \"operation\": \"create\", \"args\": [...]}. Low priority since the LLM handles this cheaply.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "structure-011", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "low", "rank": 3, "category": "consistency", "file": "SKILL.md", "line": 10, "title": "Overview is dense — consider extracting domain context to a reference file", "description": "The Overview paragraph packs identity, domain context, design rationale, and scope into a single dense section. While the content is high quality, this front-loads tokens that may not be needed on every activation.", "action": "Consider moving the domain context and design rationale paragraphs into a references/ file that can be loaded on demand, keeping the Overview focused on purpose and scope.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-008", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "references/profile-schema.md", "line": null, "title": "Profile comparison capability could enhance sound evolution workflows", "description": "The diff-profiles.py script exists for showing changes during edits, but there is no user-facing 'Compare' operation. Users who duplicate profiles for sound evolution (e.g., 'midnight-echoes-v1' vs 'midnight-echoes-v2') would benefit from a side-by-side comparison that highlights what changed in their sonic direction. This supports a natural workflow: duplicate, evolve, compare, decide which direction to keep.", "action": "Add a 'Compare Profiles' operation that uses diff-profiles.py to show a human-friendly comparison between two profiles, highlighting what changed and what it means sonically. Frame it as 'How has your sound evolved?' rather than a dry diff.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "agent-cohesion-009", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "SKILL.md", "line": null, "title": "Profile archiving could prevent accidental loss of abandoned-but-useful profiles", "description": "Delete is permanent ('This cannot be undone'). For users experimenting with sound evolution, an archive operation that moves profiles to an 'archived' subfolder would be safer than deletion. Archived profiles could be restored or used as historical reference without cluttering the active profile list.", "action": "Consider adding an 'Archive' operation as a soft-delete alternative. Move to docs/band-profiles/archived/ and exclude from default list-profiles output. Restore operation brings them back. This is especially valuable for users who duplicate-then-evolve and want to keep a record of abandoned directions.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "agent-cohesion-011", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "SKILL.md", "line": null, "title": "Generation learnings could be surfaced proactively during profile load", "description": "The profile schema includes generation_learnings and known_limitations, but the Load Profile operation only displays sections passively. These learnings are high-value institutional knowledge that could be surfaced proactively: 'Heads up: last time you worked with this profile, you found that metal in the style prompt triggers screaming. You switched to progressive heavy groove instead.' This would make the agent feel like it has memory and context.", "action": "Enhance the Load Profile operation to highlight generation_learnings and known_limitations when they exist, framing them as 'What you have learned about this sound so far' rather than just another YAML section.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "prompt-craft-002", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "progressive-disclosure", "file": "SKILL.md", "line": null, "title": "All operations inline in SKILL.md — acceptable given size", "description": "SKILL.md contains all 8 operations inline rather than in separate capability prompt files. At 174 lines / ~3627 tokens, this is within the 250-line guideline for multi-capability agents with brief capability sections. Most operations are concise (5-15 lines). Only Create Profile is substantial (~30 lines) but this is the core operation requiring detailed discovery guidance.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-008", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "outcome-balance", "file": "SKILL.md", "line": 103, "title": "Tier drift detection is a smart proactive check", "description": "The Load Profile operation includes a check for tier drift between the stored profile and the user's current tier. This is forward-thinking — it catches a real data staleness issue that users wouldn't think to check themselves.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-010", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "intelligence-placement", "file": "SKILL.md", "line": 111, "title": "Good script delegation for deterministic operations", "description": "The skill correctly delegates validation, listing, tier feature lookup, filename derivation, and diff comparison to scripts, reserving the agent for conversational discovery, voice analysis, and judgment calls. This is proper intelligence placement.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-000", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Exceptional persona-capability alignment", "description": "The 'music producer's assistant' persona is perfectly matched to the capabilities offered. Every operation (create, edit, duplicate, analyze voice, health check) is exactly what a producer's assistant would do when managing band identity. The conversational discovery approach for profile creation fits the persona naturally -- a producer's assistant would guide you through defining your sound, not hand you a form.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-001", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Complete CRUD lifecycle with meaningful extras", "description": "The skill covers the full profile lifecycle: create, read (load/list), update (edit), delete, plus duplicate and health check. This is textbook capability completeness. The duplicate operation is a thoughtful addition that supports real workflows (versioning, side projects, sound evolution). The health check goes beyond validation to assess quality, which shows product-level thinking.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-002", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Dual-mode design (interactive + headless) is architecturally sound", "description": "Supporting both conversational and headless modes makes this skill usable by humans and by other skills/agents in automated pipelines. The headless mode covers all operations with structured JSON responses, enabling clean integration. The activation mode detection at the top of the skill is the right pattern.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-003", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Thoughtful Suno-specific domain knowledge embedded in workflow", "description": "The skill bakes in real Suno platform knowledge: negative prompts don't work well (so exclusions get translated to positive language), front-load style prompts in the first 200 characters, persona era-anchoring behavior, Audio Influence effective ranges. This isn't generic profile management -- it's deeply informed by how Suno actually works, which makes the agent genuinely useful rather than just a YAML editor.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-004", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Progressive disclosure in profile creation flow", "description": "The 12-step discovery flow is well-sequenced: it starts with identity (name, instrumental/vocal), moves to sound (genre, mood, references), then to technical settings (model, tier, sliders), and ends with optional enrichment (writer voice). Each step builds on the previous. The instruction to ask 'Anything else to add, or move on?' between sections respects user autonomy.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "execution-efficiency-000", "scanner": "execution-efficiency", "section": "efficiency", "type": "strength", "severity": "strength", "rank": 5, "category": "batching", "file": "SKILL.md", "line": 111, "title": "Edit Profile explicitly batches parallel reads", "description": "The Edit Profile operation instructs to 'Read both the target profile YAML and references/profile-schema.md in a single parallel batch when entering this operation.' This is a model pattern for efficient tool call batching.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "execution-efficiency-001", "scanner": "execution-efficiency", "section": "efficiency", "type": "strength", "severity": "strength", "rank": 5, "category": "parallelization", "file": "SKILL.md", "line": 133, "title": "Analyze Writer Voice prescribes parallel file reading", "description": "The instruction 'read all sample files in a single parallel batch before analyzing' correctly batches multiple file reads. The pre-pass flagged 'read all' as a potential issue, but in context this is already prescribing the efficient parallel pattern.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-000", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "strength", "rank": 5, "category": "overview-quality", "file": "SKILL.md", "line": 8, "title": "Well-crafted Overview with mission, domain context, and design rationale", "description": "The Overview establishes persona (music producer's assistant), domain framing (band profile as brand book), theory of mind (users range from musicians to beginners), and design rationale (conversation over form-filling, samples over abstract description). All load-bearing, nothing extraneous.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-001", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "strength", "rank": 5, "category": "progressive-disclosure", "file": "SKILL.md", "line": null, "title": "Good progressive disclosure with references for schema and tier data", "description": "Profile schema (109 lines) and tier feature matrix (78 lines) are correctly placed in references/ and loaded on demand. This keeps SKILL.md focused on workflow while making detailed data available when needed.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-005", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "strength", "rank": 5, "category": "outcome-balance", "file": "SKILL.md", "line": 16, "title": "Clean headless/interactive mode detection with structured JSON contracts", "description": "The Activation Mode Detection section clearly defines headless mode operations with expected JSON return shapes, then falls through to interactive mode. This supports both automated and conversational use without conflating the two paths.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-006", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "strength", "rank": 5, "category": "outcome-balance", "file": "SKILL.md", "line": 33, "title": "Operation routing table is clear and includes wrong-skill redirect", "description": "The On Activation routing table covers all operations with natural language triggers, includes an 'Unclear' fallback, and handles wrong-skill invocations ('make a song') with a helpful redirect. This is well-designed for an interactive agent.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-007", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "strength", "rank": 5, "category": "persona-voice", "file": "SKILL.md", "line": 82, "title": "Creative idea capture instruction demonstrates persona-appropriate behavior", "description": "The instruction to silently note song concepts and lyric fragments mentioned during discovery, then offer to save them, reflects the music producer's assistant persona. This is exactly the kind of judgment-enabling context that makes agents feel intelligent rather than mechanical.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-009", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "strength", "rank": 5, "category": "persona-voice", "file": "SKILL.md", "line": 149, "title": "Health Check uses coaching tone consistent with persona", "description": "The Health Check section frames quality gaps as 'friendly recommendations, not failures' and uses encouraging language. This matches the producer's assistant persona and the theory-of-mind guidance in the Overview about meeting users where they are.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "structure-006", "scanner": "structure", "section": "structure-capabilities", "type": "s capabilities", "type": "strength", "severity": "strength", "rank": 5, "category": "headless-mode", "file": "SKILL.md", "line": 16, "title": "Comprehensive headless mode with structured JSON responses", "description": "Headless mode is well-defined with specific subcommands (create, validate, load, edit, delete, duplicate) and documented return JSON shapes. Each headless operation has a clear contract. This supports automation and scripting use cases effectively.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "structure-010", "scanner": "structure", "section": "structure-capabilities", "type": "strength", "severity": "strength", "rank": 5, "category": "consistency", "file": "SKILL.md", "line": 44, "title": "Operation routing table is clear and comprehensive", "description": "The operation detection table maps triggers to routes cleanly, includes handling for unclear intent and wrong-skill invocation. The wrong-skill handling ('Explain this skill manages profiles, not songs') prevents user confusion and redirects appropriately.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}], "journeys": [], "assessments": {"cohesion_analysis": {"persona_alignment": {"score": "strong", "notes": "The producer's assistant persona is an excellent fit. Every capability serves the core mission of defining and maintaining band identity. The conversational discovery approach, reference track decomposition, and writer voice analysis all feel like things a knowledgeable producer's assistant would naturally do. The tone guidance ('meet them where they are') ensures the persona adapts to the user's expertise level."}, "capability_completeness": {"score": "mostly-complete", "missing_areas": ["Export/share profiles for collaboration", "Compare profiles side-by-side for sound evolution tracking", "Archive (soft-delete) as alternative to permanent deletion"], "notes": "The core CRUD lifecycle is fully covered with thoughtful extras (duplicate, health check, voice analysis). The gaps are in secondary workflows: collaboration, evolution tracking, and safe experimentation. None of these are blocking -- a user can accomplish their primary work end-to-end."}, "redundancy_level": {"score": "clean", "consolidation_opportunities": [{"capabilities": ["analyze-writer-voice", "health-check", "manage-profiles"], "suggested_consolidation": "These are already well-integrated as operations within a single skill. The manifest lists them separately for routing purposes, which is reasonable. No real consolidation needed."}]}, "external_integration": {"external_skills_referenced": 4, "integration_pattern": "intentional", "notes": "References bmad-init (config loading), Style Prompt Builder, Lyric Transformer, and Feedback Elicitor. The integration is well-designed: this skill produces profiles that downstream skills consume. The dependency direction is clear (profile manager is upstream). The bmad-init fallback behavior is properly handled. The 'wrong skill' redirect to Band Manager agent shows awareness of the larger ecosystem."}, "user_journey_score": {"score": "complete-end-to-end", "broken_workflows": [], "notes": "A user can create a profile from scratch through guided conversation, refine it, check its health, analyze their writing voice, duplicate it for experiments, and manage the full lifecycle. The post-operation flow ('Anything else?') keeps the session alive. The only friction point is the wrong-skill redirect lacking a concrete invocation path, but that is a minor polish issue, not a broken workflow."}}, "agent_identity": {"name": "bmad-suno-band-profile-manager", "persona_summary": "A music producer's assistant who understands sonic identity, vocal direction, and writing voice. Meets users where they are -- from deep musical vocabulary to beginners who know what they like but can not name it.", "primary_purpose": "Manage persistent band identity profiles that define consistent sonic and lyrical identity for AI-assisted music creation via Suno", "capability_count": 8}, "overall_cohesion": "cohesive", "autonomous_assessment": {"potential": "easily-adaptable", "hitl_points": 14, "auto_resolvable": 10, "needs_input": 4, "suggested_output_contract": "JSON object with status, profile_path, validation results, and optionally the profile content. Already well-defined for most headless subcommands.", "required_inputs": ["Profile YAML or field overrides (for create/edit)", "Profile name (for load/edit/delete/duplicate)", "Writing samples as text or file paths (for voice analysis)", "Target profile name (for voice analysis storage)"], "notes": "This skill is already substantially headless-capable — the CRUD headless modes are comprehensive and well-designed with explicit JSON output contracts. The remaining gaps are headless writer voice analysis and headless health check. Both are straightforward to add since the analysis logic is algorithmic rather than conversational. The interactive Create flow's 12-step discovery is fundamentally interactive by design and correctly remains so, but a fast-track detection for rich initial input would bridge the gap for expert interactive users."}, "skill_understanding": {"purpose": "Manages persistent band identity profiles — the sonic DNA of musical projects — that serve as the foundation for downstream Suno music generation skills (Style Prompt Builder, Lyric Transformer, Feedback Elicitor). Handles full CRUD lifecycle plus writer voice analysis and profile health assessment.", "primary_user": "Musicians and music producers using Suno AI for music creation, ranging from beginners who 'know what they like but cannot name it' to experienced producers with precise sonic vocabulary. Also serves automated pipelines and orchestrating agents via headless mode.", "key_assumptions": ["Users can articulate or discover their sonic preferences through conversation", "One profile maps to one musical project identity", "Python scripts and bash execution are available in the runtime environment", "Users know their Suno tier and model preference", "Profile creation happens in a single session without interruption", "Web search availability for reference track verification", "Users will invoke Health Check as a separate operation rather than expecting quality assurance at creation time"]}, "top_insights": [{"title": "Profile creation is a high-stakes single-session artifact with no compaction protection", "detail": "A 12-step conversational discovery that accumulates nuanced creative preferences, reference track decompositions, and captured side-ideas is exactly the kind of long interaction where context compaction silently destroys value. The profile is assembled at the end from conversational fragments, not progressively checkpointed.", "action": "Add progressive YAML assembly checkpoints every 3-4 steps during Create Profile discovery. The structured YAML survives compaction far better than scattered conversational details."}, {"title": "The Band Identity Card is the most emotionally resonant artifact this skill produces, and it is single-use", "detail": "The identity card captures the soul of a band in 3-4 sentences — far more evocative than reading YAML fields. But it is generated once at creation and never seen again. Loading a profile shows structured sections. Editing does not regenerate it. The most human-readable representation of the user's creative vision is effectively discarded after its first appearance.", "action": "Store the identity card in the profile, regenerate it on significant edits, and display it as the header whenever a profile is loaded. Make it the face of the profile, not a one-time ceremony."}, {"title": "Expert users have no fast-track interactive path between 'step-by-step interview' and 'write raw YAML'", "detail": "The skill correctly serves beginners with guided discovery and automators with headless YAML mode. But the expert interactive user — who knows their sound and wants to describe it in natural language without step-by-step gates — falls through the gap. They are forced to either slow down or learn YAML.", "action": "Add fast-track detection at the start of Create Profile: if the user's initial message is information-rich, extract what you can, ask only about genuinely missing fields, and skip to review."}], "prompt_health": {"total_prompts": 1, "prompts_with_config_header": 0, "prompts_with_progression": 0}, "skillmd_assessment": {"overview_quality": "appropriate", "progressive_disclosure": "good", "persona_context": "appropriate", "notes": "SKILL.md is well-crafted at 174 lines / ~3627 tokens. Overview establishes persona, domain context, and design rationale concisely. Operations are inline but appropriately brief (except Create Profile which needs its depth). Schema and tier data correctly extracted to references/. No waste patterns detected. Two dense instruction blocks could benefit from structural breakup but content is all load-bearing."}}, "section_labels": {"structural": "Structural", "structure-capabilities": "Structure & Capabilities", "prompt-craft": "Prompt Craft", "efficiency": "Efficiency", "cohesion": "Cohesion", "quality": "Path & Script Standards", "scripts": "Scripts", "script-opportunities": "Script Opportunities", "creative": "Creative & Enhancements"}}</script>
<script>
const DATA = JSON.parse(document.getElementById('report-data').textContent);
const selected = new Set();

function init() {
  const m = DATA.meta;
  const es = DATA.executive_summary;
  document.getElementById('skill-name').textContent = m.skill_name;
  document.getElementById('subtitle').textContent = `${m.skill_path} \u2022 ${m.timestamp.split('T')[0]} \u2022 ${m.scanner_count} scanners`;

  // Executive summary
  let html = `<div class="grade grade-${es.grade}">${es.grade}</div>`;
  html += `<dl class="summary-grid">`;
  html += `<dt>Issues</dt><dd>${es.total_issues} total \u2014 ${es.counts.critical} critical, ${es.counts.high} high, ${es.counts.medium} medium, ${es.counts.low} low</dd>`;
  if (es.enhancement_count) html += `<dt>Enhancements</dt><dd>${es.enhancement_count} opportunities identified</dd>`;
  if (es.strength_count) html += `<dt>Strengths</dt><dd>${es.strength_count} noted</dd>`;
  if (es.craft_assessment) html += `<dt>Craft</dt><dd>${esc(es.craft_assessment)}</dd>`;
  if (es.overall_cohesion) html += `<dt>Cohesion</dt><dd>${esc(es.overall_cohesion)}</dd>`;
  html += `</dl>`;
  document.getElementById('exec-summary').innerHTML = html;

  // Severity filters
  renderFilters();

  // Sections
  renderSections();
}

// --- Severity filters ---
const activeFilters = new Set(['critical','high','medium','low','high-opportunity','medium-opportunity','low-opportunity','strength','suggestion','note','info']);

function renderFilters() {
  const counts = {};
  DATA.items.forEach(i => { counts[i.severity] = (counts[i.severity]||0) + 1; });
  const order = ['critical','high','medium','low','high-opportunity','medium-opportunity','low-opportunity','strength','suggestion','note'];
  let html = '';
  order.forEach(s => {
    if (!counts[s]) return;
    const active = activeFilters.has(s) ? 'active' : '';
    html += `<span class="badge badge-${s} ${active}" data-sev="${s}" onclick="toggleFilter('${s}')">${s.replace('-',' ')} ${counts[s]}</span>`;
  });
  document.getElementById('filters').innerHTML = html;
}

function toggleFilter(sev) {
  if (activeFilters.has(sev)) activeFilters.delete(sev); else activeFilters.add(sev);
  renderFilters();
  renderSections();
}

// --- Sections ---
function renderSections() {
  const groups = {};
  const sectionOrder = ['structural','structure-capabilities','prompt-craft','cohesion','efficiency','quality','scripts','script-opportunities','creative'];

  DATA.items.forEach(i => {
    if (!activeFilters.has(i.severity)) return;
    const s = i.section;
    if (!groups[s]) groups[s] = [];
    groups[s].push(i);
  });

  // Truly broken (always first, always open)
  const broken = DATA.items.filter(i => i.type === 'issue' && (i.severity === 'critical' || i.severity === 'high'));
  const brokenIds = new Set(broken.map(i => i.id));
  // Strengths
  const strengths = DATA.items.filter(i => i.type === 'strength' && activeFilters.has(i.severity));

  let html = '';

  if (broken.length) {
    html += renderSection('truly-broken', `Truly Broken / Missing (${broken.length})`, broken, true);
  }
  if (strengths.length) {
    html += renderSection('strengths', `Strengths (${strengths.length})`, strengths, false);
  }

  sectionOrder.forEach(sec => {
    // Exclude strengths (shown above) and items already in Truly Broken
    const items = (groups[sec] || []).filter(i => i.type !== 'strength' && !brokenIds.has(i.id));
    if (!items.length) return;
    const label = DATA.section_labels[sec] || sec;
    html += renderSection(sec, `${label} (${items.length})`, items, false);
  });

  // User journeys
  if (DATA.journeys.length) {
    html += renderJourneysSection();
  }

  // Assessments
  if (Object.keys(DATA.assessments).length) {
    html += renderAssessmentsSection();
  }

  document.getElementById('sections').innerHTML = html;
}

function renderSection(id, label, items, startOpen) {
  const openCls = startOpen ? 'open' : '';
  let html = `<div class="section"><div class="section-header ${openCls}" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">${label}</span>`;
  html += `</div><div class="section-body ${openCls}">`;
  items.forEach(i => { html += renderItem(i); });
  html += `</div></div>`;
  return html;
}

function renderItem(item) {
  const isStrength = item.type === 'strength';
  const chk = item.selectable ? `<input type="checkbox" class="item-check" data-id="${item.id}" ${selected.has(item.id)?'checked':''} onchange="toggleSelect('${item.id}', this.checked)">` : '';
  const sev = `<span class="badge badge-${item.severity}">${item.severity.replace('-',' ')}</span>`;
  const file = item.file ? `<span class="item-file">${esc(item.file)}${item.line ? ':'+item.line : ''}</span>` : '';
  const desc = item.description && item.description !== item.title ? `<div class="item-desc">${esc(item.description)}</div>` : '';
  // Suppress action/impact for strengths — "N/A" is noise
  const actionText = item.action && !isStrength && item.action !== 'N/A' ? item.action : '';
  const action = actionText ? `<div class="item-action"><strong>${item.action_type === 'fix' ? 'Fix' : item.action_type === 'create-script' ? 'Script' : 'Suggestion'}:</strong> ${esc(actionText)}</div>` : '';
  const impactText = item.impact && !isStrength && item.impact !== 'N/A' ? item.impact : '';
  const impact = impactText ? `<div class="item-impact">Impact: ${esc(impactText)}</div>` : '';
  const copyBtn = item.selectable ? `<button class="copy-btn" onclick="copySinglePrompt('${item.id}')" title="Copy prompt for this item">\u2398</button>` : '';

  return `<div class="item">${chk}<div class="item-body">${sev} ${file}<div class="item-title">${esc(item.title)}</div>${desc}${action}${impact}</div><div class="item-actions">${copyBtn}</div></div>`;
}

function renderJourneysSection() {
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">User Journeys (${DATA.journeys.length})</span>`;
  html += `</div><div class="section-body">`;
  DATA.journeys.forEach(j => {
    html += `<div class="journey"><h4>${esc(j.archetype)}</h4>`;
    html += `<p>${esc(j.journey_summary)}</p>`;
    if (j.friction_points && j.friction_points.length) {
      html += `<ul class="friction">`;
      j.friction_points.forEach(fp => { html += `<li>${esc(fp)}</li>`; });
      html += `</ul>`;
    }
    if (j.bright_spots && j.bright_spots.length) {
      html += `<ul class="bright">`;
      j.bright_spots.forEach(bs => { html += `<li>${esc(bs)}</li>`; });
      html += `</ul>`;
    }
    html += `</div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderAssessmentsSection() {
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">Assessments & Analysis</span>`;
  html += `</div><div class="section-body">`;

  const ca = DATA.assessments.cohesion_analysis;
  if (ca) {
    html += `<div class="assessment"><h4>Cohesion Analysis</h4><table><tr><th>Dimension</th><th>Score</th><th>Notes</th></tr>`;
    Object.entries(ca).forEach(([dim, val]) => {
      if (typeof val === 'object' && val.score) {
        html += `<tr><td>${esc(dim.replace(/_/g, ' '))}</td><td>${esc(val.score)}</td><td>${esc(val.notes || '')}</td></tr>`;
      }
    });
    html += `</table></div>`;
  }

  const aa = DATA.assessments.autonomous_assessment;
  if (aa) {
    html += `<div class="assessment"><h4>Autonomous Readiness</h4><table>`;
    html += `<tr><td>Overall Potential</td><td>${esc(aa.potential||aa.overall_potential||'')}</td></tr>`;
    html += `<tr><td>HITL Points</td><td>${aa.hitl_points||aa.hitl_interaction_points||0}</td></tr>`;
    html += `<tr><td>Auto-Resolvable</td><td>${aa.auto_resolvable||0}</td></tr>`;
    html += `<tr><td>Needs Input</td><td>${aa.needs_input||0}</td></tr>`;
    if (aa.notes) html += `<tr><td>Notes</td><td>${esc(aa.notes)}</td></tr>`;
    html += `</table></div>`;
  }

  const ti = DATA.assessments.top_insights;
  if (ti && ti.length) {
    html += `<div class="assessment"><h4>Top Insights</h4>`;
    ti.forEach(t => {
      const tiTitle = t.title || t.insight || '';
      const tiDetail = t.detail || t.why_it_matters || '';
      const tiAction = t.action || t.suggestion || '';
      html += `<div style="margin:0.5rem 0"><strong>${esc(tiTitle)}</strong>`;
      if (tiDetail) html += `<br><em>Context:</em> ${esc(tiDetail)}`;
      if (tiAction) html += `<br><em>Suggestion:</em> ${esc(tiAction)}`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

// --- Interactions ---
function toggleSection(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function toggleSelect(id, checked) {
  if (checked) selected.add(id); else selected.delete(id);
  document.getElementById('sel-count').textContent = selected.size;
  document.getElementById('footer').classList.toggle('hidden', selected.size === 0);
}

// --- Prompt Generation ---
function itemById(id) { return DATA.items.find(i => i.id === id); }

function buildPromptForItem(item) {
  let p = '';
  const sev = item.severity.replace('-', ' ').toUpperCase();
  const loc = item.file ? `${item.file}${item.line ? ':'+item.line : ''}` : '';
  p += `**[${sev}] ${item.title}**\n`;
  if (loc) p += `- File: ${loc}\n`;
  if (item.description && item.description !== item.title) p += `- Context: ${item.description}\n`;
  if (item.action) {
    const label = item.action_type === 'fix' ? 'Fix' : item.action_type === 'create-script' ? 'Create script' : 'Suggestion';
    p += `- ${label}: ${item.action}\n`;
  }
  if (item.impact) p += `- Impact: ${item.impact}\n`;
  return p;
}

function buildPrompt(ids) {
  const items = ids.map(itemById).filter(Boolean);
  const fixes = items.filter(i => i.action_type === 'fix');
  const scripts = items.filter(i => i.action_type === 'create-script');
  const enhancements = items.filter(i => i.action_type === 'enhance' || i.action_type === 'refactor');

  let prompt = `## Task: Quality Improvements for ${DATA.meta.skill_name}\nSkill path: ${DATA.meta.skill_path}\n\n`;

  if (fixes.length) {
    prompt += `### Fix These Issues (${fixes.length})\n\n`;
    fixes.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  if (scripts.length) {
    prompt += `### Create These Scripts (${scripts.length})\n\n`;
    scripts.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  if (enhancements.length) {
    prompt += `### Implement These Enhancements (${enhancements.length})\n\n`;
    enhancements.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  return prompt.trim();
}

function copySinglePrompt(id) {
  const item = itemById(id);
  if (!item) return;
  let prompt = `## Task: Quality Fix for ${DATA.meta.skill_name}\nSkill path: ${DATA.meta.skill_path}\n\n`;
  prompt += buildPromptForItem(item);
  navigator.clipboard.writeText(prompt).then(() => {
    const btn = document.querySelector(`[onclick="copySinglePrompt('${id}')"]`);
    if (btn) { btn.classList.add('copied'); btn.textContent = '\u2713'; setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '\u2398'; }, 1500); }
  });
}

function showBatchPrompt() {
  const prompt = buildPrompt([...selected]);
  document.getElementById('modal-content').textContent = prompt;
  document.getElementById('modal').classList.add('visible');
}

function closeModal() { document.getElementById('modal').classList.remove('visible'); }

function copyModal() {
  const text = document.getElementById('modal-content').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.modal-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; }, 1500);
  });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

init();
</script>
</body>
</html>
