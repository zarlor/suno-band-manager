ies", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "scripts-024", "scanner": "scripts", "section": "scripts", "type": "issue", "severity": "medium", "rank": 2, "category": "agentic-design", "file": "scripts/tempo-detail.py", "line": 1, "title": "No argparse found — script lacks --help self-documentation", "description": "", "action": "Add argparse with description and argument help text", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "scripts-025", "scanner": "scripts", "section": "scripts", "type": "issue", "severity": "medium", "rank": 2, "category": "agentic-design", "file": "scripts/tempo-detail.py", "line": 1, "title": "No json.dumps found — output may not be structured JSON", "description": "", "action": "Use json.dumps for structured output parseable by workflows", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "scripts-026", "scanner": "scripts", "section": "scripts", "type": "issue", "severity": "medium", "rank": 2, "category": "tests", "file": "scripts/tempo-detail.py", "line": 1, "title": "No unit test found for tempo-detail.py", "description": "", "action": "Create scripts/tests/test-tempo-detail.py with test cases", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-000", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "frontmatter", "file": "SKILL.md", "line": 1, "title": "Skill name does not follow bmad-{code}-agent-{name} or bmad-agent-{name} pattern", "description": "Name 'bmad-suno-feedback-elicitor' uses a non-standard naming pattern. Expected pattern is bmad-{code}-agent-{name} or bmad-agent-{name}.", "action": "Rename to follow the standard agent naming convention, e.g., bmad-suno-agent-feedback-elicitor, or confirm this is an intentional skill-level (non-agent) naming choice.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-010", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "config-header", "file": "README.md", "line": 1, "title": "No config header with language variables found in README.md", "description": "The README.md prompt file lacks a config header with language variables. Config headers enable dynamic behavior based on user settings.", "action": "Add a config header to README.md if it serves as a prompt file, or verify that README.md is documentation only and not a prompt.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-007", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "gap", "file": "SKILL.md", "line": null, "title": "No explicit handling for multi-song comparison feedback", "description": "The workflow handles feedback on a single generation, but users often compare multiple generations of the same song ('version 2 was better than version 3 in the chorus but worse in the verse'). The skill mentions regenerating 2-3 variants as a fallback but has no structured approach for collecting and triaging comparative feedback across multiple versions. This is a natural next step after the non-convergence fallback in Steps 4c and 4d.", "action": "Add a comparative feedback sub-workflow that accepts reactions to multiple versions simultaneously, identifies which dimensions each version handles best, and synthesizes a 'best of' parameter set. This could be a variant of the headless mode (--headless:compare) or an interactive sub-step after the variant generation suggestion.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-008", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "gap", "file": "SKILL.md", "line": null, "title": "No confidence calibration based on feedback round number", "description": "The skill tracks iteration rounds in the iteration log but does not adjust its confidence or strategy based on round number. A round-3 refinement where previous adjustments partially worked should be handled differently than a fresh first-round reaction -- the agent has empirical data about what moves the needle for this specific song/genre combination. The effectiveness tracking mention in Step 5 is a start but is not woven into the triage or elicitation phases.", "action": "In Steps 3-4, check if this is a subsequent round. If yes, front-load what was tried and what worked/didn't from the iteration log before triaging new feedback. Adjust confidence scores based on prior round outcomes -- if slider changes had no effect last round, lower confidence for slider recommendations this round.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-009", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "misalignment", "file": "SKILL.md", "line": 53, "title": "bmad-init dependency is declared but fallback makes it effectively optional", "description": "The bmad-manifest.json declares 'bmad-init' as a requirement, but SKILL.md Step 1 of On Activation says 'If bmad-init is unavailable, greet generically and default communication_language to English. Do not block the workflow.' This is a minor mismatch between the manifest's 'requires' declaration and the actual runtime behavior. While the graceful degradation is good design, the manifest should reflect reality.", "action": "Either change bmad-manifest.json 'requires' to 'optional' or 'recommended', or add a comment in the manifest clarifying that the requirement is soft. This prevents downstream tooling from treating bmad-init as a hard dependency that blocks skill loading.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "enhancement-opportunities-010", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "delight-opportunity", "file": "SKILL.md", "line": 159, "title": "Non-convergence variant generation could include a 'wild card' option alongside safe variations", "description": "When elicitation does not converge, the skill suggests generating 2-3 variants with different parameter profiles. This is a smart fallback. But all suggested variants are along the axis the user was struggling to articulate. Adding one 'wild card' variant that takes the original feedback and deliberately interprets it in an unexpected direction could break the user out of their rut. Sometimes the user cannot describe what they want because they have not heard it yet.", "action": "When suggesting variants for non-convergent feedback, make one of the 2-3 variants a deliberate creative departure: higher Weirdness slider, different genre interpretation, or a production style the user did not mention. Label it clearly as 'creative wild card -- might surprise you.' This leverages Suno's randomness as a feature rather than a problem.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-011", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "facilitative-pattern", "file": "SKILL.md", "line": null, "title": "Dual-Output pattern partially present but LLM-optimized distillate could be more explicitly structured", "description": "The skill produces both a human-readable recommendation (Step 6 markdown format) and a machine-readable iteration log (JSON). The headless output contract also produces structured JSON. However, the interactive mode's JSON iteration log is compact but not designed for downstream LLM consumption -- it captures what was done but not the reasoning chain. If Mac or another orchestrating agent needs to understand WHY certain adjustments were recommended (to inform its own decisions about next steps), the current log is insufficient.", "action": "Add an optional 'reasoning_chain' field to the iteration log that captures the triage type, elicitation path taken, key user signals, and the mapping logic from signal to adjustment. This would let an orchestrating agent make smarter decisions about whether to suggest another feedback round, switch to a different skill, or propose a fundamentally different approach.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-012", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "assumption-risk", "file": "SKILL.md", "line": null, "title": "Skill assumes feedback is about a single song -- multi-song comparison feedback is unhandled", "description": "The entire workflow assumes the user is giving feedback about one Suno generation. But a common real-world scenario is: 'I generated 5 versions and version 3 is closest but version 1 had better vocals.' Comparative feedback across multiple generations is a natural way users refine -- they triangulate from multiple outputs. The current skill has no mechanism to capture and leverage cross-generation comparison.", "action": "Add a 'comparative feedback' sub-path in Step 1: if the user mentions multiple generations, capture what worked in each and synthesize a composite target. This is more efficient than treating each generation independently -- the user has already done A/B testing, and the agent should leverage that work.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-013", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "journey-friction", "file": "SKILL.md", "line": null, "title": "No explicit session save/resume for long elicitation conversations", "description": "Vague feedback elicitation through three phases can be a long conversation. If context compaction occurs mid-elicitation (or the user closes their browser and returns later), all gathered elicitation state is lost. The iteration log is only generated at Step 6, after elicitation is complete. There is no mid-conversation state checkpoint.", "action": "Consider checkpointing elicitation state after each phase: after binary narrowing, capture which dimensions were identified; after comparative anchoring, capture reference points and spectrum placements. If the conversation resumes or compacts, the agent can reconstruct context from the checkpoint rather than starting over. This could be as simple as generating a partial iteration log after Phase 1 that includes 'elicitation_progress' fields.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "execution-efficiency-000", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "low", "rank": 3, "category": "parallelization", "file": "SKILL.md", "line": 320, "title": "Sequential handoff to Style Prompt Builder and Lyric Transformer could be parallel", "description": "Step 7 says 'Or both, sequentially' when invoking bmad-suno-style-prompt-builder and bmad-suno-lyric-transformer. These two headless skill invocations are independent -- style prompt adjustments and lyric adjustments operate on different artifacts with no data dependency between them. Running both in parallel would reduce total handoff latency by roughly half when both are needed.", "action": "Change 'Or both, sequentially' to 'Or both, in parallel' and add explicit guidance: 'When both style prompt and lyric adjustments are approved, invoke both skills simultaneously as parallel subagents since they operate on independent artifacts.'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "execution-efficiency-005", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "low", "rank": 3, "category": "resource-optimization", "file": "references/gemini-audio-analysis.md", "line": null, "title": "gemini-audio-analysis.md reference exists but is not explicitly loaded by any workflow step", "description": "The references directory contains gemini-audio-analysis.md, but no step in SKILL.md instructs the agent to load it. If it is intended as an optional resource for advanced users or future capabilities, this is fine. However, if it should be loaded during technical feedback resolution (Step 4e), the instruction is missing. Currently it adds no token cost since it is never loaded, but it may represent a missing capability.", "action": "If audio analysis is intended as part of the feedback workflow, add an explicit load instruction in Step 4e for technical feedback cases where the user can provide audio files. If it is only for reference by developers, consider moving it outside the skill's references directory to avoid confusion.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-004", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "progressive-disclosure", "file": "SKILL.md", "line": 184, "title": "Step 4e Technical Resolution contains dense domain knowledge that could be in a reference", "description": "Lines 184-205 detail specific resolution paths for artifacts, vocal quality, timing, pronunciation, quality degradation, instrument bleed, and section-specific issues including tier-specific Studio feature guidance. This is ~22 lines of Suno-specific technical knowledge that overlaps with what suno-parameter-map.md likely covers. The density is high but each item is distinct and actionable.", "action": "Consider whether the Studio feature resolution paths (Legacy Editor, Replace Section, Stems workflow) are already covered in suno-parameter-map.md. If so, replace the inline detail with a mandatory load directive. If not, this content is appropriately placed as workflow-critical instructions.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-005", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "anti-pattern", "file": "SKILL.md", "line": 329, "title": "Step 7 references iteration log acceptance 'in Step 2' but Step 2 does not mention it", "description": "Line 329 says 'Accept iteration log on re-invocation: If the user provides a previous iteration log in Step 2...' but Step 2 (Gather Context, lines 83-100) does not mention accepting or handling iteration logs from previous sessions. This creates a gap where the agent might not recognize iteration logs during context gathering.", "action": "Add a bullet to Step 2's 'Valuable context' list: 'Previous iteration log — Did the user provide a log from a prior feedback session? If yes, load it to track what was tried and what worked.'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "script-opportunities-002", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "validation", "file": "SKILL.md", "line": 228, "title": "Style prompt character count validation mentioned inline but already handled by map-adjustments.py", "description": "Determinism confidence: certain. SKILL.md line 228 says 'The script validates character count against the 1,000-char limit.' This is already implemented in map-adjustments.py's check_adjustment_consistency() which checks critical zone overflow (200 chars) and exclusion overflow (200 chars). The 1,000-char total limit mentioned in the prompt is not validated by the script. Estimated token savings: 50 per invocation if the LLM is also doing this check. Implementation complexity: trivial. Language: python. Could be prepass: no. Feeds scanner: n/a. Reusable across skills: yes (style-prompt-builder could use it).", "action": "Add a total style prompt character count check (1,000-char limit) to map-adjustments.py's check_adjustment_consistency(). Currently it only checks the 200-char critical zone for additions and 200-char exclusion target, but the overall 1,000-char style prompt limit is not validated.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-004", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "structure", "file": "SKILL.md", "line": 325, "title": "Feedback history file I/O (save/load iteration logs) described as LLM task", "description": "Determinism confidence: certain. Step 7 instructs saving iteration logs to {project-root}/docs/feedback-history/{band-profile-or-session}/{timestamp}.json and Step 5 mentions loading previous logs on re-invocation. File I/O with directory creation and JSON write is purely deterministic. Estimated token savings: 100-150 per invocation when saving or loading. Implementation complexity: trivial. Language: python or bash. Could be prepass: yes (loading). Feeds scanner: n/a. Reusable across skills: yes (any skill with iteration history). Help pattern savings: n/a.", "action": "Create a feedback-history.py script with --save (accepts JSON from stdin, writes to the correct path with directory creation and timestamp naming) and --load (accepts a session/profile identifier, returns the most recent or specified iteration log). Removes file I/O from LLM responsibility.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-005", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "extraction", "file": "SKILL.md", "line": 91, "title": "Band profile YAML reading described as LLM task in Step 2", "description": "Determinism confidence: certain. Step 2 instructs reading from {project-root}/docs/band-profiles/{profile-name}.yaml for baseline intent. Parsing YAML files is entirely deterministic. However, this is a simple file read that the LLM handles naturally through tool use (Read), and a script adds minimal value over direct file reading. Estimated token savings: 50-100. Implementation complexity: trivial. Language: python. Could be prepass: yes. Feeds scanner: n/a. Reusable across skills: yes (style-prompt-builder, lyric-transformer). Help pattern savings: n/a.", "action": "Consider a band-profile-reader.py that reads a band profile YAML file and outputs a compact JSON summary of the fields relevant to feedback elicitation (vocal direction, genre, slider baselines, generation_learnings). Low priority since the LLM can read YAML directly via tool use.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-007", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "preprocessing", "file": "references/feedback-triage-guide.md", "line": null, "title": "Opposing pairs table in triage guide is loaded as raw markdown for LLM to interpret", "description": "Determinism confidence: moderate. The opposing pairs table (lines 117-129) and signal phrase lists (lines 8-61) are loaded as raw markdown. A pre-pass script could extract these into a compact JSON lookup that the LLM consumes more efficiently. However, the LLM needs to interpret these creatively (asking the right questions, placing on spectrums), so the raw reference has genuine value. Estimated token savings: 100-200 per invocation when the reference is loaded. Implementation complexity: trivial. Language: python. Could be prepass: yes. Feeds scanner: n/a. Reusable across skills: no. Help pattern savings: n/a.", "action": "Low priority. Could create extract-triage-data.py that parses the triage guide into structured JSON (signal_phrases by type, opposing_pairs with their parameter mappings). The LLM would receive compact structured data instead of formatted markdown tables. Savings are moderate since the reference file is already well-structured.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-008", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "preprocessing", "file": "references/suno-parameter-map.md", "line": null, "title": "Parameter map reference loaded as full markdown when only relevant sections are needed", "description": "Determinism confidence: high. suno-parameter-map.md is 298 lines covering all feedback dimensions, models, sliders, and studio features. After triage identifies the feedback type and dimensions, only the relevant sections need to be read. A pre-pass script could extract only the relevant adjustment tables based on the identified dimensions, reducing the token load. Estimated token savings: 200-400 per invocation (only loading relevant sections vs. full file). Implementation complexity: moderate. Language: python. Could be prepass: yes. Feeds scanner: n/a. Reusable across skills: yes (style-prompt-builder uses similar references). Help pattern savings: n/a.", "action": "Create extract-relevant-params.py that accepts a list of feedback dimensions and returns only the relevant sections from suno-parameter-map.md as structured JSON. For example, if dimensions are [vocals, production], return only the Vocal Direction and Production & Mix tables, plus Model-Specific patterns if model is known. The LLM gets a focused subset instead of the full 298-line reference.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-009", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "comparison", "file": "SKILL.md", "line": 219, "title": "Effectiveness tracking compares previous adjustments vs outcomes using LLM", "description": "Determinism confidence: moderate. Step 5 describes tracking which metatags, style prompt changes, and slider adjustments were effective vs. ineffective. The comparison of 'what was recommended' vs. 'what the user reports worked' is partially deterministic (diffing the recommended changes against feedback about which ones helped). A script could pre-compute the delta between previous iteration log recommendations and current feedback dimensions. Estimated token savings: 100-200 per multi-round invocation. Implementation complexity: moderate. Language: python. Could be prepass: yes. Feeds scanner: n/a. Reusable across skills: no. Help pattern savings: n/a.", "action": "Extend feedback-history.py (from finding 5) with a --diff mode that accepts the current iteration's feedback dimensions and the previous iteration log, producing a structured comparison: which recommendations were tried, which the user reports as effective/ineffective, and which dimensions persist. The LLM interprets the diff rather than computing it.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "scripts-003", "scanner": "scripts", "section": "scripts", "type": "issue", "severity": "low", "rank": 3, "category": "agentic-design", "file": "scripts/analyze-audio.py", "line": 1, "title": "No sys.exit() calls — may not return meaningful exit codes", "description": "", "action": "Return 0=success, 1=fail, 2=error via sys.exit()", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "scripts-012", "scanner": "scripts", "section": "scripts", "type": "issue", "severity": "low", "rank": 3, "category": "agentic-design", "file": "scripts/batch-full-analysis.py", "line": 1, "title": "No sys.exit() calls — may not return meaningful exit codes", "description": "", "action": "Return 0=success, 1=fail, 2=error via sys.exit()", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "scripts-021", "scanner": "scripts", "section": "scripts", "type": "issue", "severity": "low", "rank": 3, "category": "agentic-design", "file": "scripts/playlist-sequencing-data.py", "line": 1, "title": "No sys.exit() calls — may not return meaningful exit codes", "description": "", "action": "Return 0=success, 1=fail, 2=error via sys.exit()", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-010", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "SKILL.md", "line": null, "title": "Emotional vocabulary bridge could be offered as a standalone quick-reference card", "description": "The opposing pairs table in feedback-triage-guide.md (Heavy/Light, Fast/Slow, Polished/Raw, etc.) with their Suno parameter mappings is valuable independently of the feedback workflow. Users who know exactly what they want but lack Suno vocabulary could use this as a direct translation tool without going through the full elicitation process. It could also serve as a learning aid for users to build their own Suno vocabulary over time.", "action": "Consider extracting the opposing pairs table into a quick-reference capability or a standalone reference card that users can consult outside the feedback loop. This could be a simple lookup mode: 'I want it more [adjective]' -> here are the Suno parameters to change.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "agent-cohesion-011", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "SKILL.md", "line": null, "title": "A/B testing workflow from Gemini reference could become a structured feedback sub-mode", "description": "The gemini-audio-analysis.md reference describes a disciplined A/B testing workflow (change one variable, generate both, analyze both, compare) that would be extremely powerful as a structured skill mode. Currently this knowledge is buried in a reference document. The feedback elicitor is the natural home for interpreting A/B test results -- it already handles comparative reactions and maps them to parameter adjustments.", "action": "Add a --headless:ab-test or interactive A/B mode that accepts two audio analyses (from Gemini or librosa) plus the parameter delta between them, and produces a structured assessment of what the change actually affected. This turns the Gemini workflow from a manual process into an automated one.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "agent-cohesion-012", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "SKILL.md", "line": null, "title": "Band profile learning accumulation could create genre-specific feedback shortcuts", "description": "The skill mentions saving effective adjustments to band profile generation_learnings, but doesn't describe using accumulated learnings to shortcut future feedback sessions. After several rounds of refinement for a given band/genre, the agent should have enough data to predict likely adjustments from common feedback patterns. For example, if a user's metal band consistently needs 'rawer vocals' and 'less reverb' corrections, the agent could proactively suggest those as likely fixes before full elicitation.", "action": "Add a pre-elicitation check: if a band profile exists with generation_learnings, scan for patterns matching the current feedback before running the full triage. Present as 'Based on your previous sessions, this might be the same vocal rawness issue we fixed last time -- want to try those same adjustments first?'", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "prompt-craft-009", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "outcome-balance", "file": "SKILL.md", "line": 221, "title": "Research mandate in Step 5 adds web search dependency", "description": "Line 221 directs the agent to use web search to verify Suno-specific recommendations against current behavior, with graceful fallback to training knowledge. This is appropriate given Suno's rapid model evolution but adds a tool dependency. The fallback clause makes this resilient.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "structure-009", "scanner": "structure", "section": "structure-capabilities", "type": "strength", "severity": "note", "rank": 4, "category": "consistency", "file": "SKILL.md", "line": 313, "title": "Step 7 (Handoff) appears after non-step sections, breaking sequential flow", "description": "Steps 1-6 are in sequence, but then sections 'Feedback Summary', 'Before/After Preview', 'Style Prompt Adjustments', 'Exclusion Prompt Adjustments', 'Slider Adjustments', 'Lyric Adjustments', 'Studio Features', 'Strategy Note', and 'Additional Notes' appear as H2 headings between Step 6 and Step 7. These are actually part of Step 6's output template but are rendered as top-level sections, which could confuse the AI about document structure.", "action": "Consider nesting the output format sections under Step 6 (as H3 subsections) or wrapping them in a code block to clarify they are template content, not standalone workflow steps.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-000", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Exceptionally well-designed feedback triage system", "description": "The five-type feedback classification (clear, positive, vague, contradictory, technical) with distinct elicitation strategies per type is the strongest design element. Each type has a clear rationale for why it needs different handling, and the strategies are genuinely different -- not just cosmetic variations. The three-phase guided elicitation for vague feedback (binary narrowing, comparative anchoring, emotional vocabulary bridge) is particularly sophisticated and shows deep understanding of the real problem: users who know something is wrong but lack vocabulary to express it.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-001", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Complete end-to-end user journey with meaningful handoffs", "description": "The workflow covers the full lifecycle from receiving raw feedback through triage, elicitation, parameter mapping, recommendation presentation, and handoff to downstream skills. The handoff to Style Prompt Builder and Lyric Transformer via headless modes is well-designed -- the user never hits a dead end. The iteration log persistence enables multi-session refinement, which is critical for real music production workflows.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-002", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "references/feedback-triage-guide.md", "line": null, "title": "Production Diagnostic Patterns table is a high-value differentiator", "description": "The table mapping non-obvious feedback patterns to root causes (e.g., 'guitar dominates' is actually a Suno limitation, 'wrong bass tone' is triggered by the word funk, 'sounds too modern' is a Persona issue) demonstrates deep domain expertise. This kind of knowledge is exactly what non-expert users cannot figure out on their own and is the core value proposition of the skill.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-003", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "references/suno-parameter-map.md", "line": null, "title": "Parameter map is comprehensive and grounded in real testing", "description": "The suno-parameter-map.md file covers instrumentation, vocals, energy, production, mood, audio quality, Studio features, and slider behavior -- all with specific, actionable mappings. The confirmed Suno behavior notes and slider combination table from actual production use add credibility. The BPM tags ineffectiveness finding and perceived tempo alternatives demonstrate empirical validation rather than theoretical guessing.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-004", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "references/gemini-audio-analysis.md", "line": null, "title": "Audio analysis reference is remarkably honest about tool limitations", "description": "The gemini-audio-analysis.md reference documents not just what Gemini and ChatGPT do well, but specifically where they fail and why. The temperature findings, blind vs. prompted analysis comparison, and ChatGPT reliability warnings show genuine empirical rigor. This prevents the agent from making overconfident recommendations based on unreliable analysis tools.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "enhancement-opportunities-014", "scanner": "enhancement-opportunities", "section": "creative", "type": "strength", "severity": "strength", "rank": 5, "category": "facilitative-pattern", "file": "SKILL.md", "line": null, "title": "Capture-Don't-Interrupt pattern is explicitly implemented and well-placed", "description": "Step 1 explicitly instructs the agent to capture creative context (concept album plans, song sequencing ideas) without redirecting the user, and to carry that context forward to Step 5. This is a textbook implementation of the Capture-Don't-Interrupt pattern and will produce significantly richer adjustment recommendations than a strict 'stay on topic' approach.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "enhancement-opportunities-015", "scanner": "enhancement-opportunities", "section": "creative", "type": "strength", "severity": "strength", "rank": 5, "category": "facilitative-pattern", "file": "SKILL.md", "line": null, "title": "Soft Gate Elicitation is used at natural transition points", "description": "Steps 4c and 4d both include soft gates ('anything else before I build the recommendations?') at exactly the right moments -- after elicitation but before committing to adjustment mapping. This draws out information the user forgot to mention and prevents premature closure.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "enhancement-opportunities-016", "scanner": "enhancement-opportunities", "section": "creative", "type": "strength", "severity": "strength", "rank": 5, "category": "edge-case", "file": "SKILL.md", "line": null, "title": "Contradictory feedback handler elegantly checks for structural contrast before assuming genuine contradiction", "description": "Step 4d's 'structural contrast quick-check' is a brilliant design choice. Many users who say 'more energetic but also more chill' are actually describing dynamic contrast between sections -- quiet verses and loud choruses. Checking for this before launching a First Principles reset saves users from an unnecessarily heavy intervention and shows genuine musical understanding.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "enhancement-opportunities-017", "scanner": "enhancement-opportunities", "section": "creative", "type": "strength", "severity": "strength", "rank": 5, "category": "delight-opportunity", "file": "SKILL.md", "line": null, "title": "Before/After narrative preview humanizes the technical recommendations", "description": "Step 6 opens with a non-technical narrative comparing current output to target output ('Right now it probably sounds like a big arena rock track... The adjustments should pull it toward a coffee-shop acoustic feel'). This grounds the technical parameter changes in the user's emotional experience and helps them evaluate whether the recommendations match their intent before trying them.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "enhancement-opportunities-018", "scanner": "enhancement-opportunities", "section": "creative", "type": "strength", "severity": "strength", "rank": 5, "category": "edge-case", "file": "references/feedback-triage-guide.md", "line": null, "title": "Production Diagnostic Patterns table catches non-obvious root causes that would stump most users", "description": "The table mapping feedback patterns like 'guitar dominates' to root causes like 'bass prominence is a Suno limitation in rock/metal' and 'funk triggers slap/pop bass' demonstrates deep platform-specific knowledge. These are exactly the patterns a user would never figure out alone and where the skill earns its value as a specialized collaborator.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "execution-efficiency-001", "scanner": "execution-efficiency", "section": "efficiency", "type": "strength", "severity": "strength", "rank": 5, "category": "resource-optimization", "file": "SKILL.md", "line": 104, "title": "Reference files loaded selectively per feedback type", "description": "feedback-triage-guide.md is loaded only at Step 3 (triage), and suno-parameter-map.md is loaded only at Steps 4a/4e (when parameter mapping is needed). This avoids loading large reference documents until the specific capability requires them.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "execution-efficiency-002", "scanner": "execution-efficiency", "section": "efficiency", "type": "strength", "severity": "strength", "rank": 5, "category": "batching", "file": "SKILL.md", "line": 100, "title": "parse-feedback.py combines validation and dimension extraction in a single pass", "description": "The script handles both validation and structured dimension extraction in one invocation rather than requiring separate validation and parsing steps. This is an efficient batching pattern that avoids redundant file processing.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "execution-efficiency-003", "scanner": "execution-efficiency", "section": "efficiency", "type": "strength", "severity": "strength", "rank": 5, "category": "memory-optimization", "file": "SKILL.md", "line": 53, "title": "Config loading delegated to bmad-init with graceful fallback", "description": "On Activation delegates config loading to the bmad-init skill rather than reading config files directly, and includes a fallback if bmad-init is unavailable. This keeps the activation path lean and avoids loading unnecessary configuration data.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "execution-efficiency-004", "scanner": "execution-efficiency", "section": "efficiency", "type": "strength", "severity": "strength", "rank": 5, "category": "delegation", "file": "SKILL.md", "line": 210, "title": "Script-based adjustment mapping keeps LLM context lean", "description": "Step 5 delegates parameter mapping to map-adjustments.py rather than having the LLM reason through all parameter combinations. The script handles consistency validation and character count checks deterministically, reserving LLM judgment for refinement based on full context. This is an efficient division of labor.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-000", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "strength", "rank": 5, "category": "overview-quality", "file": "SKILL.md", "line": 8, "title": "Overview establishes mission, domain context, and design rationale concisely", "description": "The 7-line Overview covers what the agent does (feedback-to-parameter translation), domain constraints (agent cannot hear songs, users range from musicians to casual listeners), five feedback types, and design rationale (why triage-first matters). This is exactly the kind of context that enables intelligent improvisation when situations don't match the script.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-001", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "strength", "rank": 5, "category": "persona-voice", "file": "SKILL.md", "line": 10, "title": "A&R collaborator persona is load-bearing and consistent throughout", "description": "The 'music producer's A&R collaborator' framing carries through all workflow steps — celebrating positive feedback, using natural conversational prompts, bridging emotional vocabulary to technical parameters. This persona context directly shapes output quality for a companion-interactive skill.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-002", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "strength", "rank": 5, "category": "progressive-disclosure", "file": "SKILL.md", "line": 104, "title": "Good use of mandatory reference loading for detailed content", "description": "Step 3 directs 'Load references/feedback-triage-guide.md for detailed classification rules' and Step 4a/4e direct loading of suno-parameter-map.md. These are mandatory directives, not suggestive. The triage guide and parameter map contain substantial domain knowledge that would bloat SKILL.md if inlined.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-006", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "strength", "rank": 5, "category": "self-containment", "file": "SKILL.md", "line": 51, "title": "On Activation includes config fallback for resilience", "description": "Line 57 specifies 'If bmad-init is unavailable, greet generically and default communication_language to English. Do not block the workflow.' This graceful degradation prevents the skill from stalling when dependencies are unavailable.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-007", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "strength", "rank": 5, "category": "intelligence-placement", "file": "SKILL.md", "line": 207, "title": "Good script/LLM boundary in adjustment mapping workflow", "description": "Step 5 correctly delegates structured dimension extraction and parameter mapping to scripts (parse-feedback.py, map-adjustments.py) while reserving LLM judgment for refining recommendations based on full context, band profile, and creative intent. This is the right boundary — scripts handle deterministic lookups, the LLM handles semantic interpretation.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-008", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "strength", "rank": 5, "category": "outcome-balance", "file": "SKILL.md", "line": 146, "title": "Vague feedback elicitation includes non-convergence fallbacks", "description": "Steps 4c and 4d both include fallback strategies when elicitation doesn't converge — suggesting 2-3 variants to turn an elicitation problem into a selection problem. This shows mature outcome-driven design that handles real-world failure modes rather than assuming the happy path.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "structure-004", "scanner": "structure", "section": "structure-capabilities", "type": "strength", "severity": "strength", "rank": 5, "category": "frontmatter", "file": "SKILL.md", "line": 2, "title": "Description follows two-part format with specific quoted trigger phrases", "description": "The description uses the correct format: a brief summary ('Guides post-generation feedback refinement for Suno music output') followed by a trigger clause with quoted phrases ('refine a song', 'give feedback on Suno output', 'improve my generation'). This should trigger reliably and distinguish this skill from the Style Prompt Builder and Lyric Transformer.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "structure-005", "scanner": "structure", "section": "structure-capabilities", "type": "strength", "severity": "strength", "rank": 5, "category": "identity", "file": "SKILL.md", "line": 8, "title": "Overview contains strong implicit identity and domain context", "description": "The Overview effectively establishes domain context, the vocabulary gap problem, and the five feedback types. The 'Design rationale' paragraph is particularly strong -- it explains WHY the skill works the way it does, not just what it does. However, this identity content should be extracted into a dedicated Identity section for proper behavioral priming.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "structure-006", "scanner": "structure", "section": "structure-capabilities", "type": "strength", "severity": "strength", "rank": 5, "category": "headless-mode", "file": "SKILL.md", "line": 16, "title": "Headless mode is well-documented with output contract and sub-modes", "description": "The Activation Mode Detection section defines three headless sub-modes (analyze, adjustments, default) with a clear JSON output contract. This is a strong headless implementation pattern.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "structure-007", "scanner": "structure", "section": "structure-capabilities", "type": "strength", "severity": "strength", "rank": 5, "category": "activation-sequence", "file": "SKILL.md", "line": 51, "title": "Activation sequence is logically ordered with proper fallbacks", "description": "The activation flow (load config, greet, intent check, proceed) is correct. The config fallback ('If bmad-init is unavailable, greet generically') prevents blocking on external dependencies. The intent check correctly redirects non-feedback requests to appropriate skills.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "structure-008", "scanner": "structure", "section": "structure-capabilities", "type": "strength", "severity": "strength", "rank": 5, "category": "consistency", "file": "SKILL.md", "line": 65, "title": "Workflow steps are comprehensive and logically structured", "description": "The 7-step workflow covers the full feedback loop from receiving feedback through handoff. Each feedback type routes to a dedicated step with appropriate strategy. Escape hatches and non-convergence fallbacks demonstrate thoughtful error handling. The workflow maintains logical consistency throughout.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}], "journeys": [], "assessments": {"cohesion_analysis": {"persona_alignment": {"score": "strong", "notes": "The A&R collaborator persona fits perfectly with the capabilities. The skill genuinely acts as a translator between subjective musical reactions and technical parameters. The communication style (natural prompts, celebration of positive feedback, non-judgmental handling of contradictions) matches the persona's collaborative, empathetic role. The three-phase elicitation sequence for vague feedback is exactly what an experienced A&R person would do in practice."}, "capability_completeness": {"score": "mostly-complete", "missing_areas": ["Audio analysis integration (scripts exist but are not referenced in the workflow)", "Multi-version comparative feedback handling", "Accumulated learning shortcuts from band profile history"], "notes": "The core feedback-to-adjustment pipeline is complete and well-designed. The gaps are enhancement opportunities rather than broken workflows. The most notable gap is that 6 audio analysis scripts sit in the scripts directory but are never used in the feedback workflow -- integrating even basic librosa analysis would significantly improve triage accuracy for vague feedback."}, "redundancy_level": {"score": "clean", "consolidation_opportunities": [{"capabilities": ["gemini-audio-analysis.md playlist sequencing", "playlist-sequencing-data.py", "chord-progression.py"], "suggested_consolidation": "Playlist sequencing content (Camelot wheel, BPM transitions, sequencing scripts) is unrelated to feedback elicitation and should live in a catalog/sequencing skill or shared references"}]}, "external_integration": {"external_skills_referenced": 3, "integration_pattern": "intentional", "notes": "References bmad-init (config), bmad-suno-style-prompt-builder (downstream handoff), and bmad-suno-lyric-transformer (downstream handoff). The bidirectional after/before relationship in the manifest correctly models the iterative refinement loop. The headless handoff modes (--headless:refine) are well-specified. Integration with the Band Manager orchestrating agent is documented in the README."}, "user_journey_score": {"score": "complete-end-to-end", "broken_workflows": [], "notes": "A user can enter with any type of feedback (clear, vague, contradictory, positive, technical) and leave with actionable Suno parameter adjustments ready to apply. The handoff to downstream skills is concrete, the iteration log enables multi-session work, and the headless mode enables automation. No dead-end operations exist -- even the non-convergence fallbacks (variant generation) provide a forward path. The only gap is that returning users with iteration history don't get differentiated treatment in the triage phase."}}, "agent_identity": {"name": "bmad-suno-feedback-elicitor", "persona_summary": "A music producer's A&R collaborator who bridges the gap between subjective musical reactions and Suno-actionable parameter changes. Understands that users often know something is wrong but lack vocabulary to express it.", "primary_purpose": "Guide post-generation feedback refinement, translating subjective reactions into concrete Suno parameter adjustments for the Style Prompt Builder and Lyric Transformer", "capability_count": 7}, "overall_cohesion": "cohesive", "autonomous_assessment": {"potential": "headless-ready", "hitl_points": 7, "auto_resolvable": 5, "needs_input": 2, "suggested_output_contract": "JSON with feedback_analysis (triage type, dimensions, confidence), adjustment_recommendations (style prompt changes, exclusions, sliders, lyrics, model, studio features), confidence_scores, iteration_log, and suggested_next_action", "required_inputs": ["--feedback (text or JSON, required)", "--style-prompt (original style prompt, required for adjustment mode)", "--model (Suno model used, optional but improves recommendations)", "--sliders (JSON with Weirdness/StyleInfluence values, optional)", "--lyrics (file path to original lyrics, optional)", "--band-profile (profile name for context, optional)", "--iteration-log (file path to previous round log, optional)"], "notes": "The skill is already headless-ready with explicit --headless flags and a defined output contract. The main gap is formalizing the input contract per sub-mode. The interactive elicitation steps (binary narrowing, comparative anchoring, emotional vocabulary bridge) are the genuinely interactive value -- in headless mode these are bypassed via LLM triage, which is the right design. The two HITL points that truly need input are: (1) feedback itself, which cannot be auto-generated, and (2) the original style prompt for adjustment mode, which is needed for meaningful diff recommendations."}, "skill_understanding": {"purpose": "Translates subjective musical reactions into concrete Suno parameter adjustments through guided elicitation, bridging the vocabulary gap between what users feel and what Suno needs to hear", "primary_user": "Non-technical music creators using Suno who know something is wrong with their generation but lack the musical vocabulary to articulate what, ranging from complete beginners to experienced musicians", "key_assumptions": ["The agent cannot hear the generated audio -- all analysis is through user description", "Users give feedback about a single generation at a time", "Users will complete the feedback loop in a single session", "The bmad-init and band profile ecosystem is available or gracefully absent", "Users can provide the original style prompt when asked", "Feedback falls cleanly into one of five types or a manageable mix"]}, "top_insights": [{"title": "The skill owns a sophisticated audio analysis pipeline but never offers to use it during feedback elicitation", "detail": "gemini-audio-analysis.md documents librosa, Gemini blind analysis, and ChatGPT cross-referencing -- tools that could objectively identify what Suno produced vs. what was prompted. The entire vague-feedback elicitation path (the skill's hardest and most valuable capability) could be dramatically shortened by saying 'let me listen to the file and tell you what I hear.' The agent cannot hear, but its tools can.", "action": "Add optional audio file intake at Step 2. When available, run librosa for BPM/key and Gemini blind analysis for genre/instruments. Use objective findings to pre-narrow dimensions before asking the user to articulate what feels wrong. This transforms the skill from 'translating feelings into parameters' to 'confirming what the data already shows.'"}, {"title": "Comparative multi-generation feedback is a natural user behavior the skill does not support", "detail": "Users who generate 3-5 versions on Suno (as the skill itself recommends) naturally compare them: 'version 3 is closest but version 1 had better vocals.' This comparative signal is richer than single-generation feedback and the skill should capture and leverage it rather than forcing single-generation analysis.", "action": "Add a comparative feedback sub-path in Step 1 that captures what worked and what did not across multiple generations, synthesizing a composite target from the best elements of each."}, {"title": "Lead with reference-based elicitation for the vaguest feedback instead of binary narrowing", "detail": "The current escape hatch -- 'name a song that sounds like what you wanted' -- is already the most natural and powerful elicitation technique for non-musicians. Promoting it from fallback to primary path for maximally vague feedback would reduce the quiz-like feeling of binary narrowing and reach actionable signal faster.", "action": "Restructure Phase 1 of vague feedback elicitation: if initial feedback shows no dimensional awareness, lead with comparative anchoring (reference song) instead of binary narrowing. Reserve binary narrowing for users who show some dimensional awareness in their initial feedback."}], "prompt_health": {"total_prompts": 1, "prompts_with_config_header": 0, "prompts_with_progression": 0}, "skillmd_assessment": {"overview_quality": "appropriate", "progressive_disclosure": "good", "persona_context": "appropriate", "notes": "SKILL.md is well-structured for a companion-interactive agent with strong domain framing and consistent persona voice. At 6303 tokens it's modestly over the ~5000 guideline — the output template and headless contract are the main extraction candidates. Progressive disclosure to references is already well-implemented for triage rules and parameter maps."}}, "section_labels": {"structural": "Structural", "structure-capabilities": "Structure & Capabilities", "prompt-craft": "Prompt Craft", "efficiency": "Efficiency", "cohesion": "Cohesion", "quality": "Path & Script Standards", "scripts": "Scripts", "script-opportunities": "Script Opportunities", "creative": "Creative & Enhancements"}}</script>
<script>
const DATA = JSON.parse(document.getElementById('report-data').textContent);
const selected = new Set();

function init() {
  const m = DATA.meta;
  const es = DATA.executive_summary;
  document.getElementById('skill-name').textContent = m.skill_name;
  document.getElementById('subtitle').textContent = `${m.skill_path} \u2022 ${m.timestamp.split('T')[0]} \u2022 ${m.scanner_count} scanners`;

  // Executive summary
  let html = `<div class="grade grade-${es.grade}">${es.grade}</div>`;
  html += `<dl class="summary-grid">`;
  html += `<dt>Issues</dt><dd>${es.total_issues} total \u2014 ${es.counts.critical} critical, ${es.counts.high} high, ${es.counts.medium} medium, ${es.counts.low} low</dd>`;
  if (es.enhancement_count) html += `<dt>Enhancements</dt><dd>${es.enhancement_count} opportunities identified</dd>`;
  if (es.strength_count) html += `<dt>Strengths</dt><dd>${es.strength_count} noted</dd>`;
  if (es.craft_assessment) html += `<dt>Craft</dt><dd>${esc(es.craft_assessment)}</dd>`;
  if (es.overall_cohesion) html += `<dt>Cohesion</dt><dd>${esc(es.overall_cohesion)}</dd>`;
  html += `</dl>`;
  document.getElementById('exec-summary').innerHTML = html;

  // Severity filters
  renderFilters();

  // Sections
  renderSections();
}

// --- Severity filters ---
const activeFilters = new Set(['critical','high','medium','low','high-opportunity','medium-opportunity','low-opportunity','strength','suggestion','note','info']);

function renderFilters() {
  const counts = {};
  DATA.items.forEach(i => { counts[i.severity] = (counts[i.severity]||0) + 1; });
  const order = ['critical','high','medium','low','high-opportunity','medium-opportunity','low-opportunity','strength','suggestion','note'];
  let html = '';
  order.forEach(s => {
    if (!counts[s]) return;
    const active = activeFilters.has(s) ? 'active' : '';
    html += `<span class="badge badge-${s} ${active}" data-sev="${s}" onclick="toggleFilter('${s}')">${s.replace('-',' ')} ${counts[s]}</span>`;
  });
  document.getElementById('filters').innerHTML = html;
}

function toggleFilter(sev) {
  if (activeFilters.has(sev)) activeFilters.delete(sev); else activeFilters.add(sev);
  renderFilters();
  renderSections();
}

// --- Sections ---
function renderSections() {
  const groups = {};
  const sectionOrder = ['structural','structure-capabilities','prompt-craft','cohesion','efficiency','quality','scripts','script-opportunities','creative'];

  DATA.items.forEach(i => {
    if (!activeFilters.has(i.severity)) return;
    const s = i.section;
    if (!groups[s]) groups[s] = [];
    groups[s].push(i);
  });

  // Truly broken (always first, always open)
  const broken = DATA.items.filter(i => i.type === 'issue' && (i.severity === 'critical' || i.severity === 'high'));
  const brokenIds = new Set(broken.map(i => i.id));
  // Strengths
  const strengths = DATA.items.filter(i => i.type === 'strength' && activeFilters.has(i.severity));

  let html = '';

  if (broken.length) {
    html += renderSection('truly-broken', `Truly Broken / Missing (${broken.length})`, broken, true);
  }
  if (strengths.length) {
    html += renderSection('strengths', `Strengths (${strengths.length})`, strengths, false);
  }

  sectionOrder.forEach(sec => {
    // Exclude strengths (shown above) and items already in Truly Broken
    const items = (groups[sec] || []).filter(i => i.type !== 'strength' && !brokenIds.has(i.id));
    if (!items.length) return;
    const label = DATA.section_labels[sec] || sec;
    html += renderSection(sec, `${label} (${items.length})`, items, false);
  });

  // User journeys
  if (DATA.journeys.length) {
    html += renderJourneysSection();
  }

  // Assessments
  if (Object.keys(DATA.assessments).length) {
    html += renderAssessmentsSection();
  }

  document.getElementById('sections').innerHTML = html;
}

function renderSection(id, label, items, startOpen) {
  const openCls = startOpen ? 'open' : '';
  let html = `<div class="section"><div class="section-header ${openCls}" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">${label}</span>`;
  html += `</div><div class="section-body ${openCls}">`;
  items.forEach(i => { html += renderItem(i); });
  html += `</div></div>`;
  return html;
}

function renderItem(item) {
  const isStrength = item.type === 'strength';
  const chk = item.selectable ? `<input type="checkbox" class="item-check" data-id="${item.id}" ${selected.has(item.id)?'checked':''} onchange="toggleSelect('${item.id}', this.checked)">` : '';
  const sev = `<span class="badge badge-${item.severity}">${item.severity.replace('-',' ')}</span>`;
  const file = item.file ? `<span class="item-file">${esc(item.file)}${item.line ? ':'+item.line : ''}</span>` : '';
  const desc = item.description && item.description !== item.title ? `<div class="item-desc">${esc(item.description)}</div>` : '';
  // Suppress action/impact for strengths — "N/A" is noise
  const actionText = item.action && !isStrength && item.action !== 'N/A' ? item.action : '';
  const action = actionText ? `<div class="item-action"><strong>${item.action_type === 'fix' ? 'Fix' : item.action_type === 'create-script' ? 'Script' : 'Suggestion'}:</strong> ${esc(actionText)}</div>` : '';
  const impactText = item.impact && !isStrength && item.impact !== 'N/A' ? item.impact : '';
  const impact = impactText ? `<div class="item-impact">Impact: ${esc(impactText)}</div>` : '';
  const copyBtn = item.selectable ? `<button class="copy-btn" onclick="copySinglePrompt('${item.id}')" title="Copy prompt for this item">\u2398</button>` : '';

  return `<div class="item">${chk}<div class="item-body">${sev} ${file}<div class="item-title">${esc(item.title)}</div>${desc}${action}${impact}</div><div class="item-actions">${copyBtn}</div></div>`;
}

function renderJourneysSection() {
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">User Journeys (${DATA.journeys.length})</span>`;
  html += `</div><div class="section-body">`;
  DATA.journeys.forEach(j => {
    html += `<div class="journey"><h4>${esc(j.archetype)}</h4>`;
    html += `<p>${esc(j.journey_summary)}</p>`;
    if (j.friction_points && j.friction_points.length) {
      html += `<ul class="friction">`;
      j.friction_points.forEach(fp => { html += `<li>${esc(fp)}</li>`; });
      html += `</ul>`;
    }
    if (j.bright_spots && j.bright_spots.length) {
      html += `<ul class="bright">`;
      j.bright_spots.forEach(bs => { html += `<li>${esc(bs)}</li>`; });
      html += `</ul>`;
    }
    html += `</div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderAssessmentsSection() {
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">Assessments & Analysis</span>`;
  html += `</div><div class="section-body">`;

  const ca = DATA.assessments.cohesion_analysis;
  if (ca) {
    html += `<div class="assessment"><h4>Cohesion Analysis</h4><table><tr><th>Dimension</th><th>Score</th><th>Notes</th></tr>`;
    Object.entries(ca).forEach(([dim, val]) => {
      if (typeof val === 'object' && val.score) {
        html += `<tr><td>${esc(dim.replace(/_/g, ' '))}</td><td>${esc(val.score)}</td><td>${esc(val.notes || '')}</td></tr>`;
      }
    });
    html += `</table></div>`;
  }

  const aa = DATA.assessments.autonomous_assessment;
  if (aa) {
    html += `<div class="assessment"><h4>Autonomous Readiness</h4><table>`;
    html += `<tr><td>Overall Potential</td><td>${esc(aa.potential||aa.overall_potential||'')}</td></tr>`;
    html += `<tr><td>HITL Points</td><td>${aa.hitl_points||aa.hitl_interaction_points||0}</td></tr>`;
    html += `<tr><td>Auto-Resolvable</td><td>${aa.auto_resolvable||0}</td></tr>`;
    html += `<tr><td>Needs Input</td><td>${aa.needs_input||0}</td></tr>`;
    if (aa.notes) html += `<tr><td>Notes</td><td>${esc(aa.notes)}</td></tr>`;
    html += `</table></div>`;
  }

  const ti = DATA.assessments.top_insights;
  if (ti && ti.length) {
    html += `<div class="assessment"><h4>Top Insights</h4>`;
    ti.forEach(t => {
      const tiTitle = t.title || t.insight || '';
      const tiDetail = t.detail || t.why_it_matters || '';
      const tiAction = t.action || t.suggestion || '';
      html += `<div style="margin:0.5rem 0"><strong>${esc(tiTitle)}</strong>`;
      if (tiDetail) html += `<br><em>Context:</em> ${esc(tiDetail)}`;
      if (tiAction) html += `<br><em>Suggestion:</em> ${esc(tiAction)}`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

// --- Interactions ---
function toggleSection(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function toggleSelect(id, checked) {
  if (checked) selected.add(id); else selected.delete(id);
  document.getElementById('sel-count').textContent = selected.size;
  document.getElementById('footer').classList.toggle('hidden', selected.size === 0);
}

// --- Prompt Generation ---
function itemById(id) { return DATA.items.find(i => i.id === id); }

function buildPromptForItem(item) {
  let p = '';
  const sev = item.severity.replace('-', ' ').toUpperCase();
  const loc = item.file ? `${item.file}${item.line ? ':'+item.line : ''}` : '';
  p += `**[${sev}] ${item.title}**\n`;
  if (loc) p += `- File: ${loc}\n`;
  if (item.description && item.description !== item.title) p += `- Context: ${item.description}\n`;
  if (item.action) {
    const label = item.action_type === 'fix' ? 'Fix' : item.action_type === 'create-script' ? 'Create script' : 'Suggestion';
    p += `- ${label}: ${item.action}\n`;
  }
  if (item.impact) p += `- Impact: ${item.impact}\n`;
  return p;
}

function buildPrompt(ids) {
  const items = ids.map(itemById).filter(Boolean);
  const fixes = items.filter(i => i.action_type === 'fix');
  const scripts = items.filter(i => i.action_type === 'create-script');
  const enhancements = items.filter(i => i.action_type === 'enhance' || i.action_type === 'refactor');

  let prompt = `## Task: Quality Improvements for ${DATA.meta.skill_name}\nSkill path: ${DATA.meta.skill_path}\n\n`;

  if (fixes.length) {
    prompt += `### Fix These Issues (${fixes.length})\n\n`;
    fixes.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  if (scripts.length) {
    prompt += `### Create These Scripts (${scripts.length})\n\n`;
    scripts.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  if (enhancements.length) {
    prompt += `### Implement These Enhancements (${enhancements.length})\n\n`;
    enhancements.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  return prompt.trim();
}

function copySinglePrompt(id) {
  const item = itemById(id);
  if (!item) return;
  let prompt = `## Task: Quality Fix for ${DATA.meta.skill_name}\nSkill path: ${DATA.meta.skill_path}\n\n`;
  prompt += buildPromptForItem(item);
  navigator.clipboard.writeText(prompt).then(() => {
    const btn = document.querySelector(`[onclick="copySinglePrompt('${id}')"]`);
    if (btn) { btn.classList.add('copied'); btn.textContent = '\u2713'; setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '\u2398'; }, 1500); }
  });
}

function showBatchPrompt() {
  const prompt = buildPrompt([...selected]);
  document.getElementById('modal-content').textContent = prompt;
  document.getElementById('modal').classList.add('visible');
}

function closeModal() { document.getElementById('modal').classList.remove('visible'); }

function copyModal() {
  const text = document.getElementById('modal-content').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.modal-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; }, 1500);
  });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

init();
</script>
</body>
</html>
