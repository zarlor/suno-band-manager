 input/output contract", "description": "The create-song headless contract is well-structured with sensible defaults for every optional parameter. The fact that it exists at all puts this agent ahead of most -- it was designed with automation in mind from the start. The contract is clean enough that another agent or script could invoke it today.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "enhancement-opportunities-021", "scanner": "enhancement-opportunities", "section": "creative", "type": "strength", "severity": "strength", "rank": 5, "category": "delight-opportunity", "file": "SKILL.md", "line": 30, "title": "Research Discipline section prevents confident hallucination about a rapidly changing platform", "description": "The explicit instruction to search first, treat reference files as starting points, and verify artist references through research rather than training knowledge is unusually disciplined. This directly addresses one of the highest-risk failure modes for a music production agent: confidently asserting Suno behaviors that changed last week. The instruction to state uncertainty honestly when no search tool is available is the right call.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "enhancement-opportunities-022", "scanner": "enhancement-opportunities", "section": "creative", "type": "strength", "severity": "strength", "rank": 5, "category": "experience-gap", "file": "USAGE.md", "line": null, "title": "USAGE.md is comprehensive and genuinely useful as standalone documentation", "description": "The usage guide covers every capability with concrete examples, explains the feedback elicitation process in detail, documents headless modes, and includes a troubleshooting section that addresses real user problems. The example Suno package output with all fields filled in is especially valuable -- it shows the user exactly what to expect. This is not a perfunctory README; it is a real user guide.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "execution-efficiency-000", "scanner": "execution-efficiency", "section": "efficiency", "type": "strength", "severity": "strength", "rank": 5, "category": "parallelization", "file": "SKILL.md", "line": 57, "title": "Essentials loaded as explicit parallel batch on activation", "description": "access-boundaries.md, index.md, and bmad-manifest.json are loaded in a single parallel batch during On Activation. This is the correct pattern for independent reads that are all needed at startup.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "execution-efficiency-001", "scanner": "execution-efficiency", "section": "efficiency", "type": "strength", "severity": "strength", "rank": 5, "category": "parallelization", "file": "create-song.md", "line": 121, "title": "Steps 3 and 4 explicitly marked as parallel-safe with rationale", "description": "The note 'Steps 3 and 4 are independent — the Style Prompt Builder does not need the Lyric Transformer output. When both need to run, invoke them in parallel for faster results.' is an exemplary parallelization annotation. It explains the independence condition and the benefit.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "execution-efficiency-002", "scanner": "execution-efficiency", "section": "efficiency", "type": "strength", "severity": "strength", "rank": 5, "category": "parallelization", "file": "refine-song.md", "line": 62, "title": "Conditional parallel routing for independent adjustments in refine flow", "description": "The refine-song prompt correctly distinguishes between independent adjustments (run both skills in parallel) and dependent ones (lyrics first, then style prompt). This conditional parallelization logic is well-designed.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "execution-efficiency-003", "scanner": "execution-efficiency", "section": "efficiency", "type": "strength", "severity": "strength", "rank": 5, "category": "memory-optimization", "file": "references/memory-system.md", "line": null, "title": "Selective memory loading with load-on-demand discipline", "description": "Memory system defines index.md and access-boundaries.md as 'load on activation' while patterns.md and chronology.md are 'load when needed.' This prevents unnecessary token consumption from loading all sidecar files every session.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "execution-efficiency-009", "scanner": "execution-efficiency", "section": "efficiency", "type": "strength", "severity": "strength", "rank": 5, "category": "delegation", "file": "SKILL.md", "line": 96, "title": "Context pass-through to external skills avoids re-gathering", "description": "The instruction 'When invoking these skills, pass relevant context... so the skill doesn't re-ask for information the user already provided' prevents redundant data gathering. Combined with the research discipline note to 'include any research findings so they don't need to re-search,' this is efficient context forwarding.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "execution-efficiency-010", "scanner": "execution-efficiency", "section": "efficiency", "type": "strength", "severity": "strength", "rank": 5, "category": "delegation", "file": "SKILL.md", "line": 98, "title": "Write delegation to specialized skill preserves access boundary integrity", "description": "Band profile writes are explicitly delegated to bmad-suno-band-profile-manager rather than handled directly by Mac. This is both a security pattern and an efficient delegation pattern — Mac doesn't need to load profile management logic.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}], "journeys": [], "assessments": {"cohesion_analysis": {"persona_alignment": {"score": "strong", "notes": "Mac's persona as a warm, music-savvy band manager with producer instincts is deeply aligned with every capability. The communication style (production metaphors, adaptive vocabulary, encouraging but honest) is consistently reflected in all prompt files. The three interaction modes map naturally to a producer who can work fast (Demo), deep (Studio), or experimental (Jam). The research discipline fits a producer who stays current. The memory system fits a manager who remembers their artists. There is no capability that feels like it belongs to a different persona."}, "capability_completeness": {"score": "mostly-complete", "missing_areas": ["songbook cleanup/deletion", "songbook search and filtering", "album/project-level planning"], "notes": "The core creative workflow (create -> refine -> save -> browse) is fully supported end-to-end. The four external skills cover the key specialized tasks. The main gaps are in songbook management at scale (no delete, no search) and in multi-song project planning. These are not glaring omissions for early use but will become friction points as users build larger creative histories."}, "redundancy_level": {"score": "clean", "consolidation_opportunities": [{"capabilities": ["create-song Step 6 (Quick Refinement)", "refine-song (RS)"], "suggested_consolidation": "Not necessarily consolidation -- the overlap is intentional for UX flow. But the boundary heuristic ('clear, simple tweaks' vs. 'deeper feedback') could be documented more precisely to avoid agent confusion about when to handle inline vs. route to the Feedback Elicitor."}]}, "external_integration": {"external_skills_referenced": 4, "integration_pattern": "intentional", "notes": "The four external skills (Band Profile Manager, Style Prompt Builder, Lyric Transformer, Feedback Elicitor) each have a clear, distinct role in the workflow. The orchestration pattern is well-defined: Mac gathers context and delegates specialized work. Context passing between skills is explicitly designed (pass band profile data, model selection, creativity mode). The manifest cleanly distinguishes between prompt-based capabilities (Mac handles directly) and skill-based capabilities (delegated). The degradation path for missing skills is thoughtful. This is a well-architected skill integration."}, "user_journey_score": {"score": "complete-end-to-end", "broken_workflows": [], "notes": "A user can accomplish the full creative journey: first-run setup -> create song -> try on Suno -> refine with feedback -> save progress -> browse history -> resume later. Entry points are clear (menu with codes, natural language, mode selection). Exit points provide value (complete Suno-ready package every time). The only friction is at scale -- browsing a large songbook without search, and no album-level planning. But for the core use case of creating and refining individual songs, the journey is seamless."}}, "agent_identity": {"name": "bmad-suno-agent-band-manager", "persona_summary": "Mac -- a warm, New Orleans-inspired band manager and producer who guides users through Suno music creation with three interaction modes (Demo for speed, Studio for depth, Jam for experimentation), orchestrating four specialized skills into a seamless creative workflow with iterative refinement.", "primary_purpose": "Orchestrate Suno music creation by bridging the gap between a user's musical vision and Suno's required inputs (style prompt + lyrics), producing complete copy-paste-ready packages through guided creative conversation and iterative post-generation refinement.", "capability_count": 8}, "overall_cohesion": "cohesive", "autonomous_assessment": {"potential": "easily-adaptable", "hitl_points": 8, "auto_resolvable": 6, "needs_input": 2, "suggested_output_contract": "Complete Suno package as structured JSON containing: style_prompt (string), lyrics (string with metatags), exclude_styles (s ct in a single continuous session per song creation/refinement cycle", "Users can articulate enough about their musical vision to give Mac a starting point"]}, "top_insights": [{"title": "First-run setup is the highest-friction moment and should be replaced with progressive preference discovery", "detail": "Every question between 'hello' and 'tell me about your song' is a dropout risk. The four setup questions ask for decisions the user has no basis to make yet (mode preference, exclusion defaults). Deferring all preferences to organic discovery during the first creative workflow would eliminate the setup wall entirely while capturing the same information.", "action": "Remove the explicit first-run interview. Set sensible defaults (Free tier, Demo mode, no exclusions). During the first create-song flow, ask tier casually, let mode emerge from behavior, and capture preferences as they naturally surface. Save everything at the end of the first session."}, {"title": "A pre-presentation consistency check would reduce Suno generation round-trips", "detail": "The assembled package goes directly from skill outputs to user presentation. A quick internal coherence check (style prompt vs. lyric energy, exclusions vs. genre implications, character limit compliance, known Suno pitfalls) would catch mismatches before the user wastes a generation on Suno. Given that Suno credits are limited (especially on Free tier), preventing a wasted generation is high-value.", "action": "Add a three-lens review step before Step 5 presentation: coherence across package components, Suno pitfall detection (leveraging the extensive knowledge in SUNO-REFERENCE.md), and wild card differentiation check."}, {"title": "Mac's producer persona could be more generative during creative direction, not just receptive", "detail": "A real producer hears what you describe and makes creative leaps -- 'that reminds me of...' or 'what if we tried...' Mac currently gathers direction through questions but rarely offers unexpected creative connections. In Studio and Jam modes especially, one proactive creative suggestion per song would make Mac feel like a collaborator rather than a form processor.", "action": "Add a 'creative riff' behavior to Studio and Jam modes: after initial direction, Mac offers one unexpected musical connection or creative suggestion before building the package. Keep it to one per song to avoid being pushy."}], "prompt_health": {"total_prompts": 8, "prompts_with_config_header": 0, "prompts_with_progression": 5}, "skillmd_assessment": {"overview_quality": "appropriate", "progressive_disclosure": "needs-extraction", "persona_context": "appropriate", "notes": "SKILL.md at 107 lines and ~2425 tokens is well within guidelines for a multi-capability agent. Persona is established effectively across Overview, Identity, Communication Style, and Principles without redundancy. The Research Discipline section is slightly verbose but genuinely load-bearing. Main structural issue is SUNO-REFERENCE.md and USAGE.md sitting at root instead of in references/ or docs/ — together they represent ~14K tokens that could be inadvertently loaded."}}, "section_labels": {"structural": "Structural", "structure-capabilities": "Structure & Capabilities", "prompt-craft": "Prompt Craft", "efficiency": "Efficiency", "cohesion": "Cohesion", "quality": "Path & Script Standards", "scripts": "Scripts", "script-opportunities": "Script Opportunities", "creative": "Creative & Enhancements"}}</script>
<script>
const DATA = JSON.parse(document.getElementById('report-data').textContent);
const selected = new Set();

function init() {
  const m = DATA.meta;
  const es = DATA.executive_summary;
  document.getElementById('skill-name').textContent = m.skill_name;
  document.getElementById('subtitle').textContent = `${m.skill_path} \u2022 ${m.timestamp.split('T')[0]} \u2022 ${m.scanner_count} scanners`;

  // Executive summary
  let html = `<div class="grade grade-${es.grade}">${es.grade}</div>`;
  html += `<dl class="summary-grid">`;
  html += `<dt>Issues</dt><dd>${es.total_issues} total \u2014 ${es.counts.critical} critical, ${es.counts.high} high, ${es.counts.medium} medium, ${es.counts.low} low</dd>`;
  if (es.enhancement_count) html += `<dt>Enhancements</dt><dd>${es.enhancement_count} opportunities identified</dd>`;
  if (es.strength_count) html += `<dt>Strengths</dt><dd>${es.strength_count} noted</dd>`;
  if (es.craft_assessment) html += `<dt>Craft</dt><dd>${esc(es.craft_assessment)}</dd>`;
  if (es.overall_cohesion) html += `<dt>Cohesion</dt><dd>${esc(es.overall_cohesion)}</dd>`;
  html += `</dl>`;
  document.getElementById('exec-summary').innerHTML = html;

  // Severity filters
  renderFilters();

  // Sections
  renderSections();
}

// --- Severity filters ---
const activeFilters = new Set(['critical','high','medium','low','high-opportunity','medium-opportunity','low-opportunity','strength','suggestion','note','info']);

function renderFilters() {
  const counts = {};
  DATA.items.forEach(i => { counts[i.severity] = (counts[i.severity]||0) + 1; });
  const order = ['critical','high','medium','low','high-opportunity','medium-opportunity','low-opportunity','strength','suggestion','note'];
  let html = '';
  order.forEach(s => {
    if (!counts[s]) return;
    const active = activeFilters.has(s) ? 'active' : '';
    html += `<span class="badge badge-${s} ${active}" data-sev="${s}" onclick="toggleFilter('${s}')">${s.replace('-',' ')} ${counts[s]}</span>`;
  });
  document.getElementById('filters').innerHTML = html;
}

function toggleFilter(sev) {
  if (activeFilters.has(sev)) activeFilters.delete(sev); else activeFilters.add(sev);
  renderFilters();
  renderSections();
}

// --- Sections ---
function renderSections() {
  const groups = {};
  const sectionOrder = ['structural','structure-capabilities','prompt-craft','cohesion','efficiency','quality','scripts','script-opportunities','creative'];

  DATA.items.forEach(i => {
    if (!activeFilters.has(i.severity)) return;
    const s = i.section;
    if (!groups[s]) groups[s] = [];
    groups[s].push(i);
  });

  // Truly broken (always first, always open)
  const broken = DATA.items.filter(i => i.type === 'issue' && (i.severity === 'critical' || i.severity === 'high'));
  const brokenIds = new Set(broken.map(i => i.id));
  // Strengths
  const strengths = DATA.items.filter(i => i.type === 'strength' && activeFilters.has(i.severity));

  let html = '';

  if (broken.length) {
    html += renderSection('truly-broken', `Truly Broken / Missing (${broken.length})`, broken, true);
  }
  if (strengths.length) {
    html += renderSection('strengths', `Strengths (${strengths.length})`, strengths, false);
  }

  sectionOrder.forEach(sec => {
    // Exclude strengths (shown above) and items already in Truly Broken
    const items = (groups[sec] || []).filter(i => i.type !== 'strength' && !brokenIds.has(i.id));
    if (!items.length) return;
    const label = DATA.section_labels[sec] || sec;
    html += renderSection(sec, `${label} (${items.length})`, items, false);
  });

  // User journeys
  if (DATA.journeys.length) {
    html += renderJourneysSection();
  }

  // Assessments
  if (Object.keys(DATA.assessments).length) {
    html += renderAssessmentsSection();
  }

  document.getElementById('sections').innerHTML = html;
}

function renderSection(id, label, items, startOpen) {
  const openCls = startOpen ? 'open' : '';
  let html = `<div class="section"><div class="section-header ${openCls}" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">${label}</span>`;
  html += `</div><div class="section-body ${openCls}">`;
  items.forEach(i => { html += renderItem(i); });
  html += `</div></div>`;
  return html;
}

function renderItem(item) {
  const isStrength = item.type === 'strength';
  const chk = item.selectable ? `<input type="checkbox" class="item-check" data-id="${item.id}" ${selected.has(item.id)?'checked':''} onchange="toggleSelect('${item.id}', this.checked)">` : '';
  const sev = `<span class="badge badge-${item.severity}">${item.severity.replace('-',' ')}</span>`;
  const file = item.file ? `<span class="item-file">${esc(item.file)}${item.line ? ':'+item.line : ''}</span>` : '';
  const desc = item.description && item.description !== item.title ? `<div class="item-desc">${esc(item.description)}</div>` : '';
  // Suppress action/impact for strengths — "N/A" is noise
  const actionText = item.action && !isStrength && item.action !== 'N/A' ? item.action : '';
  const action = actionText ? `<div class="item-action"><strong>${item.action_type === 'fix' ? 'Fix' : item.action_type === 'create-script' ? 'Script' : 'Suggestion'}:</strong> ${esc(actionText)}</div>` : '';
  const impactText = item.impact && !isStrength && item.impact !== 'N/A' ? item.impact : '';
  const impact = impactText ? `<div class="item-impact">Impact: ${esc(impactText)}</div>` : '';
  const copyBtn = item.selectable ? `<button class="copy-btn" onclick="copySinglePrompt('${item.id}')" title="Copy prompt for this item">\u2398</button>` : '';

  return `<div class="item">${chk}<div class="item-body">${sev} ${file}<div class="item-title">${esc(item.title)}</div>${desc}${action}${impact}</div><div class="item-actions">${copyBtn}</div></div>`;
}

function renderJourneysSection() {
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">User Journeys (${DATA.journeys.length})</span>`;
  html += `</div><div class="section-body">`;
  DATA.journeys.forEach(j => {
    html += `<div class="journey"><h4>${esc(j.archetype)}</h4>`;
    html += `<p>${esc(j.journey_summary)}</p>`;
    if (j.friction_points && j.friction_points.length) {
      html += `<ul class="friction">`;
      j.friction_points.forEach(fp => { html += `<li>${esc(fp)}</li>`; });
      html += `</ul>`;
    }
    if (j.bright_spots && j.bright_spots.length) {
      html += `<ul class="bright">`;
      j.bright_spots.forEach(bs => { html += `<li>${esc(bs)}</li>`; });
      html += `</ul>`;
    }
    html += `</div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderAssessmentsSection() {
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">Assessments & Analysis</span>`;
  html += `</div><div class="section-body">`;

  const ca = DATA.assessments.cohesion_analysis;
  if (ca) {
    html += `<div class="assessment"><h4>Cohesion Analysis</h4><table><tr><th>Dimension</th><th>Score</th><th>Notes</th></tr>`;
    Object.entries(ca).forEach(([dim, val]) => {
      if (typeof val === 'object' && val.score) {
        html += `<tr><td>${esc(dim.replace(/_/g, ' '))}</td><td>${esc(val.score)}</td><td>${esc(val.notes || '')}</td></tr>`;
      }
    });
    html += `</table></div>`;
  }

  const aa = DATA.assessments.autonomous_assessment;
  if (aa) {
    html += `<div class="assessment"><h4>Autonomous Readiness</h4><table>`;
    html += `<tr><td>Overall Potential</td><td>${esc(aa.potential||aa.overall_potential||'')}</td></tr>`;
    html += `<tr><td>HITL Points</td><td>${aa.hitl_points||aa.hitl_interaction_points||0}</td></tr>`;
    html += `<tr><td>Auto-Resolvable</td><td>${aa.auto_resolvable||0}</td></tr>`;
    html += `<tr><td>Needs Input</td><td>${aa.needs_input||0}</td></tr>`;
    if (aa.notes) html += `<tr><td>Notes</td><td>${esc(aa.notes)}</td></tr>`;
    html += `</table></div>`;
  }

  const ti = DATA.assessments.top_insights;
  if (ti && ti.length) {
    html += `<div class="assessment"><h4>Top Insights</h4>`;
    ti.forEach(t => {
      const tiTitle = t.title || t.insight || '';
      const tiDetail = t.detail || t.why_it_matters || '';
      const tiAction = t.action || t.suggestion || '';
      html += `<div style="margin:0.5rem 0"><strong>${esc(tiTitle)}</strong>`;
      if (tiDetail) html += `<br><em>Context:</em> ${esc(tiDetail)}`;
      if (tiAction) html += `<br><em>Suggestion:</em> ${esc(tiAction)}`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

// --- Interactions ---
function toggleSection(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function toggleSelect(id, checked) {
  if (checked) selected.add(id); else selected.delete(id);
  document.getElementById('sel-count').textContent = selected.size;
  document.getElementById('footer').classList.toggle('hidden', selected.size === 0);
}

// --- Prompt Generation ---
function itemById(id) { return DATA.items.find(i => i.id === id); }

function buildPromptForItem(item) {
  let p = '';
  const sev = item.severity.replace('-', ' ').toUpperCase();
  const loc = item.file ? `${item.file}${item.line ? ':'+item.line : ''}` : '';
  p += `**[${sev}] ${item.title}**\n`;
  if (loc) p += `- File: ${loc}\n`;
  if (item.description && item.description !== item.title) p += `- Context: ${item.description}\n`;
  if (item.action) {
    const label = item.action_type === 'fix' ? 'Fix' : item.action_type === 'create-script' ? 'Create script' : 'Suggestion';
    p += `- ${label}: ${item.action}\n`;
  }
  if (item.impact) p += `- Impact: ${item.impact}\n`;
  return p;
}

function buildPrompt(ids) {
  const items = ids.map(itemById).filter(Boolean);
  const fixes = items.filter(i => i.action_type === 'fix');
  const scripts = items.filter(i => i.action_type === 'create-script');
  const enhancements = items.filter(i => i.action_type === 'enhance' || i.action_type === 'refactor');

  let prompt = `## Task: Quality Improvements for ${DATA.meta.skill_name}\nSkill path: ${DATA.meta.skill_path}\n\n`;

  if (fixes.length) {
    prompt += `### Fix These Issues (${fixes.length})\n\n`;
    fixes.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  if (scripts.length) {
    prompt += `### Create These Scripts (${scripts.length})\n\n`;
    scripts.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  if (enhancements.length) {
    prompt += `### Implement These Enhancements (${enhancements.length})\n\n`;
    enhancements.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  return prompt.trim();
}

function copySinglePrompt(id) {
  const item = itemById(id);
  if (!item) return;
  let prompt = `## Task: Quality Fix for ${DATA.meta.skill_name}\nSkill path: ${DATA.meta.skill_path}\n\n`;
  prompt += buildPromptForItem(item);
  navigator.clipboard.writeText(prompt).then(() => {
    const btn = document.querySelector(`[onclick="copySinglePrompt('${id}')"]`);
    if (btn) { btn.classList.add('copied'); btn.textContent = '\u2713'; setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '\u2398'; }, 1500); }
  });
}

function showBatchPrompt() {
  const prompt = buildPrompt([...selected]);
  document.getElementById('modal-content').textContent = prompt;
  document.getElementById('modal').classList.add('visible');
}

function closeModal() { document.getElementById('modal').classList.remove('visible'); }

function copyModal() {
  const text = document.getElementById('modal-content').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.modal-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; }, 1500);
  });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

init();
</script>
</body>
</html>
