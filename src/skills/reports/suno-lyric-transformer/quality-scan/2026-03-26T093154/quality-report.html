 "lint", "file": "scripts/validate-lyrics.py", "line": 324, "title": "[E741] Ambiguous variable name: `l`", "description": "", "action": "See https://docs.astral.sh/ruff/rules/E741", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-001", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "high", "rank": 1, "category": "sections", "file": "SKILL.md", "line": 1, "title": "Missing required ## Identity section", "description": "No Identity section found. The Overview contains an embedded identity hint ('Act as a songwriter's workshop collaborator') at line 10, but this is not a dedicated Identity section. Without a clear one-sentence persona section, the AI's behavioral priming is weaker and less consistent.", "action": "Add a ## Identity section after ## Overview with a clear one-sentence persona, e.g.: 'You are a songwriter's workshop collaborator who understands that every song section has a job and that great lyrics balance singability with authentic voice.'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-002", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "high", "rank": 1, "category": "sections", "file": "SKILL.md", "line": 1, "title": "Missing required ## Communication Style section", "description": "No Communication Style section found. There is one scattered style hint at line 94 ('Use the songwriter's workshop voice'), but no dedicated section with concrete examples. Without examples, the agent's tone will be inconsistent across interactions.", "action": "Add a ## Communication Style section with 3-5 concrete examples showing the songwriter's workshop voice. Include examples of how to discuss structure, suggest changes, and present analysis results.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-003", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "high", "rank": 1, "category": "sections", "file": "SKILL.md", "line": 1, "title": "Missing required ## Principles section", "description": "No Principles section found. The skill embeds domain principles throughout the workflow (e.g., 'preserve the writer's intent and voice', character budget awareness, word fidelity constraints), but these are scattered across steps rather than consolidated into a decision framework.", "action": "Add a ## Principles section that consolidates the key guiding principles: preserve writer's voice and intent, respect the 3,000-char Suno budget, never auto-replace when word fidelity is active, verify claims against script output before presenting, and cliche detection runs by default.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-011", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "high", "rank": 1, "category": "progression", "file": "README.md", "line": 67, "title": "README.md prompt file missing progression condition keywords", "description": "No progression condition keywords found in the README.md prompt file. Without progression conditions, the prompt cannot signal when to advance to the next stage or complete its task.", "action": "Add progression conditions (e.g., 'when complete', 'proceed when', 'if satisfied') to define clear exit criteria for the prompt.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-004", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "medium", "rank": 2, "category": "gap", "file": "SKILL.md", "line": null, "title": "No explicit multi-language lyric transformation guidance beyond a warning", "description": "Step 1 mentions that syllable counting, cliche detection, and rhyme analysis are English-optimized and offers to skip script-based analysis for non-English input. However, the skill claims structure tagging and chorus creation 'work across languages' without providing any language-specific guidance. For a user transforming a Spanish poem or Japanese haiku into a Suno song, the skill offers to degrade gracefully but not to adapt. Given that Suno supports multiple languages and the skill already handles communication_language vs document_output_language, this is a meaningful gap in the core workflow.", "action": "Add a brief multi-language transformation guidance section — even a paragraph noting key differences (e.g., syllable counting approaches for syllable-timed vs stress-timed languages, rhyme conventions in Romance vs Germanic languages). If full support is out of scope, state that explicitly and narrow the skill description to English-primary.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-005", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "medium", "rank": 2, "category": "gap", "file": "SKILL.md", "line": null, "title": "No versioning or history tracking for iterative refinement loops", "description": "The skill supports refinement mode and iterative adjustment, and the headless output includes an original_hash for change tracking. However, there is no mechanism to track versions across multiple refinement passes. If a user transforms lyrics, hears the Suno output, requests changes via Feedback Elicitor, and then wants to go back to a previous version, there is no version history. The songbook save is a single snapshot, not a version chain. For a skill that explicitly supports iterative loops (transform, listen on Suno, refine, repeat), this is a workflow gap.", "action": "Consider adding version tracking to the songbook save — append a version number or timestamp, and maintain a brief changelog in the frontmatter. Alternatively, save each refinement pass as a separate file with a link to the previous version.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "enhancement-opportunities-003", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "edge-case", "file": "SKILL.md", "line": 72, "title": "Band profile file not found produces no defined recovery path", "description": "Step 1 says to read from {project-root}/docs/band-profiles/{profile-name}.yaml if the user wants a saved profile. But if the file doesn't exist (typo, wrong profile name, project not initialized), there's no guidance on what happens. The user might not know their exact profile name. A first-timer who heard 'use your profile' from another skill would hit a dead end.", "action": "When the profile file is not found: (1) list available profiles in the band-profiles directory, (2) offer fuzzy matching on the name they provided, (3) offer to proceed without a profile. Add a 'list profiles' micro-capability that can be invoked independently.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-004", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "delight-opportunity", "file": "SKILL.md", "line": 124, "title": "Transformation menu could suggest combinations based on the input analysis results", "description": "Step 2 presents the transformation menu with static default recommendations (ST + CC + RA + CD). But the input analysis from Step 1 already knows whether the text has existing structure, rhyme patterns, repeated phrases, and character count. A poem that already rhymes beautifully doesn't need RE. A poem with a clear repeated refrain should get CE instead of CC. The menu could be personalized based on what the analysis actually found, turning a generic menu into a smart recommendation.", "action": "After Step 1 analysis, dynamically adjust the default recommendation: if existing metatags detected, default to RA + CD (as partially noted for pre-structured input); if strong repeated phrases found, swap CC for CE; if rhyme density is low, add RE to defaults; if character count is already near 2700, skip CC (adding a chorus would blow the budget). Present as: 'Based on your text, I recommend [X] — here's why: [1-sentence rationale per option].'", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-005", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "experience-gap", "file": "SKILL.md", "line": 259, "title": "Presentation format in Step 5 doesn't help the user actually use the output — no copy-ready block", "description": "The transformed lyrics are presented in a markdown code block with a full summary, changes made section, and cliche report. But the user's next action is to paste these lyrics into Suno's lyrics field. They have to mentally separate the lyrics from the surrounding summary, manually copy just the lyrics portion, and hope they don't accidentally include the summary text. Every extra step between 'approve' and 'paste into Suno' is friction that degrades the experience.", "action": "After the full presentation with summary, add a clearly labeled 'Copy-Ready Lyrics' section that contains ONLY the raw lyrics with metatags — no markdown formatting, no summary, no commentary. In headless mode this is already handled by the JSON contract, but interactive mode should offer a clean paste-ready block. Consider also offering a 'save to clipboard' script or file output.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-006", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "facilitative-pattern", "file": "SKILL.md", "line": 282, "title": "Refinement loop in Step 5 lacks soft-gate elicitation — user may not know what to ask for", "description": "The refinement offer says 'Want to adjust anything?' but doesn't guide the user toward what might need adjusting. A first-timer who sees the transformed lyrics might think 'something feels off' but not know how to articulate it. The skill has rich analysis data (syllable patterns, cliche report, section lengths) that could surface specific refinement suggestions proactively.", "action": "After presenting the transformation, offer 2-3 specific refinement suggestions based on the quality check data: 'The bridge has higher syllable density than the verses — want me to thin it out for contrast? The chorus hook is 4 words — want to try a shorter 2-word version? I kept one cliche in verse 2 because it fit the voice — want alternatives?' This turns a blank 'anything else?' into a guided soft gate.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-007", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "delight-opportunity", "file": "SKILL.md", "line": 296, "title": "Handoff guidance misses the opportunity to generate a matching style prompt snippet", "description": "Step 6 reminds the user that lyrics go in the lyrics field and suggests the Style Prompt Builder for the style prompt. But the Lyric Transformer already knows the genre, mood, energy arc, vocal delivery cues, and instrument suggestions from the transformation process. It could generate a starter style prompt snippet that captures these decisions, saving the user from having to re-explain everything to the Style Prompt Builder.", "action": "At handoff, offer: 'Based on the transformation, here's a starter style prompt that matches these lyrics: [genre], [mood descriptors], [instrument palette], [vocal character]. You can use this directly or refine it with the Style Prompt Builder.' This bridges the gap between skills and reduces context loss.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-008", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "edge-case", "file": "SKILL.md", "line": 68, "title": "User who provides a file path to source text has no validation or error handling defined", "description": "Step 1 says 'Accept pasted text or a file path' for source text, but there's no guidance on what happens when the file path is invalid, the file is empty, the file is binary, or the file is enormous (10,000-line novel). The analyze-input.py script presumably handles files, but the SKILL.md doesn't address file-specific edge cases. A user who drags a .docx file path would get cryptic script errors.", "action": "Add file input validation before passing to scripts: check file exists, is readable, is text (not binary), and is under a reasonable size (e.g., 50KB / ~3000 lines — since the Suno limit is 3000 chars, anything much larger than that needs trimming guidance). For unsupported formats, suggest: 'I can read plain text and markdown files. For Word docs, paste the text directly.'", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-009", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "assumption-risk", "file": "SKILL.md", "line": 10, "title": "Skill assumes users understand what Suno is and how its lyrics field works", "description": "The entire skill is built around Suno-specific concepts (metatags, 3000-char limit, style prompt vs lyrics field, vocal engine behaviors) but never explains what Suno is or how its workflow operates. A user who was told 'use the Lyric Transformer to turn your poem into a song' might not know they need a Suno account, that there are two input fields, or what happens after the lyrics are pasted. The skill's domain context paragraph is written for the LLM, not surfaced to the user.", "action": "Add a brief 'New to Suno?' detection in the greeting phase. If the user seems unfamiliar (first interaction, no band profile, asks basic questions), offer a 30-second orientation: 'Suno turns text into music. You'll paste these lyrics into the lyrics field, set a style prompt for the sound, and hit create. I handle the lyrics — the Style Prompt Builder handles the sound.' Keep it optional so experts aren't slowed down.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-010", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "autonomous-potential", "file": "references/metatag-reference.md", "line": null, "title": "Metatag reference is comprehensive but has no programmatic index for headless validation", "description": "The metatag-reference.md is a rich human-readable document with tables of tags, but validate-lyrics.py needs to know which tags are valid. If the validation script maintains its own hardcoded tag list, it will drift from the reference document. A headless pipeline that generates lyrics with a new tag from the reference could have that tag flagged as invalid by the validator.", "action": "Consider extracting a metatag-registry.json from metatag-reference.md that both the reference doc and validate-lyrics.py consume as a single source of truth. This also enables other skills (Style Prompt Builder, Feedback Elicitor) to validate metatag usage without parsing markdown.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "prompt-craft-001", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "medium", "rank": 2, "category": "progressive-disclosure", "file": "SKILL.md", "line": 144, "title": "Step 3 Transform contains dense domain knowledge that duplicates reference content", "description": "Lines 159-217 contain detailed Suno-specific metatag behavior guidance (scream bleed-through, ALL CAPS effects, parentheses as backing vocals, line density as tempo control, exclamation point warnings) that substantially overlaps with content already documented in references/metatag-reference.md. This means the same domain knowledge is loaded twice when the agent follows the instruction at line 146 to pre-load the metatag reference.", "action": "Replace the inline Suno behavior guidance in Step 3 with a mandatory reference load directive: 'Apply guidance from references/metatag-reference.md for all metatag placement, vocal delivery cues, punctuation effects, and capitalization effects.' Keep only the transformation-specific procedural instructions (what to DO) and let the reference provide the domain knowledge (what to KNOW).", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-003", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "medium", "rank": 2, "category": "token-waste", "file": "SKILL.md", "line": 163, "title": "Duplicated scream bleed-through prevention guidance", "description": "Lines 167-170 in SKILL.md describe scream bleed-through prevention (insert vocal style reset, consider Break/Instrumental buffer, remove ! and ALL CAPS after aggressive sections). This exact guidance appears in references/metatag-reference.md lines 332-337 under 'Scream Bleed-Through Prevention.' The duplication costs ~80 tokens and risks divergence if one copy is updated without the other.", "action": "Remove the inline scream bleed-through prevention bullet points from Step 3b and instead add a single line: 'Apply scream bleed-through prevention per metatag-reference.md after any aggressive section.'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-004", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "medium", "rank": 2, "category": "token-waste", "file": "SKILL.md", "line": 210, "title": "Duplicated line density as tempo control guidance", "description": "Lines 210-215 describe line density as tempo control with bullet points explaining short fragmented lines vs long packed lines. This same content appears in detail in references/metatag-reference.md lines 292-317 under 'Line Density as Tempo Control' with more depth and examples. The SKILL.md version is a condensed duplicate that adds ~100 tokens of redundancy.", "action": "Replace the inline line density guidance with a reference directive. Keep only the actionable instruction: 'Use line density variation between sections for tempo contrast (see metatag-reference.md). Normalize syllable counts WITHIN sections, not across them.'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-005", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "medium", "rank": 2, "category": "token-waste", "file": "SKILL.md", "line": 216, "title": "Duplicated ALL CAPS and parentheses guidance", "description": "Lines 216-217 describe ALL CAPS as loudness ceiling and parentheses as backing vocals. Both topics are covered in references/metatag-reference.md (lines 274-290). The inline versions add ~60 tokens of content already available in the pre-loaded reference.", "action": "Remove inline ALL CAPS and parentheses guidance from Step 3d. The metatag reference is already mandated to be pre-loaded at Step 1 (line 87), so this information is available when needed.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "script-opportunities-000", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "extraction", "file": "SKILL.md", "line": 148, "title": "LLM computes compaction state summary (source hash, character budget, transform codes) that a script could assemble", "description": "Determinism confidence: certain. Estimated token savings: 150 per invocation. Implementation complexity: trivial. Language: python. Could be prepass: yes. Feeds scanner: none. Reusable across skills: no. Help pattern savings: 30 tokens. The compaction survival block at line 148 asks the LLM to emit a state summary including source_hash, character_budget, and transform codes. All of these are deterministic values already available from script outputs (analyze-input.py provides character count, validate-options.py has the codes, and sha256 is trivial). A script could assemble this comment block from existing script outputs.", "action": "Create a build-compaction-state.py script that accepts analyze-input.py output JSON, the selected transform codes, and optional profile name, then emits the formatted HTML comment block. The LLM would paste it rather than compute it.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-001", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "validation", "file": "SKILL.md", "line": 238, "title": "LLM performs character budget check after transformations that a script already partially covers", "description": "Determinism confidence: certain. Estimated token savings: 100 per invocation. Implementation complexity: trivial. Language: python. Could be prepass: no. Feeds scanner: none. Reusable across skills: no. Help pattern savings: 0. At line 238, the prompt instructs the LLM to check total character count and flag if approaching 2700 or over 3000. validate-lyrics.py already checks character count, but this instruction asks the LLM to do an intermediate check after Step 3 transformations, before Step 4 validation. The LLM is counting characters when a script could do it instantly.", "action": "The existing validate-lyrics.py already covers this in Step 4. Consider adding a lightweight char-count check mode (e.g., validate-lyrics.py --quick-charcount) that just returns character count and budget status, so the LLM can call it mid-transformation without running full validation. Alternatively, rely on Step 4 validation and remove the mid-step instruction to avoid the LLM doing redundant counting.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-003", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "transformation", "file": "SKILL.md", "line": 39, "title": "LLM assembles headless output contract JSON structure that is mostly deterministic data from script outputs", "description": "Determinism confidence: high. Estimated token savings: 300 per invocation. Implementation complexity: moderate. Language: python. Could be prepass: no. Feeds scanner: none. Reusable across skills: no. Help pattern savings: 50 tokens. The headless output contract (lines 31-48) is a JSON structure where most fields are deterministic: section list and count (from validate-lyrics.py), duration estimate (from syllable-counter.py), character count/budget (from validate-lyrics.py), syllable range (from syllable-counter.py), cliche report (from cliche-detector.py), validation result (from validate-lyrics.py). Only transformed_lyrics requires LLM output. The LLM spends tokens assembling JSON from data that scripts already computed.", "action": "Extend assemble-summary.py (or create assemble-headless-output.py) to accept the transformed lyrics text plus JSON outputs from validate-lyrics.py, syllable-counter.py, and cliche-detector.py, then produce the complete headless output contract JSON. The LLM provides only the transformed_lyrics string; the script assembles everything else.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-004", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "transformation", "file": "SKILL.md", "line": 260, "title": "LLM formats the Transformation Summary presentation block from data already available in script outputs", "description": "Determinism confidence: certain. Estimated token savings: 200 per invocation. Implementation complexity: trivial. Language: python. Could be prepass: no. Feeds scanner: none. Reusable across skills: yes (any skill with structured output presentation). Help pattern savings: 30 tokens. The Step 5 output format (lines 260-280) is a markdown template filled with section count, duration, character budget, transformations applied, and syllable range. assemble-summary.py already exists and partially does this, but the prompt still instructs the LLM to produce this formatted block. If assemble-summary.py fully covers this template, the LLM should just invoke it rather than format it manually.", "action": "Verify assemble-summary.py output matches the Step 5 template exactly. If it does, update SKILL.md Step 5 to say 'Run assemble-summary.py and present its output' instead of listing the format for the LLM to fill. If assemble-summary.py is missing fields (like the cliche report section), extend it to produce the complete presentation block.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "structure-000", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "frontmatter", "file": "SKILL.md", "line": 1, "title": "Name does not follow bmad-{code}-agent-{name} or bmad-agent-{name} pattern", "description": "The skill name 'bmad-suno-lyric-transformer' uses a non-standard naming convention. Expected patterns are bmad-{code}-agent-{name} or bmad-agent-{name}.", "action": "Evaluate whether this is intentional for a skill (vs agent) naming convention, or rename to follow the standard agent naming pattern.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-010", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "config-header", "file": "README.md", "line": 1, "title": "README.md prompt file missing config header with language variables", "description": "The README.md prompt file has no config header defining language variables. Config headers enable prompt customization and are expected for prompt files.", "action": "Add a config header to README.md with relevant language variables.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-006", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "gap", "file": "SKILL.md", "line": null, "title": "No guidance for collaborative or multi-song workflows", "description": "The skill handles one song at a time. For concept albums, EP workflows, or users transforming a collection of poems into a cohesive set, there is no guidance on maintaining thematic or sonic consistency across songs. The band profile partially addresses this (consistent writer voice), but there is no 'album mode' or batch transformation capability. This is an edge case but relevant for the kind of serious songwriter this skill targets.", "action": "Consider a suggestion in the README or SKILL.md noting that for multi-song consistency, users should establish a band profile first and use consistent song direction parameters. A future enhancement could support batch headless transformation with shared parameters.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-007", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "redundancy", "file": "SKILL.md", "line": null, "title": "Scream bleed-through prevention guidance duplicated across SKILL.md and metatag-reference.md", "description": "The scream bleed-through prevention strategies appear in both SKILL.md Step 3b (Structure Tagging) and metatag-reference.md (Scream Bleed-Through Prevention section). The content is nearly identical — vocal style reset with whispered, explicit reset tags after aggressive sections, avoiding exclamation points and ALL CAPS after aggressive sections, buffer sections. While reference duplication is sometimes intentional for standalone readability, this creates a maintenance burden where updates to one location may not propagate to the other.", "action": "Keep the detailed guidance in metatag-reference.md (the authoritative reference) and reduce SKILL.md Step 3b to a brief mention with a pointer: 'Apply scream bleed-through prevention (see metatag-reference.md) after aggressive sections.' This also applies to the harmonized vocal style sweet spot guidance, which appears in both files.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-008", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "redundancy", "file": "SKILL.md", "line": null, "title": "Line density as tempo control duplicated across SKILL.md and metatag-reference.md", "description": "The line density as primary tempo control mechanism is explained in detail in both SKILL.md Step 3d (Rhythmic Adjustment) and metatag-reference.md (Line Density as Tempo Control). Both locations include the short-lines-slow / packed-lines-fast framework and the recommendation to vary density between sections for tempo contrast. The metatag-reference version is more comprehensive (includes the multi-technique approach table), making the SKILL.md version partially redundant.", "action": "In SKILL.md Step 3d, reference metatag-reference.md for the full tempo control framework rather than restating it. Keep only the RA-specific application notes (e.g., normalize WITHIN sections not across them).", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "enhancement-opportunities-011", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "delight-opportunity", "file": "SKILL.md", "line": 299, "title": "Songbook save could capture the transformation journey, not just the final artifact", "description": "The songbook save in Step 6 captures frontmatter with source hash, transformations applied, date, and notes. But it doesn't preserve the original source text, the analysis results, the cliche alternatives that were considered, or the refinement history. When a user returns to a saved song months later, they see the final lyrics but lose the creative decisions that shaped them. This is especially valuable for writers who want to revisit and revise.", "action": "Extend the songbook format to optionally include a 'transformation-log' section: original source text (or hash + first 200 chars), analysis highlights (hook candidates, emotional arc), key decisions made (which cliche alternatives were chosen, which sections were restructured), and refinement iterations. Keep it collapsed/optional so it doesn't clutter the primary lyrics view.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-012", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "journey-friction", "file": "SKILL.md", "line": 52, "title": "bmad-init fallback is defined but the degraded experience is not characterized", "description": "When bmad-init is unavailable, the skill falls back to generic greeting and English defaults. But the user doesn't know WHY the greeting is generic or that features are missing. They might wonder why the agent didn't use their name or their preferred language. The fallback is functional but not transparent.", "action": "When falling back, briefly note: 'I wasn't able to load your preferences, so I'll use defaults. You can tell me your name and preferred language if you'd like.' This turns a silent degradation into a transparent one.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-013", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "delight-opportunity", "file": "SKILL.md", "line": 162, "title": "Vocal delivery cue suggestions could be demonstrated with audio-imagination, not just described", "description": "Step 3b offers vocal delivery cues like 'A whispered verse into a belted chorus can create powerful dynamics' — but this is abstract. A first-timer doesn't viscerally understand what [Whispered] into [Belted] sounds like. The skill could paint a more vivid picture by referencing well-known songs that use similar dynamics, connecting the abstract tag to a felt experience.", "action": "When suggesting vocal delivery cues, offer a reference: 'Think Pixies quiet-loud-quiet, or Billie Eilish whisper-to-drop. A [Whispered] verse into a [Belted] chorus creates that same tension-release.' Tailor the reference to the user's genre if a band profile or song direction is available.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-014", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "edge-case", "file": "SKILL.md", "line": 240, "title": "Character budget warning at 2700 chars doesn't account for metatag overhead", "description": "The skill checks total character count against 3000 and warns at 2700, but metatags like [Verse 1], [Chorus], [Vocal Style: harmonized], [Mood: dark, haunting] all consume character budget. A song with 2500 chars of actual lyrics plus 400 chars of metatags is at 2900 — dangerously close. The character budget calculation should distinguish between lyric content and metatag overhead.", "action": "In validate-lyrics.py and the character budget display, break out: 'Lyrics: 2500 chars / Metatags: 400 chars / Total: 2900/3000 (97%).' This helps users understand where their budget is going and whether trimming metatags (fewer descriptors) or lyrics (shorter verses) is the better path.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "execution-efficiency-004", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "low", "rank": 3, "category": "missing-batch", "file": "SKILL.md", "line": 135, "title": "Transformation option validation could batch with user confirmation", "description": "validate-options.py is called separately to check mutual exclusions after the user selects options. In headless mode, this validation could be batched with the Step 1 analysis scripts if the options are known upfront, saving one sequential tool call round-trip.", "action": "In headless mode, when transformation options are provided in the input, batch validate-options.py with the Step 1 analysis scripts rather than running it separately in Step 2.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "execution-efficiency-005", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "low", "rank": 3, "category": "missing-batch", "file": "SKILL.md", "line": 282, "title": "lyrics-diff.py in Step 5 could run in parallel with presentation assembly", "description": "scripts/lyrics-diff.py generates the before/after comparison and scripts/assemble-summary.py assembles the transformation summary. These are independent of each other and could be batched in one tool call, but Step 5 does not explicitly instruct parallel execution.", "action": "Add an explicit instruction to run lyrics-diff.py and assemble-summary.py in a single parallel batch before presenting results to the user.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-002", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "anti-pattern", "file": "SKILL.md", "line": 33, "title": "Wall of text in Headless Output Contract area (15 consecutive lines without structure)", "description": "The pre-pass flagged a wall of text from lines 33-47. This is the JSON code block for the Headless Output Contract. While it is inside a fenced block (which provides some visual structure), the surrounding context from lines 20-31 is a dense numbered list with nested bullets that could benefit from clearer separation.", "action": "No action strictly required since the JSON block is already fenced. The surrounding activation mode detection content is dense but functionally appropriate for its purpose.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-009", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "outcome-balance", "file": "SKILL.md", "line": 148, "title": "Compaction survival block is a good defensive pattern", "description": "Lines 148-151 define a compact state summary that survives context compaction, preserving source hash, transforms, profile, voice constraints, emotional core, and character budget. This is a thoughtful approach to context compaction resilience for a long-running transformation workflow.", "action": "No action needed. This is a well-designed pattern worth preserving.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-010", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "outcome-balance", "file": "SKILL.md", "line": 171, "title": "Genre-aware section length relaxation is outcome-driven but could be more concise", "description": "Lines 171 describe relaxing section length expectations for prog/metal/experimental genres. The instruction is good -- it prevents false positives in quality checks -- but the explanation is slightly verbose for an inline instruction.", "action": "Consider condensing to: 'For prog/metal/experimental genres, relax section length expectations -- a 16-line verse is normal for these genres.'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "script-opportunities-002", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "extraction", "file": "SKILL.md", "line": 46, "title": "LLM computes original_hash (sha256 of source text) in headless output that a script could provide", "description": "Determinism confidence: certain. Estimated token savings: 50 per invocation. Implementation complexity: trivial. Language: python. Could be prepass: yes. Feeds scanner: none. Reusable across skills: no. Help pattern savings: 0. The headless output contract at line 46 includes original_hash as sha256 of source text. analyze-input.py could easily include this in its output, or a one-liner Python script could compute it. Currently the LLM is asked to produce a hash value, which it cannot reliably do.", "action": "Add a --include-hash flag to analyze-input.py that computes and includes sha256 of the source text in its JSON output. The LLM can then copy it into the headless output contract rather than attempting to compute a hash (which LLMs cannot do correctly).", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-005", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "validation", "file": "SKILL.md", "line": 167, "title": "LLM checks for exclamation points and ALL CAPS in lyrics that a script could flag deterministically", "description": "Determinism confidence: certain. Estimated token savings: 80 per invocation. Implementation complexity: trivial. Language: python. Could be prepass: yes. Feeds scanner: none. Reusable across skills: no. Help pattern savings: 0. Lines 167-170 (scream bleed-through prevention) and 209 (exclamation point warning) and 216 (ALL CAPS awareness) instruct the LLM to find exclamation points and ALL CAPS words in lyrics. These are simple regex operations. validate-lyrics.py may already check punctuation density, but the specific flagging of ! count and ALL CAPS word locations by section could be a dedicated lint pass.", "action": "Extend validate-lyrics.py to include specific findings for: (1) exclamation point count per section with warning about bark/attack trigger, (2) ALL CAPS words per section with warning about loudness ceiling, (3) parenthetical words that might be unintentional backing vocals. These are deterministic pattern matches the LLM should not spend tokens finding.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-006", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "validation", "file": "SKILL.md", "line": 217, "title": "LLM detects unintentional parenthetical usage (backing vocals) that a regex could flag", "description": "Determinism confidence: certain. Estimated token savings: 40 per invocation. Implementation complexity: trivial. Language: python. Could be prepass: yes. Feeds scanner: none. Reusable across skills: no. Help pattern savings: 0. Line 217 instructs the LLM to flag parenthetical words that might be unintentional backing vocals. This is a simple regex scan for (text) patterns in lyric lines.", "action": "Add parenthetical detection to validate-lyrics.py. Flag any (word) or (phrase) patterns in lyrics with a note that Suno interprets these as backing vocals. The LLM then only needs to assess whether the parenthetical was intentional, not find them.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-007", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "transformation", "file": "SKILL.md", "line": 299, "title": "LLM creates songbook save file with frontmatter that a script could generate", "description": "Determinism confidence: high. Estimated token savings: 100 per invocation (when saving). Implementation complexity: moderate. Language: python. Could be prepass: no. Feeds scanner: none. Reusable across skills: yes (any skill saving structured output files). Help pattern savings: 20 tokens. Line 299 describes saving lyrics to songbook with frontmatter (original source hash, transformations applied, date, band profile, character count, notes). All frontmatter fields except 'notes' are deterministic. A script could generate the file with proper YAML frontmatter from the existing script outputs.", "action": "Create a save-to-songbook.py script that accepts: lyrics text, project root, band profile name, song title, transformation codes, and the JSON outputs from other scripts. It generates the markdown file with proper YAML frontmatter at the correct path. The LLM only needs to provide the optional 'notes' field.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "structure-008", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "low", "rank": 3, "category": "identity", "file": "SKILL.md", "line": 10, "title": "Embedded identity in Overview should be extracted to dedicated section", "description": "The phrase 'Act as a songwriter's workshop collaborator' at line 10 functions as an identity statement but is buried in the Overview paragraph. Identity works best as a standalone section that primes behavior before the agent reads the rest of the document.", "action": "Extract the identity statement from the Overview into a new ## Identity section placed between ## Overview and ## Activation Mode Detection.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-009", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "low", "rank": 3, "category": "communication-style", "file": "SKILL.md", "line": 94, "title": "Scattered voice guidance should be consolidated", "description": "Line 94 mentions 'Use the songwriter's workshop voice' with an example question, but this is the only style guidance and it appears mid-workflow. Communication style examples should be consolidated in a dedicated section so the agent internalizes tone before starting work.", "action": "Move the workshop voice example to a ## Communication Style section and add 2-4 more examples covering different interaction types (analysis presentation, change suggestions, cliche discussion, handoff guidance).", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-009", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "SKILL.md", "line": null, "title": "Emotional arc visualization could enhance the transformation preview", "description": "Step 3a maps the emotional arc (setup, tension, peak, resolution) but this analysis is only used internally for transformation decisions. Presenting the emotional arc visually to the user — as a simple text-based energy curve or annotated section map — would help users understand WHY sections were placed where they were and make more informed refinement requests. The impact preview in Step 3c shows structural comparison but not emotional logic. This would make the skill feel more like a true creative collaborator and less like a black box. Type: creative enhancement. Estimated impact: medium — improves user understanding and trust in transformation decisions.", "action": "Add an optional emotional arc visualization to the Step 5 presentation output. Could be as simple as a text diagram: 'Verse 1 [setup/low] -> Pre-Chorus [tension/rising] -> Chorus [payoff/peak] -> Verse 2 [deepen/medium] -> Bridge [contrast/shift] -> Final Chorus [climax/high] -> Outro [resolve/fade]'.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "agent-cohesion-010", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "SKILL.md", "line": null, "title": "A/B variant generation could leverage Suno's inherent randomness", "description": "Step 6 advises users to 'generate 3-5 versions on Suno' because Suno interprets the same lyrics differently each time. The skill could go further by offering to generate 2-3 slight lyric variants optimized for different interpretations — for example, one version with more aggressive metatags and one with softer ones, or one with a whispered verse opener and one with a belted opener. This would give users structured variation rather than hoping Suno's randomness produces good variety. Type: creative enhancement. Estimated impact: medium — directly addresses the iteration coaching advice with actionable skill support.", "action": "Add an optional 'Generate Variants' sub-step after Step 4 that produces 2-3 metatag-varied versions of the approved lyrics (same words, different delivery/energy tags). Output as labeled variants the user can paste into Suno separately.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "agent-cohesion-011", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "bmad-manifest.json", "line": null, "title": "Manifest could expose transformation options as sub-capabilities for richer orchestration", "description": "The bmad-manifest.json exposes two capabilities: transform-lyrics and analyze-lyrics. However, the skill internally has seven distinct transformation types (ST, CE, CC, RA, RE, FR, CD) plus WF mode. Exposing these as parameters or sub-capabilities in the manifest would allow Mac (the orchestrator) to make more targeted invocations — for example, calling just CD (cliche detection) on already-structured lyrics without running the full pipeline. Type: integration enhancement. Estimated impact: low-medium — improves orchestration granularity but current headless mode options partially address this.", "action": "Consider adding a 'parameters' or 'options' field to the transform-lyrics capability in bmad-manifest.json that documents the available transformation codes. This would make the skill's internal capabilities discoverable to orchestrating agents without requiring them to parse SKILL.md.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "prompt-craft-006", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "overview-quality", "file": "SKILL.md", "line": 8, "title": "Overview section is well-crafted with appropriate domain context and design rationale", "description": "The 7-line Overview establishes mission (transforms poems/text to Suno-ready lyrics), domain framing (Suno metatag system, character limits, singability), theory of mind (varying user attachment to original words), and design rationale (menu of options, word fidelity mode, cliche detection rationale). This is excellent for a domain-expert skill -- concise but rich enough for informed judgment.", "action": "No action needed. Overview is a strong example of appropriate persona and domain context.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-007", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "self-containment", "file": "SKILL.md", "line": 50, "title": "SKILL.md is self-contained with no back-references to external context", "description": "Pre-pass confirms zero back-references and zero suggestive loading patterns. All reference loads are mandatory directives (line 87: pre-load references). The skill defines its own vocabulary, explains its own domain, and does not depend on external context that could be lost to compaction.", "action": "No action needed.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-008", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "intelligence-placement", "file": "SKILL.md", "line": 301, "title": "Good intelligence placement -- scripts handle deterministic work, prompts handle judgment", "description": "The skill correctly delegates deterministic operations to scripts (syllable counting, validation, cliche detection, option validation, section length checking, input analysis, diff generation) while reserving LLM judgment for creative work (emotional arc mapping, chorus creation, voice matching, quality assessment against band profile). Line 208 explicitly mandates verification against script output before making claims. This is strong intelligence placement.", "action": "No action needed. The script/prompt boundary is well-designed.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-000", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Exceptionally well-designed transformation menu with clear granularity", "description": "The seven transformation options (ST, CE, CC, RA, RE, FR, CD) plus WF mode are at exactly the right level of abstraction. Each has a distinct, non-overlapping purpose. The mutual exclusion rules (FR vs WF, CE skipped with FR) show careful design thinking. Users can compose transformations to match their level of creative attachment to the source material. This is the core differentiator of the skill and it is executed very well.", "action": "No action needed. This is a model for capability granularity.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-001", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Deep domain expertise woven throughout with production-tested knowledge", "description": "The skill goes far beyond basic lyrics formatting. Production-tested findings like scream bleed-through prevention, exclamation point bark triggers, ALL CAPS as loudness ceiling, parentheses as backing vocals, line density as primary tempo control, and BPM tags being confirmed ineffective — these represent hard-won knowledge that would take a user dozens of iterations to discover. The metatag-reference.md is practically a standalone Suno production bible. This elevates the skill from a formatter to a genuine expert collaborator.", "action": "No action needed. Continue capturing production learnings in the references.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-002", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Complete user journey from raw text to Suno-ready output with handoff guidance", "description": "The six-step workflow (Gather Input, Select Transformations, Transform, Quality Check, Present and Refine, Handoff Guidance) covers the full lifecycle. The handoff step is particularly well-designed: it reminds users that lyrics go in the lyrics field (not style prompt), coaches on iteration strategy (generate 3-5 versions), connects to the Style Prompt Builder and Feedback Elicitor, and offers songbook saving. No dead ends — every step feeds forward.", "action": "No action needed.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-003", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Headless mode and refinement mode enable orchestration integration", "description": "The three headless sub-modes (analyze, transform, refine) with a well-defined JSON output contract allow Mac (the orchestrating agent) and the Feedback Elicitor to drive this skill programmatically. The refinement mode accepts a structured adjustment spec with typed adjustments (section-restructure, line-rewrite, metatag-change, rhythmic-fix). This is thoughtful API design for an agent skill — it acts as both an interactive collaborator and a headless pipeline component.", "action": "No action needed.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-012", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "references/section-jobs.md", "line": null, "title": "Section-jobs framework is practical and production-informed", "description": "The section job framework goes beyond textbook song structure by including production-tested guidance specific to Suno: very short poem handling strategies (double delivery, chorus extraction, thesis isolation), the explicit warning against padding with instrumental tags, the 'let the words decide' duration philosophy, and through-composed structure notes. The 'What NOT to do' callout is particularly valuable — it prevents a common mistake that would produce bad Suno output. This reference e ype": "create-script"}, {"id": "structure-004", "scanner": "structure", "section": "structure-capabilities", "type": "strength", "severity": "strength", "rank": 5, "category": "frontmatter", "file": "SKILL.md", "line": 3, "title": "Description follows two-part format with quoted trigger phrases", "description": "The description uses the recommended format: a concise summary ('Transforms poems and text into Suno-ready structured lyrics') followed by a trigger clause with specific quoted phrases ('transform lyrics', 'convert poem to song', 'prepare lyrics for Suno'). This enables reliable activation.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "structure-005", "scanner": "structure", "section": "structure-capabilities", "type": "strength", "severity": "strength", "rank": 5, "category": "headless-mode", "file": "SKILL.md", "line": 16, "title": "Comprehensive headless mode with output contract and refinement mode", "description": "The Activation Mode Detection section defines multiple headless sub-modes (analyze, transform, refine), a structured JSON output contract, and a refinement spec format for targeted changes. This is a thorough headless implementation.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "structure-006", "scanner": "structure", "section": "structure-capabilities", "type": "strength", "severity": "strength", "rank": 5, "category": "activation-sequence", "file": "SKILL.md", "line": 50, "title": "Activation sequence is logically ordered with graceful fallback", "description": "The On Activation section follows correct order: load config first, then greet user with config vars, then proceed to workflow. Includes a fallback for when bmad-init is unavailable, preventing the skill from blocking.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "structure-007", "scanner": "structure", "section": "structure-capabilities", "type": "strength", "severity": "strength", "rank": 5, "category": "consistency", "file": "SKILL.md", "line": 8, "title": "Overview provides excellent domain context and design rationale", "description": "The Overview includes both domain context (Suno metatag syntax, character limits, vocal phrasing) and design rationale (why transformations are a menu, why cliche detection runs by default). This gives the AI strong contextual grounding for decision-making.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}], "journeys": [], "assessments": {"cohesion_analysis": {"persona_alignment": {"score": "strong", "notes": "The persona of a songwriter's workshop collaborator is thoroughly embodied. The skill speaks like a knowledgeable co-writer ('What's the one line you want stuck in people's heads?'), respects creative ownership (WF mode, user-choosable transformations), and brings genuine domain expertise (production-tested Suno knowledge). The persona is not just a label — it informs design decisions like offering transformation menus instead of all-or-nothing rewrites, and coaching iteration strategy rather than claiming perfect output."}, "capability_completeness": {"score": "mostly-complete", "missing_areas": ["multi-language transformation guidance beyond English", "version tracking across refinement iterations", "multi-song/album consistency workflow"], "notes": "The core text-to-lyrics transformation workflow is thoroughly covered with no gaps. The seven transformation options plus WF mode cover the full spectrum from minimal touch to full rewrite. Scripts support every analysis and validation step. The gaps are at the edges: non-English support degrades to 'skip scripts, use LLM judgment' without specific guidance, iterative refinement has no version history, and multi-song workflows are not addressed. None of these are blocking for the primary use case."}, "redundancy_level": {"score": "some-overlap", "consolidation_opportun kill. No dead ends — every path produces value."}}, "agent_identity": {"name": "bmad-suno-lyric-transformer", "persona_summary": "A songwriter's workshop collaborator that understands both songwriting craft and Suno's AI music generation quirks. Approaches transformation as a menu of options rather than all-or-nothing, respecting the writer's attachment to their words while offering expert-level structural and rhythmic guidance.", "primary_purpose": "Transform poems, raw text, and rough lyrics into Suno-ready structured song lyrics with metatags, proper section architecture, and rhythmic consistency.", "capability_count": 8}, "overall_cohesion": "cohesive", "autonomous_assessment": {"potential": "headless-ready", "hitl_points": 5, "auto_resolvable": 4, "needs_input": 1, "suggested_output_contract": "Already defined: JSON with transformed_lyrics, transformation_summary, cliche_report, validation_result, and original_hash", "required_inputs": ["source text (required)", "transformation options (defaults available: ST+CC+RA+CD)", "band profile name (optional)", "song direction/genre (optional, improves cliche alternatives)", "language (optional, defaults to English)"], "notes": "This skill is already headless-ready with a well-designed output contract and three sub-modes. The only HITL point that truly requires human input is transformation option selection when the user wants non-default options. All other interaction points (greeting, analysis presentation, impact preview, refinement offers) can be auto-resolved with reasonable defaults. The refinement mode's adjustment spec creates a clean programmatic interface for iterative improvement. The main enhancement would be adding error reporting to the headless contract."}, "skill_understanding": {"purpose": "Transform poems, raw text, and rough lyrics into Suno-ready structured song lyrics with metatags, section architecture, and rhythmic consistency — while preserving writer voice and intent", "primary_user": "Songwriters and poets who want to convert existing text into songs via Suno AI, ranging from first-timers pasting a poem to experienced producers with band profiles and specific transformation needs", "key_assumptions": ["Users have source text to transform (not creating from scratch)", "Users have access to Suno and understand its two-field input model (lyrics + style prompt)", "The scripts directory contains working Python scripts that produce reliable analysis", "Band profiles exist in a predictable file location when referenced", "English is the primary language for script-based analysis (syllables, cliches, rhymes)", "Users complete the transformation in a single session or can re-invoke with saved songbook output"]}, "top_insights": [{"title": "The skill's greatest untapped opportunity is bridging the gap between Lyric Transformer output and Style Prompt Builder input", "detail": "By the time the Lyric Transformer finishes, it knows everything needed to generate a starter style prompt: genre, mood, energy arc, vocal delivery choices, instrument suggestions from metatags, and tempo characteristics from line density decisions. Currently the user has to re-explain all of this to the Style Prompt Builder. A starter style prompt snippet at handoff would save significant user effort and reduce context loss between skills.", "action": "Generate a 'starter style prompt' at Step 6 handoff that captures the musical decisions embedded in the transformed lyrics. This could be a simple text snippet or a structured object that the Style Prompt Builder can ingest directly."}, {"title": "Compaction survival is designed but fragile under iteration", "detail": "The compaction survival block is a smart defensive measure, but it's emitted once and never updated. In a skill designed for iterative refinement (Step 5 explicitly loops), a stale compaction block could cause the agent to lose 3-4 rounds of refinement work. This is the highest-risk technical gap for real-world usage where conver ", "quality": "Path & Script Standards", "scripts": "Scripts", "script-opportunities": "Script Opportunities", "creative": "Creative & Enhancements"}}</script>
<script>
const DATA = JSON.parse(document.getElementById('report-data').textContent);
const selected = new Set();

function init() {
  const m = DATA.meta;
  const es = DATA.executive_summary;
  document.getElementById('skill-name').textContent = m.skill_name;
  document.getElementById('subtitle').textContent = `${m.skill_path} \u2022 ${m.timestamp.split('T')[0]} \u2022 ${m.scanner_count} scanners`;

  // Executive summary
  let html = `<div class="grade grade-${es.grade}">${es.grade}</div>`;
  html += `<dl class="summary-grid">`;
  html += `<dt>Issues</dt><dd>${es.total_issues} total \u2014 ${es.counts.critical} critical, ${es.counts.high} high, ${es.counts.medium} medium, ${es.counts.low} low</dd>`;
  if (es.enhancement_count) html += `<dt>Enhancements</dt><dd>${es.enhancement_count} opportunities identified</dd>`;
  if (es.strength_count) html += `<dt>Strengths</dt><dd>${es.strength_count} noted</dd>`;
  if (es.craft_assessment) html += `<dt>Craft</dt><dd>${esc(es.craft_assessment)}</dd>`;
  if (es.overall_cohesion) html += `<dt>Cohesion</dt><dd>${esc(es.overall_cohesion)}</dd>`;
  html += `</dl>`;
  document.getElementById('exec-summary').innerHTML = html;

  // Severity filters
  renderFilters();

  // Sections
  renderSections();
}

// --- Severity filters ---
const activeFilters = new Set(['critical','high','medium','low','high-opportunity','medium-opportunity','low-opportunity','strength','suggestion','note','info']);

function renderFilters() {
  const counts = {};
  DATA.items.forEach(i => { counts[i.severity] = (counts[i.severity]||0) + 1; });
  const order = ['critical','high','medium','low','high-opportunity','medium-opportunity','low-opportunity','strength','suggestion','note'];
  let html = '';
  order.forEach(s => {
    if (!counts[s]) return;
    const active = activeFilters.has(s) ? 'active' : '';
    html += `<span class="badge badge-${s} ${active}" data-sev="${s}" onclick="toggleFilter('${s}')">${s.replace('-',' ')} ${counts[s]}</span>`;
  });
  document.getElementById('filters').innerHTML = html;
}

function toggleFilter(sev) {
  if (activeFilters.has(sev)) activeFilters.delete(sev); else activeFilters.add(sev);
  renderFilters();
  renderSections();
}

// --- Sections ---
function renderSections() {
  const groups = {};
  const sectionOrder = ['structural','structure-capabilities','prompt-craft','cohesion','efficiency','quality','scripts','script-opportunities','creative'];

  DATA.items.forEach(i => {
    if (!activeFilters.has(i.severity)) return;
    const s = i.section;
    if (!groups[s]) groups[s] = [];
    groups[s].push(i);
  });

  // Truly broken (always first, always open)
  const broken = DATA.items.filter(i => i.type === 'issue' && (i.severity === 'critical' || i.severity === 'high'));
  const brokenIds = new Set(broken.map(i => i.id));
  // Strengths
  const strengths = DATA.items.filter(i => i.type === 'strength' && activeFilters.has(i.severity));

  let html = '';

  if (broken.length) {
    html += renderSection('truly-broken', `Truly Broken / Missing (${broken.length})`, broken, true);
  }
  if (strengths.length) {
    html += renderSection('strengths', `Strengths (${strengths.length})`, strengths, false);
  }

  sectionOrder.forEach(sec => {
    // Exclude strengths (shown above) and items already in Truly Broken
    const items = (groups[sec] || []).filter(i => i.type !== 'strength' && !brokenIds.has(i.id));
    if (!items.length) return;
    const label = DATA.section_labels[sec] || sec;
    html += renderSection(sec, `${label} (${items.length})`, items, false);
  });

  // User journeys
  if (DATA.journeys.length) {
    html += renderJourneysSection();
  }

  // Assessments
  if (Object.keys(DATA.assessments).length) {
    html += renderAssessmentsSection();
  }

  document.getElementById('sections').innerHTML = html;
}

function renderSection(id, label, items, startOpen) {
  const openCls = startOpen ? 'open' : '';
  let html = `<div class="section"><div class="section-header ${openCls}" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">${label}</span>`;
  html += `</div><div class="section-body ${openCls}">`;
  items.forEach(i => { html += renderItem(i); });
  html += `</div></div>`;
  return html;
}

function renderItem(item) {
  const isStrength = item.type === 'strength';
  const chk = item.selectable ? `<input type="checkbox" class="item-check" data-id="${item.id}" ${selected.has(item.id)?'checked':''} onchange="toggleSelect('${item.id}', this.checked)">` : '';
  const sev = `<span class="badge badge-${item.severity}">${item.severity.replace('-',' ')}</span>`;
  const file = item.file ? `<span class="item-file">${esc(item.file)}${item.line ? ':'+item.line : ''}</span>` : '';
  const desc = item.description && item.description !== item.title ? `<div class="item-desc">${esc(item.description)}</div>` : '';
  // Suppress action/impact for strengths — "N/A" is noise
  const actionText = item.action && !isStrength && item.action !== 'N/A' ? item.action : '';
  const action = actionText ? `<div class="item-action"><strong>${item.action_type === 'fix' ? 'Fix' : item.action_type === 'create-script' ? 'Script' : 'Suggestion'}:</strong> ${esc(actionText)}</div>` : '';
  const impactText = item.impact && !isStrength && item.impact !== 'N/A' ? item.impact : '';
  const impact = impactText ? `<div class="item-impact">Impact: ${esc(impactText)}</div>` : '';
  const copyBtn = item.selectable ? `<button class="copy-btn" onclick="copySinglePrompt('${item.id}')" title="Copy prompt for this item">\u2398</button>` : '';

  return `<div class="item">${chk}<div class="item-body">${sev} ${file}<div class="item-title">${esc(item.title)}</div>${desc}${action}${impact}</div><div class="item-actions">${copyBtn}</div></div>`;
}

function renderJourneysSection() {
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">User Journeys (${DATA.journeys.length})</span>`;
  html += `</div><div class="section-body">`;
  DATA.journeys.forEach(j => {
    html += `<div class="journey"><h4>${esc(j.archetype)}</h4>`;
    html += `<p>${esc(j.journey_summary)}</p>`;
    if (j.friction_points && j.friction_points.length) {
      html += `<ul class="friction">`;
      j.friction_points.forEach(fp => { html += `<li>${esc(fp)}</li>`; });
      html += `</ul>`;
    }
    if (j.bright_spots && j.bright_spots.length) {
      html += `<ul class="bright">`;
      j.bright_spots.forEach(bs => { html += `<li>${esc(bs)}</li>`; });
      html += `</ul>`;
    }
    html += `</div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderAssessmentsSection() {
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">Assessments & Analysis</span>`;
  html += `</div><div class="section-body">`;

  const ca = DATA.assessments.cohesion_analysis;
  if (ca) {
    html += `<div class="assessment"><h4>Cohesion Analysis</h4><table><tr><th>Dimension</th><th>Score</th><th>Notes</th></tr>`;
    Object.entries(ca).forEach(([dim, val]) => {
      if (typeof val === 'object' && val.score) {
        html += `<tr><td>${esc(dim.replace(/_/g, ' '))}</td><td>${esc(val.score)}</td><td>${esc(val.notes || '')}</td></tr>`;
      }
    });
    html += `</table></div>`;
  }

  const aa = DATA.assessments.autonomous_assessment;
  if (aa) {
    html += `<div class="assessment"><h4>Autonomous Readiness</h4><table>`;
    html += `<tr><td>Overall Potential</td><td>${esc(aa.potential||aa.overall_potential||'')}</td></tr>`;
    html += `<tr><td>HITL Points</td><td>${aa.hitl_points||aa.hitl_interaction_points||0}</td></tr>`;
    html += `<tr><td>Auto-Resolvable</td><td>${aa.auto_resolvable||0}</td></tr>`;
    html += `<tr><td>Needs Input</td><td>${aa.needs_input||0}</td></tr>`;
    if (aa.notes) html += `<tr><td>Notes</td><td>${esc(aa.notes)}</td></tr>`;
    html += `</table></div>`;
  }

  const ti = DATA.assessments.top_insights;
  if (ti && ti.length) {
    html += `<div class="assessment"><h4>Top Insights</h4>`;
    ti.forEach(t => {
      const tiTitle = t.title || t.insight || '';
      const tiDetail = t.detail || t.why_it_matters || '';
      const tiAction = t.action || t.suggestion || '';
      html += `<div style="margin:0.5rem 0"><strong>${esc(tiTitle)}</strong>`;
      if (tiDetail) html += `<br><em>Context:</em> ${esc(tiDetail)}`;
      if (tiAction) html += `<br><em>Suggestion:</em> ${esc(tiAction)}`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

// --- Interactions ---
function toggleSection(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function toggleSelect(id, checked) {
  if (checked) selected.add(id); else selected.delete(id);
  document.getElementById('sel-count').textContent = selected.size;
  document.getElementById('footer').classList.toggle('hidden', selected.size === 0);
}

// --- Prompt Generation ---
function itemById(id) { return DATA.items.find(i => i.id === id); }

function buildPromptForItem(item) {
  let p = '';
  const sev = item.severity.replace('-', ' ').toUpperCase();
  const loc = item.file ? `${item.file}${item.line ? ':'+item.line : ''}` : '';
  p += `**[${sev}] ${item.title}**\n`;
  if (loc) p += `- File: ${loc}\n`;
  if (item.description && item.description !== item.title) p += `- Context: ${item.description}\n`;
  if (item.action) {
    const label = item.action_type === 'fix' ? 'Fix' : item.action_type === 'create-script' ? 'Create script' : 'Suggestion';
    p += `- ${label}: ${item.action}\n`;
  }
  if (item.impact) p += `- Impact: ${item.impact}\n`;
  return p;
}

function buildPrompt(ids) {
  const items = ids.map(itemById).filter(Boolean);
  const fixes = items.filter(i => i.action_type === 'fix');
  const scripts = items.filter(i => i.action_type === 'create-script');
  const enhancements = items.filter(i => i.action_type === 'enhance' || i.action_type === 'refactor');

  let prompt = `## Task: Quality Improvements for ${DATA.meta.skill_name}\nSkill path: ${DATA.meta.skill_path}\n\n`;

  if (fixes.length) {
    prompt += `### Fix These Issues (${fixes.length})\n\n`;
    fixes.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  if (scripts.length) {
    prompt += `### Create These Scripts (${scripts.length})\n\n`;
    scripts.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  if (enhancements.length) {
    prompt += `### Implement These Enhancements (${enhancements.length})\n\n`;
    enhancements.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  return prompt.trim();
}

function copySinglePrompt(id) {
  const item = itemById(id);
  if (!item) return;
  let prompt = `## Task: Quality Fix for ${DATA.meta.skill_name}\nSkill path: ${DATA.meta.skill_path}\n\n`;
  prompt += buildPromptForItem(item);
  navigator.clipboard.writeText(prompt).then(() => {
    const btn = document.querySelector(`[onclick="copySinglePrompt('${id}')"]`);
    if (btn) { btn.classList.add('copied'); btn.textContent = '\u2713'; setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '\u2398'; }, 1500); }
  });
}

function showBatchPrompt() {
  const prompt = buildPrompt([...selected]);
  document.getElementById('modal-content').textContent = prompt;
  document.getElementById('modal').classList.add('visible');
}

function closeModal() { document.getElementById('modal').classList.remove('visible'); }

function copyModal() {
  const text = document.getElementById('modal-content').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.modal-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; }, 1500);
  });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

init();
</script>
</body>
</html>
