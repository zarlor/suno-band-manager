ry (or ask casually during the first song: 'By the way, which Suno plan are you on? It helps me know what features to recommend.'). Let mode emerge from behavior. Capture exclusions organically during the first feedback loop. Save preferences as they naturally surface rather than front-loading an interview.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-003", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "high-opportunity", "rank": 1, "category": "facilitative-pattern", "file": "create-song.md", "line": null, "title": "Missing Capture-Don't-Interrupt pattern during creative direction gathering", "description": "When users describe their song in Step 2, they often share information that belongs to multiple downstream skills -- vocal preferences that should go to the Style Prompt Builder, lyrical themes that inform the Lyric Transformer, and emotional arcs that affect both. If the user provides this in a single creative burst, the agent needs to silently capture all of it and route appropriately rather than interrupting to categorize. Currently there is no explicit instruction to capture out-of-scope information during direction gathering. A user saying 'I want a moody electronic track with lyrics about my grandmother's garden, and I never want autotune' is providing song direction, lyric context, and an exclusion preference in one breath.", "action": "Add a Capture-Don't-Interrupt directive to Step 2: when the user provides information that spans multiple downstream concerns (lyrics content, style preferences, exclusions, band profile updates, Suno feature questions), capture everything silently and route to the appropriate skill or memory update. Never interrupt creative flow to categorize or redirect. Process the full input, then confirm what was captured: 'Got it -- moody electronic sound, grandmother\\'s garden theme for lyrics, and autotune is perma pportunities-000", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "high", "rank": 1, "category": "extraction", "file": "SKILL.md", "line": 72, "title": "LLM dynamically generates capability menu from bmad-manifest.json on every activation", "description": "Determinism confidence: certain. Estimated token savings: 300-500 per activation (reading JSON, iterating capabilities, formatting numbered menu). Implementation complexity: trivial. Language: python. Could be prepass: yes. Feeds scanner: none. Reusable across skills: yes — any agent with a bmad-manifest.json. Help pattern savings: 50+ tokens by referencing --help instead of inlining menu generation instructions in SKILL.md. The pre-activate.py script already has render_menu() — but SKILL.md still instructs the LLM to 'Generate from actual manifest data — DO NOT hardcode menu items' rather than calling the script.", "action": "Update SKILL.md On Activation to call pre-activate.py --scaffold (which already renders the menu and builds the routing table) and use its JSON output directly, instead of instructing the LLM to read bmad-manifest.json and generate the menu itself. The script already exists — the prompt just does not use it for menu rendering.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-002", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "high", "rank": 1, "category": "preprocessing", "file": "browse-songbook.md", "line": 13, "title": "LLM scans multiple directories and formats a songbook inventory on every browse", "description": "Determinism confidence: high. Estimated token savings: 500-1500 per invocation depending on songbook size (scanning docs/songbook/, docs/feedback-history/, chronology.md, listing files, extracting metadata, grouping by band profile). Implementation complexity: moderate. Language: python. Could be prepass: yes. Feeds scanner: none. Reusable across skills: no — specific to band manager. Help pattern savings: N/A. The LLM reads potentially many files just to build an inventory listing. A script could scan these directories, extract frontmatter/metadata from each file, group by band profile, and present a compact JSON inventory that the LLM uses for conversational presentation.", "action": "Create scripts/scan-songbook.py that takes project-root as input, scans docs/songbook/ and docs/feedback-history/ for saved songs/feedback, extracts metadata (title, date, band profile, model, transformations) from each file, reads chronology.md for session timeline, groups by band profile, and outputs a compact JSON inventory. The LLM then uses this structured data for conversational browsing rather than reading raw files.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "structure-004", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "high", "rank": 1, "category": "progression", "file": "browse-songbook.md", "line": 46, "title": "No progression condition keywords found", "description": "browse-songbook.md has no progression condition keywords, making it unclear when the prompt completes or hands control back.", "action": "Add explicit progression/completion conditions (e.g., 'when complete', 'proceed when', 'if user confirms') so the agent knows when this capability is done.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-007", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "high", "rank": 1, "category": "progression", "file": "init.md", "line": 56, "title": "No progression condition keywords found", "description": "init.md has no progression condition keywords. After first-run setup completes, it is unclear how control returns to the main activation flow.", "action": "Add explicit progression/completion conditions indicating that after setup is stored, control returns to the main activation sequence (greeting + menu).", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-010", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "high", "rank": 1, "category": "progression", "file": "save-memory.md", "line": 31, "title": "No progression condition keywords found", "description": "save-memory.md has no progression condition keywords. After memory is saved, it is unclear how control returns to Mac.", "action": "Add explicit progression/completion conditions (e.g., 'when save is complete, return to main menu') so the agent knows this capability is done.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-006", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "medium", "rank": 2, "category": "gap", "file": "bmad-manifest.json", "line": null, "title": "No dedicated 'delete song' or 'remove from songbook' capability", "description": "The songbook (browse-songbook.md) supports View, Reuse, Compare, and Export -- but there is no way to remove a song from the songbook. Over time, the songbook will accumulate failed experiments, test generations, and abandoned ideas. Without a cleanup mechanism, the browsing experience degrades. The agent can create and refine songs but cannot clean up its own creative history.", "action": "Add a delete/archive action to browse-songbook.md (Step 3), or add a songbook management capability that allows removing or archiving entries. Even a simple 'archive this song' that moves it out of the active view would suffice.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-007", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "medium", "rank": 2, "category": "gap", "file": "browse-songbook.md", "line": null, "title": "Browse songbook has no search or filter capability", "description": "The songbook groups by band profile and offers View/Reuse/Compare/Export, but for a user with dozens of songs, there is no way to search by genre, mood, date range, model used, or keyword. The presentation is a flat list that will become unwieldy at scale. Given that Mac is designed for ongoing creative work (chronology, patterns, session continuity), the songbook needs to scale with usage.", "action": "Add search/filter options to Step 3: filter by band profile, genre, date range, model, or keyword search across titles and style prompts. Even basic filtering ('show me my rock songs' or 'what did I make last month') would significantly improve usability.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "enhancement-opportunities-004", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "experience-gap", "file": "browse-songbook.md", "line": null, "title": "Songbook is read-only with no creative re-entry points beyond 'reuse'", "description": "The songbook capability lets users view, reuse, compare, and export past songs. But it misses the most powerful creative action: remixing or evolving a past song. A user looking at their songbook is often thinking 'I loved the vibe of Song X but want to take it somewhere new.' The current 'reuse' option just pre-loads a style prompt -- it does not offer creative evolution paths like 'what if this song were acoustic?' or 'make a sequel to this song' or 'combine the best elements of these two songs.' The songbook is a museum when it should be a launchpad.", "action": "Add creative re-entry actions beyond reuse: 'Evolve' (take a song in a new direction with one major change), 'Mashup' (combine elements from two songs), 'Sequel' (generate a thematically connected follow-up), 'Acoustic/Electric flip' (re-imagine the instrumentation). These route to create-song with rich pre-loaded context from the original, giving the user a head start on creative evolution rather than starting from scratch.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-005", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "journey-friction", "file": "refine-song.md", "line": 20, "title": "Starting a refinement fresh requires the user to recall and re-provide their original prompts", "description": "If a user comes directly to refine-song without having run create-song in the same session, they are asked to provide their original style prompt, lyrics, parameters, model, and intent. Most users will not have this readily available -- they pasted it into Suno, generated, listened, and came back. Asking them to reproduce the technical details they already forgot creates friction. The 'minimal context path' helps but still requires the user to describe what they generated, which may have been days ago.", "action": "Add automatic package lookup: if the user has songbook entries or chronology entries, offer to pull the most recent package. 'Looks like your last song was Jasmine House -- is that the one you want to refine?' If no saved work exists, accept the absolute minimum: 'Just tell me what it sounds like and what you wish were different -- I will work backwards from there.' The Feedback Elicitor can diagnose from emotional descriptions alone.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-006", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "edge-case", "file": "SKILL.md", "line": 100, "title": "Skill availability check has no retry or delayed-availability handling", "description": "The activation sequence checks if external skills are available and offers degraded paths if they are not. But skills in an LLM environment may become available mid-conversation (e.g., tool registration delay, context window reload). Once Mac announces a skill is unavailable and switches to inline handling, there is no mechanism to re-check later in the session. A user who starts with degraded mode is stuck there even if the skill recovers.", "action": "Add a soft re-check: when a user requests a capability that was previously degraded, re-check skill availability before proceeding inline. 'Good news -- my style prompt specialist is back online. Want me to re-run your prompt through the full engine?' This also means not over-committing to degraded mode in the initial announcement: 'My style prompt specialist is not responding right now. I will handle it myself for now, but I will check again if you need another prompt later.'", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-007", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "experience-gap", "file": "save-memory.md", "line": null, "title": "Memory save is manual-only with no auto-save on significant milestones", "description": "The save-memory capability requires explicit invocation (menu code SM or accepting the prompt after create-song). If a user creates a great song package, provides three rounds of refinement feedback, discovers important preferences, and then closes their session without saving, everything is lost. The agent mentions 'Want me to remember your preferences?' after song creation, but this is easily dismissed, and it does not trigger after refinement rounds or preference changes that are not write-through.", "action": "Implement milestone-based auto-save prompts: after completing a refine-song loop (not just create-song), after discovering a new pattern (user mentions the same preference twice), and after any session exceeding 10 exchanges. Make the prompt lightweight: 'Quick save before we continue?' rather than a formal capability invocation. For write-through items (tier, mode, exclusions), these already auto-save -- extend that list to include the current song package state so refinement can resume across sessions.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-008", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "edge-case", "file": "create-song.md", "line": 98, "title": "Song extension workflow is under-specified compared to other paths", "description": "The song extension path ('user wants to add to or continue a previously generated song') gets three bullet points while other paths (instrumental, non-English, long text) get detailed handling instructions. Extension is actually one of the most common real-world use cases -- a user loves their verse/chorus but wants to add a bridge, extend the outro, or create a Part 2. The current instructions do not address key questions: how to maintain metatag continuity, how to handle the Extend feature's tendency to drift from the original style, or how to generate a compatible second half that tonally matches the first.", "action": "Expand the song extension workflow to match the detail level of other special paths. Include: (1) load the original package from songbook/memory, (2) analyze what sections exist and what is missing, (3) generate new sections with explicit style continuity constraints passed to the Style Prompt Builder, (4) warn about Suno Extend drift and suggest generating the extension as a fresh song with matching parameters as an alternative, (5) present the combined package with old and new sections clearly marked.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-009", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "facilitative-pattern", "file": "SKILL.md", "line": null, "title": "No Parallel Review Lenses before presenting the final package", "description": "The create-song flow assembles the package from the Lyric Transformer and Style Prompt Builder outputs and presents it directly. There is no moment where the assembled package is reviewed from multiple perspectives before the user sees it. A quick internal review could catch issues like: the style prompt describes energy that contradicts the lyric metatags, the exclusion list conflicts with the style prompt's genre implications, or the wild card variant is too similar to the primary to be useful. The Feedback Elicitor exists for post-generation review, but a pre-presentation sanity check would reduce round-trips.", "action": "Before presenting the package in Step 5, run a brief internal consistency check across three lenses: (1) Coherence -- do the style prompt, lyrics, and exclusions tell the same story? (2) Suno Awareness -- does anything in the package trigger known Suno pitfalls (e.g., 'metal' without vocal direction, BPM tags in lyrics, exceeding character limits)? (3) Surprise Value -- is the wild card variant genuinely different from the primary, or just a rephrasing? Flag any issues to the user as part of the presentation: 'One thing to watch: your style prompt says mellow but the chorus has belted vocals and exclamation marks -- Suno might push the energy higher than you want.'", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-010", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "autonomous-potential", "file": "create-song.md", "line": 13, "title": "Headless mode contract is solid but missing batch and pipeline integration patterns", "description": "The headless input/output contract is well-defined for single song creation. However, the most valuable headless use case is batch processing -- generating an album's worth of songs from a concept document, or A/B testing multiple style prompt variations for the same lyrics. The current contract returns a single package; there is no pattern for 'generate 5 variations of this concept' or 'here are 12 song descriptions for an album, generate all packages.' The USAGE.md mentions batch processing conceptually but provides no concrete contract.", "action": "Extend the headless contract with a batch mode: accept an array of song specifications and return an array of packages. Add a 'variations' parameter that generates N packages with controlled variation (e.g., same lyrics but different style prompts, or same genre with different creativity modes). Define the output contract for batch mode: array of packages with an index and status per entry, plus a summary of any failures. This transforms Mac from a single-song tool into an album production pipeline.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-011", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "delight-opportunity", "file": "SKILL.md", "line": 19, "title": "Mac's persona could leverage music knowledge more actively during creative direction", "description": "Mac is described as having 'the soul of a New Orleans musician and the ear of a producer,' but the creative direction gathering in create-song is mostly receptive -- Mac asks questions and processes answers. A real producer does not just ask what you want; they hear what you are describing and make creative leaps: 'You know what that reminds me of? There is this thing Tom Waits does where...' or 'That bittersweet vibe you are describing -- have you heard of shoegaze? It lives in exactly that emotional space.' Mac could be more generative during direction-gathering, offering creative suggestions and unexpected connections that expand the user's vision rather than just narrowing it down.", "action": "Add a 'creative riff' behavior to Studio and Jam modes: after the user provides initial direction, Mac offers one unexpected creative connection or suggestion before building. In Studio mode, this is a thoughtful musical reference ('That emotional arc you described reminds me of how Radiohead builds tension in OK Computer -- want me to channel some of that spaciousness?'). In Jam mode, this is a wild creative leap ('What if we took that sad folk vibe and ran it through a drum-and-bass filter? Trust me.'). Keep it to one suggestion per song -- more becomes pushy.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-012", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "assumption-risk", "file": "init.md", "line": null, "title": "Setup assumes the user knows their Suno tier and what the interaction modes mean", "description": "Question 1 asks 'Which plan are you on? (Free, Pro, Premier)' -- but a user who just signed up for Suno yesterday may not remember their tier name, or may not know the difference matters. Question 2 asks about Demo/Studio/Jam modes using names the user has never encountered. The explanations help, but the user is being asked to make a permanent-feeling choice about something they have no experience with. This creates decision paralysis for first-timers who are afraid of choosing wrong.", "action": "For tier: offer to help them figure it out ('Not sure? Tell me if you pay for Suno or use the free version, and I will figure out the rest.'). For mode: skip the question entirely on first run and let behavior emerge naturally. After the first song, mention modes: 'By the way, I kept things quick this time -- that is Demo mode. If you ever want to go deeper into the creative details, just say Studio mode.' This teaches through experience rather than asking for a commitment before the user has context.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-013", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "edge-case", "file": "SKILL.md", "line": 54, "title": "Context compaction could drop critical state in long creative sessions", "description": "A Studio mode session with multiple refinement rounds can generate substantial conversation context: the original direction, lyric transformer output, style prompt builder output, the assembled package, user feedback, feedback elicitor triage, adjusted package, more feedback, etc. In long sessions, LLM context compaction may drop early conversation details. The agent has no mechanism to detect when critical state (the original song direction, the current package state, the band profile context) might be at risk of being lost. If compaction drops the current style prompt mid-refinement, the next adjustment round will produce incoherent results.", "action": "Add a lightweight state checkpoint mechanism: after each complete create or refine cycle, summarize the current package state and key decisions into a compact block that can be re-injected if context feels thin. This could be as simple as: at the top of each refinement round, re-state the current package in a condensed format. Alternatively, lean on the save-memory capability more aggressively -- auto-checkpoint after each refinement round so the state exists on disk even if context compaction drops it from the conversation.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "execution-efficiency-005", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "medium", "rank": 2, "category": "no-output-spec", "file": "create-song.md", "line": 111, "title": "Lyric Transformer invocation lacks output format specification", "description": "When invoking bmad-suno-lyric-transformer in Step 3, the prompt passes context (source text, band profile, direction, language, creativity mode) but does not specify an expected return format, token budget, or 'ONLY return' constraint. Without output format guidance, the skill may return verbose explanatory text alongside the structured lyrics, bloating the parent context.", "action": "Add expected return format specification when invoking the Lyric Transformer, e.g., 'Return structured lyrics with metatags only — no commentary or explanation unless there are warnings.'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "execution-efficiency-006", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "medium", "rank": 2, "category": "no-output-spec", "file": "create-song.md", "line": 131, "title": "Style Prompt Builder invocation lacks output format specification", "description": "When invoking bmad-suno-style-prompt-builder in Step 4, context is passed but no return format is specified. The builder could return the style prompt plus extensive rationale, consuming unnecessary tokens in the parent context.", "action": "Add expected return format specification when invoking the Style Prompt Builder, e.g., 'Return style prompt text, character count, exclusion list, and slider recommendations as structured data — no rationale unless requested.'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "execution-efficiency-007", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "medium", "rank": 2, "category": "no-output-spec", "file": "refine-song.md", "line": 35, "title": "Feedback Elicitor invocation lacks output format specification", "description": "When invoking bmad-suno-feedback-elicitor in Step 2, extensive context is passed but no return format is specified. The elicitor's structured adjustment recommendations should be returned in a predictable format so the parent can route efficiently.", "action": "Add expected return format specification when invoking the Feedback Elicitor, e.g., 'Return adjustment recommendations as structured data: style_prompt_adjustments, lyric_adjustments, slider_changes, model_suggestion, studio_features — no narrative.'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-000", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "medium", "rank": 2, "category": "self-containment", "file": "browse-songbook.md", "line": 1, "title": "No config header with language or project-root variables", "description": "browse-songbook.md lacks a config header. It uses {project-root} references but does not declare or receive these variables. If SKILL.md is compacted out of context, the prompt has no way to resolve these paths. All 5 capability prompts share this issue (0 of 5 have config headers per pre-pass).", "action": "Add a config header to each capability prompt that declares required variables (at minimum {project-root} and {communication_language}), or document that these are inherited from the activation context.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-001", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "medium", "rank": 2, "category": "self-containment", "file": "init.md", "line": 1, "title": "No config header — relies on SKILL.md context for variables", "description": "init.md uses {project-root} but has no config header declaring it. If invoked after context compaction drops SKILL.md, the agent has no source for the variable.", "action": "Add config header declaring {project-root} and {communication_language}.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-002", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "medium", "rank": 2, "category": "self-containment", "file": "save-memory.md", "line": 1, "title": "No config header — relies on SKILL.md context for variables", "description": "save-memory.md uses {project-root} but has no config header. Same compaction survival issue as other prompts.", "action": "Add config header declaring {project-root}.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-003", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "medium", "rank": 2, "category": "self-containment", "file": "create-song.md", "line": 1, "title": "No config header despite heavy use of context variables", "description": "create-song.md uses {project-root}, {model_name}, and references band profiles by path, yet has no config header. This is the most complex capability prompt and most vulnerable to context compaction.", "action": "Add config header declaring {project-root}, {communication_language}, and document expected context variables.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-004", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "medium", "rank": 2, "category": "self-containment", "file": "refine-song.md", "line": 1, "title": "No config header — relies on session context for variables", "description": "refine-song.md references {project-root} and expects session state from create-song but has no config header.", "action": "Add config header declaring required variables.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "script-opportunities-001", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "extraction", "file": "SKILL.md", "line": 83, "title": "LLM performs menu-code-to-capability routing lookup on every user selection", "description": "Determinism confidence: certain. Estimated token savings: 100-200 per menu selection (re-reading manifest, matching code to prompt/skill-name). Implementation complexity: trivial. Language: python. Could be prepass: yes. Feeds scanner: none. Reusable across skills: yes. Help pattern savings: 30+ tokens. The pre-activate.py script already builds a routing_table — but SKILL.md tells the LLM to 'consult bmad-manifest.json' to determine whether a capability has a prompt or skill-name field.", "action": "Have the LLM use the routing_table output from pre-activate.py (already implemented) rather than re-reading bmad-manifest.json. Update the SKILL.md instruction from 'consult bmad-manifest.json' to 'use the routing table from pre-activate.py output'.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-003", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "counting", "file": "create-song.md", "line": 94, "title": "LLM estimates source text word count for long-text detection", "description": "Determinism confidence: certain. Estimated token savings: 100-150 per create-song invocation with source text (LLM counts/estimates words to decide if text exceeds ~400 words). Implementation complexity: trivial. Language: python. Could be prepass: yes. Feeds scanner: none. Reusable across skills: yes — lyric transformer also benefits. Help pattern savings: minimal.", "action": "Create a simple scripts/text-metrics.py that accepts text input (stdin or file), outputs word count, character count, estimated line count, and a flag for whether it exceeds the 400-word threshold. The LLM calls this before deciding whether to warn the user about long text.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-004", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "counting", "file": "create-song.md", "line": 161, "title": "LLM counts style prompt characters and checks against model-specific limits", "description": "Determinism confidence: certain. Estimated token savings: 100-200 per package presentation (counting characters in the style prompt, comparing to 200 or 1000 limit, calculating overage). Implementation complexity: trivial. Language: either. Could be prepass: no — this is post-processing validation. Feeds scanner: none. Reusable across skills: yes — style prompt builder needs this too. Help pattern savings: minimal. The prompt says 'character_count/limit characters' and warns about exceeding limits — this is pure arithmetic.", "action": "Create scripts/check-prompt-limits.py that accepts a style prompt string and model name, returns character count, applicable limit (200 for v4 Pro, 1000 for others), whether it exceeds the limit, and the overage amount. Can also check lyrics against the 3000-character Suno limit.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-005", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "preprocessing", "file": "save-memory.md", "line": 13, "title": "LLM reads current memory files to determine what needs updating", "description": "Determinism confidence: moderate. Estimated token savings: 200-400 per save operation (reading index.md, patterns.md, chronology.md to assess current state before deciding what to update). Implementation complexity: moderate. Language: python. Could be prepass: yes. Feeds scanner: none. Reusable across skills: no. Help pattern savings: N/A. A pre-pass script could read all memory files and produce a compact summary (file sizes, last-modified dates, section headers, key-value pairs from index.md) so the LLM knows what exists without reading full file contents.", "action": "Extend scripts/check-memory-health.py to include a --summary mode that extracts section headers and key metadata (tier, default mode, active profile, current session state) from index.md, plus section headers and entry counts from patterns.md and chronology.md. This gives the LLM a compact inventory of what memory contains without reading full files.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-009", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "validation", "file": "SKILL.md", "line": 59, "title": "LLM enforces access boundary checks on every file operation by reading access-boundaries.md", "description": "Determinism confidence: certain. Estimated token savings: 150-300 across a session (reading access-boundaries.md, mentally checking each file path against read/write/deny lists). Implementation complexity: trivial. Language: python. Could be prepass: no — called per operation. Feeds scanner: none. Reusable across skills: yes. Help pattern savings: 30+ tokens. The validate-path.py script already exists and does exactly this, but SKILL.md instructs the LLM to 'enforce read/write/deny zones for all file operations' and memory-system.md says 'Before any file operation, verify the path is within allowed boundaries' — suggesting the LLM is expected to do this checking itself rather than calling the script.", "action": "Update SKILL.md and memory-system.md to instruct the LLM to call scripts/validate-path.py before any file read/write operation, rather than mentally enforcing access boundaries. The script already exists and returns a clear allowed/denied JSON response.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "structure-000", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "config-header", "file": "README.md", "line": 1, "title": "No config header with language variables found", "description": "README.md lacks a config header with language variables.", "action": "Add a config header block with required language variables if this prompt needs localization support.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-001", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "config-header", "file": "SUNO-REFERENCE.md", "line": 1, "title": "No config header with language variables found", "description": "SUNO-REFERENCE.md lacks a config header with language variables.", "action": "Add a config header block with required language variables if this prompt needs localization support.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-002", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "config-header", "file": "USAGE.md", "line": 1, "title": "No config header with language variables found", "description": "USAGE.md lacks a config header with language variables.", "action": "Add a config header block with required language variables if this prompt needs localization support.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-003", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "config-header", "file": "browse-songbook.md", "line": 1, "title": "No config header with language variables found", "description": "browse-songbook.md lacks a config header with language variables.", "action": "Add a config header block with required language variables if this prompt needs localization support.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-005", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "config-header", "file": "create-song.md", "line": 1, "title": "No config header with language variables found", "description": "create-song.md lacks a config header with language variables.", "action": "Add a config header block with required language variables if this prompt needs localization support.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-006", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "config-header", "file": "init.md", "line": 1, "title": "No config header with language variables found", "description": "init.md lacks a config header with language variables.", "action": "Add a config header block with required language variables if this prompt needs localization support.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-008", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "config-header", "file": "refine-song.md", "line": 1, "title": "No config header with language variables found", "description": "refine-song.md lacks a config header with language variables.", "action": "Add a config header block with required language variables if this prompt needs localization support.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-009", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "config-header", "file": "save-memory.md", "line": 1, "title": "No config header with language variables found", "description": "save-memory.md lacks a config header with language variables.", "action": "Add a config header block with required language variables if this prompt needs localization support.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-015", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "memory-setup", "file": "SKILL.md", "line": 44, "title": "Memory path uses {project-root} variable but sidecar section references different loading mechanism", "description": "The Sidecar section (line 44) references 'memory/band-manager-sidecar/' via a {project-root} prefix, while On Activation (line 56-59) uses the full '{project-root}/_bmad/_memory/band-manager-sidecar/' path consistently. The Sidecar section's path reads '{project-root}/_bmad/_memory/band-manager-sidecar/' which is consistent. However, line 46 references 'references/memory-system.md' using a relative path while other references use {project-root} prefixed paths — this inconsistency could cause loading failures depending on working directory.", "action": "Ensure all file path references use the same convention — either all relative to the skill directory or all using {project-root} prefix.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-008", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "gap", "file": "SKILL.md", "line": null, "title": "No explicit 'help' or 'explain Suno' capability for confused newcomers", "description": "SKILL.md mentions an intent check for confused users ('I don't know what Suno is') but the response is a redirect ('here's how to get there'). There is no dedicated capability for explaining Suno basics, walking through the platform, or onboarding a user who has never used Suno. The USAGE.md is comprehensive but is a document, not an interactive capability. Given Mac's persona as someone who 'never makes a beginner feel dumb,' a guided Suno orientation would fit naturally.", "action": "Consider adding a lightweight 'Suno 101' capability or integrating basic Suno orientation into the init.md first-run flow. Mac could offer: 'New to Suno? Let me give you the 2-minute tour before we make music.' This would be a natural extension of the 'meet them where they are' principle.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-009", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "redundancy", "file": "create-song.md", "line": null, "title": "Quick refinement in create-song overlaps with refine-song capability", "description": "Create-song Step 6 handles 'quick refinement' for light adjustments within the same conversation, routing deeper feedback to the Feedback Elicitor. Refine-song (RS) is a separate capability that does the same routing. The boundary between 'light adjustment handled by Mac' and 'deeper feedback routed to Feedback Elicitor' is judgment-based rather than rule-based, which could confuse both the agent (which path to take) and users (why sometimes Mac handles feedback directly and sometimes invokes a specialist).", "action": "This is a reasonable design tradeoff -- keeping quick fixes in-flow avoids forcing users to switch capabilities for minor tweaks. Document the heuristic more explicitly: e.g., 'If the user names a specific change to a specific field (style prompt word swap, add an instrument to exclusions), handle it directly. If the feedback involves judgment about what is wrong, route to FE.' The current description ('clear, simple tweaks' vs. 'deeper feedback') is slightly vague.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "enhancement-opportunities-014", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "edge-case", "file": "create-song.md", "line": 89, "title": "URL detection tells user Mac cannot listen but does not leverage web search for context", "description": "When a user pastes a YouTube or Spotify URL, Mac says it cannot listen and asks the user to describe what they hear. But the Research Discipline section of SKILL.md establishes that Mac should search first. For a YouTube URL, Mac could search for the song title and artist to get genre, instrumentation, and mood context -- even without hearing the audio. For a Suno URL, the page might contain the style prompt and settings that were used. The current handling leaves value on the table.", "action": "When a URL is pasted, attempt to extract the song/artist name from the URL or ask the user for it, then use web search to look up the song's sonic characteristics. 'I cannot listen to the audio, but let me look up that track... Okay, that is a dreamy shoegaze track with heavy reverb guitars and breathy vocals. Sound right? I will use that as our starting point.' This turns a dead-end into a productive interaction.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-015", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "delight-opportunity", "file": "browse-songbook.md", "line": null, "title": "Songbook could surface creative evolution insights over time", "description": "The songbook groups songs by band profile and shows technical details (date, transformations, model). But it does not help the user see their creative evolution: how their sound has changed over time, which genres they gravitate toward, what feedback patterns keep recurring, or which experiments produced breakthroughs. A songbook that just lists songs is a filing cabinet. A songbook that shows creative growth is a mirror.", "action": "Add a 'Creative Evolution' view to the songbook that synthesizes patterns from chronology.md and patterns.md: 'Over your last 10 songs, you have moved from clean pop toward rawer indie folk. Your breakthrough moment was when you tried lo-fi production on Jasmine House. Your most common refinement feedback is about vocals being too polished.' This can be generated on-demand ('show me my creative evolution') without adding complexity to the default browse view.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-016", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "journey-friction", "file": "SKILL.md", "line": 66, "title": "Mode switching is supported but the current mode is never surfaced proactively", "description": "Users can switch modes at any time, and Mac adjusts immediately. But the user has no visible indicator of what mode they are currently in. In a long session, a user might forget they switched to Jam mode three songs ago and wonder why Mac is being so experimental. There is no 'you are here' signal in the conversation.", "action": "Include a subtle mode indicator in the package presentation header: 'Your Suno Package (Studio Mode)' or mention it naturally: 'Here is your Demo package -- quick and punchy.' This also serves as a reminder that other modes exist: a user who always sees 'Demo Mode' might eventually wonder what Studio Mode offers.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-017", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "delight-opportunity", "file": "refine-song.md", "line": null, "title": "Refinement loop has no concept of 'good enough' or diminishing returns", "description": "The refinement loop tells users they can keep refining indefinitely ('Each time they return with feedback, loop back to Step 2'). But in practice, Suno's stochastic nature means that after 2-3 rounds of prompt refinement, the remaining gap between what the user wants and what Suno produces is often not addressable through prompt changes -- it is inherent to the generation model. A user chasing perfection through infinite refinement rounds will get frustrated. Mac, as a producer, should know when to say 'this is as good as the prompt can get -- now generate 5 versions and pick the best one.'", "action": "After 2-3 refinement rounds on the same song, Mac should offer a producer's perspective: 'We have refined this prompt pretty thoroughly. At this point, the best strategy is to generate 5-10 versions on Suno with these settings and pick the one that clicks. Suno's randomness is your friend here -- one of those versions will probably nail it.' This is honest, actionable, and matches how real producers work with generative tools.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "execution-efficiency-004", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "low", "rank": 3, "category": "batching", "file": "browse-songbook.md", "line": 13, "title": "Three independent location scans not explicitly batched", "description": "Step 1 checks three independent locations (docs/songbook/, docs/feedback-history/, chronology.md) but does not instruct the LLM to read them in a single parallel batch. Currently listed as sequential bullet points. With only 3 items the time savings are modest.", "action": "Add an explicit instruction to read all three locations in a single parallel batch, similar to the parallel batch pattern used in SKILL.md On Activation.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "execution-efficiency-008", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "low", "rank": 3, "category": "batching", "file": "save-memory.md", "line": 24, "title": "Checkpoint writes to patterns.md and chronology.md could be parallelized", "description": "Step 4 checkpoints patterns.md and chronology.md sequentially after writing index.md. These two writes are independent of each other and could execute in parallel. Impact is minor since memory writes are small operations.", "action": "Note that patterns.md and chronology.md checkpoint writes can run as a parallel batch after index.md write completes.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-005", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "token-waste", "file": "SKILL.md", "line": 30, "title": "Research Discipline section is verbose for SKILL.md — candidate for extraction", "description": "The Research Discipline section (lines 30-40, ~11 lines) repeats guidance that applies to all orchestrated skills. While the principle is load-bearing (it prevents hallucination about Suno capabilities), the detailed bullet points could be condensed to 2-3 lines in SKILL.md with full detail in a reference file. The section currently uses ~200 tokens on what is essentially one principle stated five different ways.", "action": "Condense to a 2-3 line summary in SKILL.md ('Search first, assume never — verify all Suno claims via web search or reference files. Pass research findings to invoked skills.') and extract the detailed bullets to a reference file if needed.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-007", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "progressive-disclosure", "file": "SUNO-REFERENCE.md", "line": 1, "title": "Reference file at skill root instead of references/ directory", "description": "SUNO-REFERENCE.md (234 lines, ~4675 tokens) sits at the skill root rather than in the references/ directory. While it is not a capability prompt (no frontmatter), its placement at root risks it being loaded alongside capability prompts unnecessarily. The references/ directory already exists with memory-system.md.", "action": "Move SUNO-REFERENCE.md to references/ directory for consistent progressive disclosure structure.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-008", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "progressive-disclosure", "file": "USAGE.md", "line": 1, "title": "Large user-facing documentation file at skill root", "description": "USAGE.md (808 lines, ~9294 tokens) is a comprehensive user guide sitting at the skill root. This is end-user documentation, not a capability prompt, and represents ~39% of total skill tokens. Its presence at root means it could be inadvertently loaded into agent context. It has no frontmatter so it should not be invoked as a capability, but its size at root is notable.", "action": "Consider moving to a docs/ subdirectory or ensuring the manifest/loader excludes non-frontmatter .md files from capability loading.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-012", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "under-contextualized", "file": "browse-songbook.md", "line": 11, "title": "Minimal context for judgment-heavy browsing capability", "description": "browse-songbook.md is only 46 lines and covers scanning, presenting, and interacting with a songbook. The 'Interact' step lists four user actions (view, reuse, compare, export) but provides no guidance on how to present comparisons or what makes a good export format. For a persona-driven agent, this prompt could benefit from a line or two about Mac's personality when browsing ('browsing the record collection').", "action": "Consider adding 2-3 lines of guidance on comparison presentation and export format. The line 45 persona note is good but could be reinforced with a brief example.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "script-opportunities-006", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "structure", "file": "SKILL.md", "line": 57, "title": "LLM checks if sidecar directory exists on every activation", "description": "Determinism confidence: certain. Estimated token savings: 50-80 per activation (checking directory existence, deciding whether to run pre-activate.py). Implementation complexity: trivial. Language: python. Could be prepass: yes. Feeds scanner: none. Reusable across skills: yes. Help pattern savings: minimal. The pre-activate.py script already handles this via check_first_run() and --scaffold flag — this is already scripted but the SKILL.md On Activation instructions still describe the check as an LLM decision point rather than delegating fully to the script.", "action": "Simplify SKILL.md On Activation step 2 to always run pre-activate.py --scaffold (which is idempotent) and use its first_run field to decide whether to load init.md. Remove the LLM-side directory existence check.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-007", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "validation", "file": "SKILL.md", "line": 102, "title": "LLM verifies external skill availability on activation", "description": "Determinism confidence: high. Estimated token savings: 50-100 per activation (checking if 4 external skills are loadable). Implementation complexity: moderate. Language: python. Could be prepass: yes. Feeds scanner: none. Reusable across skills: yes — any orchestrating agent. Help pattern savings: N/A. Skill availability is a runtime check that could be performed by a script returning a JSON list of available/unavailable skills.", "action": "Create scripts/check-skill-availability.py that takes a list of skill names (from bmad-manifest.json entries with skill-name), checks if each is registered/loadable, and returns a JSON status map. The LLM only needs to handle the degraded-path messaging for unavailable skills.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-008", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "validation", "file": "init.md", "line": 37, "title": "LLM creates access-boundaries.md with static template content during first-run", "description": "Determinism confidence: certain. Estimated token savings: 50-80 per first-run (generating static boilerplate). Implementation complexity: trivial. Language: python. Could be prepass: yes. Feeds scanner: none. Reusable across skills: no. Help pattern savings: N/A. The pre-activate.py script already handles this — it creates access-boundaries.md with the static template. The init.md prompt redundantly describes the file creation, which wastes prompt tokens on every init load even though the script handles it.", "action": "Remove the 'Access Boundaries' and 'Initial Structure' sections from init.md since pre-activate.py --scaffold already creates these files. Init.md should focus solely on the conversational setup questions, which is the LLM's actual job.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-010", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "low", "rank": 3, "category": "extraction", "file": "create-song.md", "line": 56, "title": "LLM reads band profile YAML directly when it knows the profile name", "description": "Determinism confidence: moderate. Estimated token savings: 50-150 per profile load (reading YAML, parsing fields). Implementation complexity: moderate. Language: python. Could be prepass: yes. Feeds scanner: none. Reusable across skills: yes — multiple skills load profiles. Help pattern savings: N/A. The prompt says 'read directly from docs/band-profiles/{name}.yaml if you know the name' — a script could parse the YAML and return a compact JSON summary of the profile fields relevant to the current operation.", "action": "Consider creating scripts/load-profile-summary.py that reads a band profile YAML and returns a compact JSON with the fields most skills need (genre, mood, model, vocal direction, exclusions, style baseline, writer voice summary). Lower priority since the band-profile-manager skill handles most profile operations.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "scripts-000", "scanner": "scripts", "section": "scripts", "type": "issue", "severity": "low", "rank": 3, "category": "agentic-design", "file": "scripts/check-memory-health.py", "line": 1, "title": "No sys.exit() calls — may not return meaningful exit codes", "description": "", "action": "Return 0=success, 1=fail, 2=error via sys.exit()", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "scripts-001", "scanner": "scripts", "section": "scripts", "type": "issue", "severity": "low", "rank": 3, "category": "agentic-design", "file": "scripts/pre-activate.py", "line": 1, "title": "No sys.exit() calls — may not return meaningful exit codes", "description": "", "action": "Return 0=success, 1=fail, 2=error via sys.exit()", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-011", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "low", "rank": 3, "category": "frontmatter", "file": "SKILL.md", "line": 3, "title": "Description trigger clause lacks quoted specific phrases", "description": "The description trigger clause says 'Use when user wants to talk to Mac, requests the Band Manager, or wants to create a song for Suno' but does not use quoted specific phrases. The triggers are reasonably specific (referencing 'Mac' and 'Band Manager' by name) so this is low severity, but quoting key phrases would improve precision.", "action": "Consider quoting key trigger phrases: Use when user says 'talk to Mac', 'Band Manager', or 'create a song for Suno'.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-012", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "low", "rank": 3, "category": "identity", "file": "SKILL.md", "line": 16, "title": "Identity is effective and actionable", "description": "Identity provides a clear, actionable persona: 'Mac is a warm, music-savvy band manager inspired by the spirit of New Orleans.' This is specific, primes behavior well, and connects directly to the agent's domain and capabilities. No issues found.", "action": "No action required.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-013", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "low", "rank": 3, "category": "communication-style", "file": "SKILL.md", "line": 20, "title": "Communication style is strong but could benefit from more discrete examples", "description": "The communication style section uses inline examples within prose ('let's lay down the foundation,' 'time to mix this down') which is effective but could be clearer as a discrete bulleted list of do/don't examples. The adaptive guidance (match technical level) is excellent.", "action": "Consider restructuring as 3-5 discrete example pairs (situation -> response style) for faster scanning, though current prose format is functional.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-014", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "low", "rank": 3, "category": "principles", "file": "SKILL.md", "line": 24, "title": "Principles are domain-specific and guiding", "description": "All three principles are actionable and domain-specific: 'Always output everything', 'Meet them where they are', 'The magic is iteration'. These create clear decision frameworks and avoid generic platitudes. No issues found.", "action": "No action required.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-016", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "low", "rank": 3, "category": "activation-sequence", "file": "SKILL.md", "line": 48, "title": "Activation sequence is logically ordered", "description": "The activation sequence follows correct logical order: (1) load config via bmad-init, (2) check first-run and scaffold if needed, (3) load essentials in parallel (access boundaries, memory index, manifest), (4) greet user, (5) present menu. Config loads before config vars are used; access boundaries load before file operations.", "action": "No action required.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-017", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "low", "rank": 3, "category": "consistency", "file": "SKILL.md", "line": 8, "title": "Identity, communication style, and capabilities are well-aligned", "description": "The 'warm, music-savvy band manager' identity is consistent with the conversational, encouraging communication style and the music production metaphors. The three interaction modes (Demo/Studio/Jam) align with the 'meet them where they are' principle. External skill orchestration aligns with the 'thinks like a producer' identity element. No logical consistency issues found.", "action": "No action required.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-010", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "SKILL.md", "line": null, "title": "Album/EP project mode for multi-song coherence", "description": "Mac handles individual songs and band profiles well, but there is no concept of a 'project' that ties multiple songs together into a coherent album or EP. Users doing album work (explicitly mentioned as a Studio mode use case) would benefit from project-level tracking: song ordering, thematic arcs across tracks, consistent production across songs, and gap analysis ('your album has 6 uptempo tracks and no ballad'). The USAGE.md mentions playlist sequencing as an available workflow, but it is reactive (order existing songs) rather than proactive (plan an album). The songbook groups by band profile but does not support intentional album curation.", "action": "Consider adding a project/album concept: a named collection of songs with an intended track order, thematic arc notes, and production consistency checks. Mac could offer 'start an album project' that creates a lightweight project file tracking intended song count, mood arc, and which slots are filled. This would make the 'album work' use case in Studio mode genuinely first-class rather than just a collection of individual song creations.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "agent-cohesion-011", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "SKILL.md", "line": null, "title": "Template or preset system for common song patterns", "description": "Mac starts from scratch (or band profile baseline) every time. Experienced users who have found combinations that work -- a particular structure, metatag pattern, slider configuration -- have no way to save and reuse those as templates. The songbook supports 'Reuse' (use a style prompt as a starting point) but this is song-level, not pattern-level. A template system would let users save abstract patterns ('my verse-chorus-verse-bridge structure with these metatag placements' or 'my go-to slider config for dreamy tracks') separate from specific songs.", "action": "Consider adding a template/preset concept to the memory system or band profiles. Templates could capture: song structure skeletons, metatag placement patterns, slider presets by mood category, and exclusion sets. Users could say 'use my dreamy template' to pre-load a starting configuration. This would reduce repetitive setup for users with established workflows.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "agent-cohesion-012", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "save-memory.md", "line": null, "title": "Memory save could offer a session summary for the user", "description": "Save-memory currently confirms with 'Memory saved. {brief-summary}' but does not offer the user a human-readable session recap. After a productive session with multiple songs or refinement rounds, a summary like 'This session: created Jasmine House (indie folk, v4.5-all), refined it twice (rawer vocals, more intimate production), updated Midnight Porch profile exclusions' would help users track their creative progress and remember where they left off -- especially since Mac offers session continuity on return.", "action": "Enhance save-memory output to include an optional session recap: songs created/refined, profile changes made, patterns discovered. Keep it brief (3-5 bullets) and conversational, in Mac's voice. This complements the chronology.md entries but gives the user an immediate, readable summary.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "agent-cohesion-013", "scanner": "agent-cohesion", "section": "cohesion", "type": "suggestion", "severity": "suggestion", "rank": 4, "category": "opportunity", "file": "browse-songbook.md", "line": null, "title": "Songbook could surface creative insights and evolution patterns", "description": "The songbook is currently a portfolio browser -- it shows what exists. But given that Mac tracks patterns over time (patterns.md, chronology.md), the songbook could surface insights: 'Your style prompts have gotten more specific over the last 10 songs,' 'You gravitate toward minor keys and breathy vocals,' 'Your refinement rounds have decreased -- your first drafts are getting better.' This would make the songbook not just a record but a creative growth tool, which aligns with Mac's producer persona ('bringing out the best in every creative project').", "action": "Add an optional 'creative insights' view to browse-songbook that analyzes patterns across the user's song history. This could draw from patterns.md and chronology.md to surface trends, growth, and recurring themes. Even simple observations ('7 of your 10 songs use acoustic guitar') would add value.", "impact": "", "extra": {}, "selectable": true, "action_type": "refactor"}, {"id": "prompt-craft-006", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "overview-quality", "file": "SKILL.md", "line": 48, "title": "On Activation section is well-structured but dense", "description": "The On Activation section (lines 48-86, ~38 lines) covers first-run check, loading, greeting, context check, intent check, mode switching, preference changes, and menu presentation. This is appropriate density for a multi-capability orchestrator agent — each item serves a distinct activation concern. The preference-change handling (lines 67-71) is particularly well done, covering tier upgrades and their downstream effects.", "action": "No action needed. Density is justified for an orchestrator agent.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-009", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "outcome-balance", "file": "create-song.md", "line": 84, "title": "Reference track decomposition guidance is well-crafted", "description": "Lines 84-87 provide excellent outcome-focused guidance: decompose references into sonic descriptors, show work before building, ask rather than guess for unknown artists. This is the kind of judgment-enabling context that prevents generic output. The 'show your work' instruction is particularly valuable for user trust.", "action": "No action needed. Good example of outcome-driven prompt craft.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-010", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "outcome-balance", "file": "create-song.md", "line": 138, "title": "Package presentation template is comprehensive and Suno-UI-ordered", "description": "The 'Present the Complete Package' section (lines 138-208) includes a detailed template with conditional sections for tier, model, and feature availability. Ordering matches Suno's UI flow. While long (~70 lines), the template is the core output of the skill and every line serves the copy-paste-ready goal. The contextual tips (lines 199-202) are a nice touch for user education.", "action": "No action needed. Template complexity is justified by the output requirements.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-011", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "self-containment", "file": "refine-song.md", "line": 73, "title": "Good cross-reference to create-song format without fragile back-reference", "description": "Line 75-77 references create-song Step 5 format but includes enough detail (field order list) that the agent can reconstruct the format even if create-song.md is not in context. This is a good self-containment pattern.", "action": "No action needed.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "prompt-craft-013", "scanner": "prompt-craft", "section": "prompt-craft", "type": "strength", "severity": "note", "rank": 4, "category": "overview-quality", "file": "SKILL.md", "line": 8, "title": "Overview section is well-balanced for an orchestrator agent", "description": "The Overview (lines 8-14, 7 lines) efficiently covers mission, domain context, and design rationale in three focused paragraphs. The domain context paragraph explains the Suno two-input problem clearly. The design rationale paragraph justifies key decisions (always output full package, three modes, feedback loop as differentiator). This is appropriate for a companion-interactive/workflow-facilitator hybrid.", "action": "No action needed. Overview quality is strong.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-000", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Exceptionally well-defined persona with natural communication style", "description": "Mac's identity as a warm New Orleans-inspired band manager is vivid, specific, and consistently reflected across all prompt files. The music production metaphors ('lay down the foundation,' 'mix this down') are baked into the communication style, and the principle of meeting users where they are (from 'just make me something sad' to detailed production notes) creates a persona that feels like a real person rather than a generic assistant. This level of persona specificity is rare and makes the agent immediately engaging.", "action": "No action needed -- this is a standout design element to preserve.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-001", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Three interaction modes provide excellent user journey flexibility", "description": "The Demo/Studio/Jam mode system is a smart design that solves the fundamental tension between beginners wanting simplicity and experts wanting control. The auto-detect mode (implicit Studio when 3+ parameters provided) is particularly clever -- it avoids forcing power users through a mode selection step. Mid-session mode switching and default persistence round out a thoughtful UX design.", "action": "No action needed -- the mode system is well-designed and consistently referenced across all prompts.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-002", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "create-song.md", "line": null, "title": "Create-song handles an impressive range of edge cases", "description": "The create-song prompt anticipates and handles: instrumental-only, non-English lyrics, long text overflow, URL/audio paste detection, song extension, zero-input Demo, reference track decomposition, and headless/automation mode. Each edge case has a specific, thoughtful handling path rather than a generic fallback. The parallel invocation of Lyric Transformer and Style Prompt Builder (Step 3 note) shows performance-aware design.", "action": "No action needed -- thoroughness of edge case coverage is a model to follow.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-003", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Research discipline prevents hallucination in a fast-changing domain", "description": "The Research Discipline section explicitly addresses the risk of stale knowledge about Suno's rapidly evolving platform. The principle of 'search first, assume never' with specific guidance on when to verify (artist references, quantitative claims, model capabilities) shows sophisticated awareness of LLM failure modes. The fallback of 'state uncertainty honestly' when no search tool is available is exactly right.", "action": "No action needed -- this is a best practice that other agents should adopt.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-004", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SKILL.md", "line": null, "title": "Graceful degradation when external skills are unavailable", "description": "The Skill Availability section provides a clear degradation path: inform user, offer inline alternative, note what they are missing, never silently fail. This is unusually mature design for a multi-skill agent. Most agents either fail hard or silently produce inferior output.", "action": "No action needed -- preserve this pattern.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "agent-cohesion-005", "scanner": "agent-cohesion", "section": "cohesion", "type": "strength", "severity": "strength", "rank": 5, "category": "strength", "file": "SUNO-REFERENCE.md", "line": null, "title": "Battle-tested reference material with empirically validated findings", "description": "The Suno Reference is not generic documentation -- it contains hard-won empirical findings (BPM tags confirmed ineffective via librosa analysis, 'baroque triggers Disney,' bass-forward rock limitations, scream bleed-through behavior). This kind of validated, specific knowledge dramatically increases the quality of agent output versus agents working from generic training data alone.", "action": "No action needed -- continue validating and updating this reference as Suno evolves.", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "enhancement-opportunities-018", "scanner": "enhancement-opportunities", "section": "creative", "type": "strength", "severity": "strength", "rank": 5, "category": "facilitative-pattern", "file": "SKILL.md", "line": null, "title": "Three-mode architecture is well-designed and genuinely serves different user contexts", "description": "Demo/Studio/Jam is not just cosmetic -- each mode meaningfully changes the question depth, default behaviors, and creative energy of the interaction. Demo mode's 'just go' approach respects users' time, Studio mode's songwriter workshop creates real creative depth, and Jam mode's experimental push enables discovery. The auto-detect for users who provide rich initial context is particularly smart -- it avoids forcing experienced users through a selection they do not need.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "enhancement-opportunities-019", "scanner": "enhancement-opportunities", "section": "creative", "type": "strength", "severity": "strength", "rank": 5, "category": "edge-case", "file": "SKILL.md", "line": 100, "title": "Graceful degradation for missing skills is explicit and honest", "description": "The skill availability section does exactly what it should: inform the user, offer a degraded path, and be transparent about the quality tradeoff. 'I can not reach my style prompt specialist right now, so I will do my best -- but you will get better results once it is back' is perfect. It sets expectations without alarming the user and preserves forward momentum.", "action": "", "impact": "", "extra": {}, "selectable": false, "action_type": "none"}, {"id": "enhancement-opportunities-020", "scanner": "enhancement-opportunities", "section": "creative", "type": "strength", "severity": "strength", "rank": 5, "category": "autonomous-potential", "file": "create-song.md", "line": 13, "title": "Headless mode is already designed with a clear
