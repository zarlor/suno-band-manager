directory (e.g., docs/band-profiles/{profile}/prompt-history/) with timestamps. Allow 'show last prompt for {profile}' as a conversational command.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-005", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "medium", "rank": 2, "category": "gap", "file": "SKILL.md", "line": null, "title": "Web search dependency for reference track decomposition lacks graceful degradation path", "description": "Step 2 item 5 instructs the agent to 'always use web search to verify an artist's sonic characteristics' before decomposing references, falling back to asking the user only when no search tool is available. However, the skill does not define how to detect whether a search tool is available, nor does it provide a structured set of questions for the fallback case. The fallback is a single generic question ('Can you describe what you like about their sound?') which may not extract enough detail for accurate decomposition.", "action": "Add a structured fallback questionnaire for when web search is unavailable: ask about genre, era, vocal style, key instruments, energy/dynamics, and emotional tone separately. This mirrors the extraction framework already defined in model-prompt-strategies.md under 'What to Extract from a Reference'.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "enhancement-opportunities-002", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "facilitative-pattern", "file": "SKILL.md", "line": 93, "title": "No capture-don't-interrupt mechanism for out-of-scope creative input", "description": "When gathering inputs, users in creative flow often volunteer information that belongs to other parts of the workflow -- lyric ideas, song structure preferences, mixing notes. The skill has no mechanism to silently capture this and defer it. If a user says 'and the bridge should have a key change with sparse drums,' that structural info is valuable for the Lyric Transformer but irrelevant to the style prompt. Without capture-and-defer, the skill either ignores it (user feels unheard) or tries to incorporate it (wrong output).", "action": "Add a capture-and-defer note in Step 1: 'If the user provides lyric, structure, or mix-stage information during style prompt gathering, acknowledge it briefly (\"Great note about the bridge -- I will pass that along\") and store it as context for handoff to Lyric Transformer or Feedback Elicitor. Do not try to encode structural directions in the style prompt.'", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-004", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "delight-opportunity", "file": "SKILL.md", "line": 195, "title": "Wild card variant could be more targeted with a 'twist dial'", "description": "The wild card rules say 'twist one or two major elements' but the user has no control over what gets twisted. An expert user who loves their genre foundation but wants to explore production approaches cannot say 'keep the genre, twist the production.' A user who wants to explore adjacent genres cannot say 'keep the vocals, twist the genre.' The wild card is a black box of creativity rather than a directed exploration tool.", "action": "Offer a brief 'twist dial' before generating the wild card: 'What should I twist? (a) genre fusion, (b) era/production shift, (c) mood inversion, (d) instrumentation flip, (e) surprise me.' Default to (e) for users who do not specify. This turns the wild card from a party trick into a serious creative exploration tool.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-005", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "edge-case", "file": "SKILL.md", "line": 20, "title": "Headless refine mode assumes well-structured delta input but provides no schema", "description": "The --headless:refine mode accepts 'an existing style prompt + structured adjustments (add/remove/reorder) from the Feedback Elicitor' but does not define what 'structured adjustments' looks like. If the Feedback Elicitor sends ambiguous deltas ('make it heavier' vs. {add: ['crushing distortion'], remove: ['acoustic guitar']}), the skill has no contract to validate against. This is the most likely headless failure point because it depends on another skill's output format.", "action": "Define an explicit input schema for --headless:refine in the SKILL.md or in references/. Example: {existing_prompt: string, model: string, adjustments: {add: string[], remove: string[], reorder: string[], replace: {from: string, to: string}[]}}. Reference this schema in both the Style Prompt Builder and the Feedback Elicitor so their contract is explicit.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-006", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "autonomous-potential", "file": "SKILL.md", "line": 24, "title": "Headless migrate mode could enable batch model migration across a catalog", "description": "The --headless:migrate mode reformats a single prompt from one model to another. But a band with 15 songs on v4.5 wanting to try v5 Pro would need to invoke this 15 times manually. The mode is built for single-prompt invocation when the highest-value use case is batch migration. An automator or pipeline could chain these, but the skill does not advertise or facilitate batch input.", "action": "Document a batch invocation pattern in the README: 'For catalog-wide migration, invoke --headless:migrate for each prompt in a loop. Input: array of {prompt, from_model, to_model}. Consider adding a --headless:migrate-batch mode that accepts an array and returns an array, reducing invocation overhead for pipeline users.'", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-007", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "edge-case", "file": "SKILL.md", "line": 100, "title": "Web search dependency for reference track decomposition has no timeout or fallback chain", "description": "Step 2.5 says 'Always use web search to verify an artist's distinctive sonic characteristics' and falls back to asking the user only when 'no search tool is available.' But web search can also be available-but-slow, rate-limited, or returning irrelevant results. There is no intermediate fallback: use training knowledge with a confidence disclaimer. The binary available/unavailable check misses the degraded-search scenario that is far more common in practice.", "action": "Add a three-tier fallback chain: (1) web search for verification, (2) if search is slow/unhelpful, use training knowledge but flag with 'Based on my knowledge -- please verify these details match what you hear in [artist]', (3) if confidence is low even with training knowledge, ask the user. This graceful degradation prevents the skill from blocking on a slow search or producing nothing when the search returns noise.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-008", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "experience-gap", "file": "SKILL.md", "line": 126, "title": "Model-specific formatting differences are invisible to the user until output", "description": "The skill silently chooses between conversational (v4.5) and film-brief (v5) formatting based on model selection. The user never sees WHY their prompt looks the way it does. An expert who chose v5 Pro might wonder why the prompt is so terse; a first-timer on v4.5-all might think the verbose output is wrong. The formatting rationale is hidden inside the skill's logic, creating a comprehension gap between 'what I got' and 'why it looks like this.'", "action": "Add a one-line rationale above the style prompt output: 'v5 Pro responds best to crisp, film-brief descriptors -- so I kept this tight and evocative rather than conversational.' This takes zero extra tokens in the prompt itself but transforms the user's understanding of the output.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-011", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "facilitative-pattern", "file": "SKILL.md", "line": 246, "title": "No dual-output for downstream LLM consumption", "description": "The skill produces human-readable output (formatted prompt package with headers and reasoning) and copy-ready blocks for Suno's UI. But when another skill (Feedback Elicitor, Lyric Transformer) needs to consume the style prompt programmatically, it must parse the human-formatted output. There is no LLM-optimized distillate -- a compact structured representation of the prompt package that downstream skills can consume without parsing presentation formatting.", "action": "After the copy-ready blocks, offer a structured JSON distillate for downstream consumption: {model, style_prompt, exclusion_prompt, sliders: {weirdness, style_influence, audio_influence}, wild_card: string|null, creativity_mode, profile_used}. Gate this behind a flag or only emit it when the invoker is another skill (detectable via headless mode or explicit request).", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-014", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "medium-opportunity", "rank": 2, "category": "facilitative-pattern", "file": "SKILL.md", "line": null, "title": "No parallel review lenses before finalizing the prompt package", "description": "The skill builds the prompt, presents it, and offers refinement. But it never self-reviews the output through multiple lenses before presenting. A quick internal check from a 'genre accuracy' lens (does this prompt actually describe the requested genre?), a 'Suno gotchas' lens (does this prompt contain any known trigger words?), and a 'user intent' lens (does this prompt capture what the user actually asked for?) would catch issues before the user sees them, reducing refinement round-trips.", "action": "Add a brief self-review substep between building and presenting (Step 2 to Step 6): internally check the draft prompt against (1) the Genre Term Behavior Table for known triggers, (2) the user's original stated intent for drift, and (3) the model-specific strategy for format compliance. Surface any catches as inline notes: 'Note: I avoided \"progressive metal\" because it triggers Dream Theater shred on Suno -- used \"progressive groove metal\" instead.'", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "prompt-craft-002", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "medium", "rank": 2, "category": "self-containment", "file": "SKILL.md", "line": 100, "title": "Web search fallback instruction may be unclear under context compaction", "description": "Line 100 instructs the agent to 'Always use web search (when a search tool is available)' before decomposing reference tracks, with a fallback to asking the user. This is a good instruction, but references/model-prompt-strategies.md lines 310-316 contain a more detailed 'Confidence Check' section covering the same logic. If context compacts and the reference file is dropped, the SKILL.md instruction is sufficient but less nuanced. If SKILL.md is dropped and only the reference survives, the confidence check still works. This is acceptable redundancy -- belt-and-suspenders for a critical judgment call.", "action": "Consider whether the brief mention in SKILL.md line 100 and the detailed version in references are intentionally layered (acceptable) or accidental duplication. If intentional, add a brief note in SKILL.md: 'See Confidence Check in model-prompt-strategies.md for the full protocol.'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "script-opportunities-000", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "extraction", "file": "SKILL.md", "line": 62, "title": "LLM reads band profile YAML and extracts fields that a script could pre-parse", "description": "Determinism confidence: high. Estimated token savings: 300-500 per invocation (profile YAML varies in size). Implementation complexity: moderate. Language: python. Could be prepass: yes. Feeds scanner: n/a. Reusable across skills: yes (any skill that loads band profiles). Help pattern savings: ~50 tokens. Step 1 instructs the LLM to read from docs/band-profiles/{profile-name}.yaml and extract style_baseline, vocal section, exclusion_defaults, model_preference, tier, and reference_tracks. All of these are structured YAML field lookups -- deterministic extraction that a script could do, returning a compact JSON summary instead of the LLM parsing raw YAML.", "action": "Create scripts/extract-profile.py that reads a band profile YAML, extracts style_baseline, vocal, exclusion_defaults, model_preference, tier, and reference_tracks into a compact JSON object. The LLM would receive pre-parsed structured data instead of reading and parsing raw YAML itself.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-002", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "preprocessing", "file": "SKILL.md", "line": 84, "title": "LLM reads entire model-prompt-strategies.md reference to find model-specific strategy", "description": "Determinism confidence: high. Estimated token savings: 800-1500 per invocation (model-prompt-strategies.md is ~6700 tokens; only one model's section is needed per invocation). Implementation complexity: moderate. Language: python. Could be prepass: yes. Feeds scanner: n/a. Reusable across skills: yes (any skill referencing model strategies). Help pattern savings: ~30 tokens. Step 2 instructs the LLM to load references/model-prompt-strategies.md and find the strategy for the selected model. A script could extract only the relevant model section plus the Universal Rules, returning a focused subset instead of the entire 330-line file.", "action": "Create scripts/extract-model-strategy.py that accepts --model and returns only the relevant model section plus the Universal Rules section from model-prompt-strategies.md. This would reduce the LLM's context window consumption by 50-75% per invocation since it only needs one model's strategy, not all five.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-005", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "postprocessing", "file": "SKILL.md", "line": 130, "title": "Exclusion prompt character counting and item counting done by LLM", "description": "Determinism confidence: certain. Estimated token savings: 100-200 per invocation. Implementation complexity: trivial. Language: python. Could be prepass: no (post-processing). Feeds scanner: validate-prompt.py already validates exclusions. Reusable across skills: yes. Help pattern savings: minimal. Step 3 instructs the LLM to keep exclusions under ~200 characters and prioritize 2-3 items. validate-prompt.py already checks exclusion length and item count, but the LLM prompt still contains these instructions as inline guidance during generation. The LLM needs to be aware of the constraint during generation, but the verification is already scripted.", "action": "No new script needed -- validate-prompt.py already handles this. However, the SKILL.md could reference the script's validation as the authority for these checks rather than restating the rules inline, saving ~100 tokens of instruction that merely duplicate what the script enforces.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "script-opportunities-006", "scanner": "script-opportunities", "section": "script-opportunities", "type": "issue", "severity": "medium", "rank": 2, "category": "preprocessing", "file": "SKILL.md", "line": 20, "title": "Headless mode input parsing and error contract could be handled by a dispatch script", "description": "Determinism confidence: high. Estimated token savings: 200-400 per headless invocation. Implementation complexity: moderate. Language: python. Could be prepass: yes. Feeds scanner: n/a. Reusable across skills: yes (headless dispatch pattern). Help pattern savings: ~100 tokens. The Activation Mode Detection section (lines 20-38) describes parsing --headless flags, determining sub-modes (from-profile, custom, refine, migrate), applying defaults for omitted parameters, and generating structured JSON errors for missing required inputs. All of this is deterministic dispatch logic -- flag parsing, default application, and required-field validation.", "action": "Create scripts/headless-dispatch.py that parses --headless flags, determines the sub-mode, applies defaults (model=v4.5-all, creativity=balanced, wild_card=false), validates required inputs per sub-mode, and outputs either a structured JSON input object for the LLM or a JSON error object. The LLM would receive pre-validated, normalized input instead of doing the parsing itself.", "impact": "", "extra": {}, "selectable": true, "action_type": "create-script"}, {"id": "structure-000", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "frontmatter", "file": "SKILL.md", "line": 1, "title": "Name does not follow standard agent naming pattern", "description": "Name \"bmad-suno-style-prompt-builder\" does not follow bmad-{code}-agent-{name} or bmad-agent-{name} pattern. This is a pre-pass deterministic finding.", "action": "Evaluate whether this skill intentionally uses a non-agent naming convention (it is a workflow skill, not a persona agent) and document the rationale, or rename to follow the standard pattern.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-007", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "headless-mode", "file": "SKILL.md", "line": 16, "title": "Headless mode is well-documented but lacks a dedicated headless activation prompt", "description": "The Activation Mode Detection section thoroughly documents headless sub-modes (from-profile, custom, refine, migrate), defaults, and error contracts. However, there is no explicit 'wake prompt' or default task that the agent performs when invoked headless without a sub-mode flag — just '--headless with a profile name' falls through to hybrid mode.", "action": "Consider adding explicit documentation for what happens with bare '--headless' (no sub-mode, no profile name) — currently this case appears unhandled.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "structure-008", "scanner": "structure", "section": "structure-capabilities", "type": "issue", "severity": "medium", "rank": 2, "category": "config-header", "file": "README.md", "line": 1, "title": "No config header with language variables found in README.md", "description": "Pre-pass deterministic finding. README.md lacks a config header with language variables.", "action": "Add a config header with language variables to README.md if this prompt file requires configuration.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-006", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "gap", "file": "SKILL.md", "line": null, "title": "No guidance for multi-song batch workflows", "description": "The skill handles one song at a time. For users building an album or EP, generating style prompts for multiple songs in sequence (with shared profile baseline but different per-song directions) would be a natural workflow. The headless modes partially support this via scripting, but there is no explicit batch mode or guidance for maintaining sonic coherence across a set of songs.", "action": "Consider adding a batch/album mode or at least documenting a recommended workflow: 'For album coherence, use the same profile and Persona across songs, vary only song-specific elements. Generate the most representative track first to calibrate your baseline.'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-007", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "gap", "file": "SKILL.md", "line": null, "title": "Cover feature mentioned in references but not in skill workflow steps", "description": "The model-prompt-strategies.md reference file documents Cover feature behavior and its commercial use restriction, but the SKILL.md workflow steps do not include a path for building cover-style prompts. A user asking 'build me a cover prompt' would not find a clear workflow step for it. The skill's activation triggers in bmad-manifest.json also do not mention covers.", "action": "Either add a headless sub-mode (--headless:cover) and a brief workflow path for cover prompts, or explicitly scope covers out in the SKILL.md overview with a note pointing users to the reference for manual cover prompting.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "agent-cohesion-011", "scanner": "agent-cohesion", "section": "cohesion", "type": "issue", "severity": "low", "rank": 3, "category": "misalignment", "file": "bmad-manifest.json", "line": null, "title": "Manifest capability name 'build-style-prompt' understates the full output", "description": "The manifest lists a single capability 'build-style-prompt' with description mentioning 'style prompt package with exclusion prompt and slider recommendations.' The skill actually produces four distinct outputs (style prompt, exclusion prompt, slider recommendations, wild card variant) and supports five headless sub-modes plus interactive mode. The single capability entry is technically correct but undersells the skill's breadth. Users scanning the manifest might not realize this skill also handles prompt migration, refinement, and cover guidance.", "action": "Consider whether the manifest should list sub-capabilities or at minimum expand the description to mention migration and refinement modes, since these are distinct user intents that route to this skill.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "enhancement-opportunities-010", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "journey-friction", "file": "SKILL.md", "line": 43, "title": "bmad-init config failure silently degrades the greeting but not the workflow context", "description": "The fallback when bmad-init is unavailable handles greeting and language gracefully, but does not address other config values that downstream steps might expect (e.g., default model preferences, output directories, tier information). If bmad-init provides tier info that Step 1 uses for tier detection, the fallback only covers greeting/language, creating a hidden dependency gap.", "action": "Audit what bmad-init provides beyond user_name and communication_language. If tier, default model, or output paths come from config, add explicit fallbacks for each in the On Activation fallback block.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-012", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "edge-case", "file": "SKILL.md", "line": null, "title": "User who changes model mid-refinement gets a full rebuild instead of a targeted reformat", "description": "Step 6 says 'model changes affect style prompt formatting' and loops back to the relevant step. But changing from v4.5-all to v5 Pro is not just a formatting change -- it is a fundamental prompt philosophy change (conversational to film-brief). The current flow treats this like any other refinement, but the user experience should acknowledge this is a significant transformation, not a tweak. The user might not realize their 800-character conversational prompt will become a 200-character film brief.", "action": "When the user requests a model change, preview the impact before rebuilding: 'Switching to v5 Pro means rewriting from conversational style to crisp film-brief -- your prompt will get much shorter and more evocative. The musical intent stays the same. Ready?' This sets expectations and avoids surprise when the output looks radically different.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-013", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "assumption-risk", "file": "SKILL.md", "line": null, "title": "Skill assumes user understands Suno's UI fields and where to paste each output", "description": "The output includes 'Style Prompt,' 'Exclude Styles,' and slider recommendations as separate sections. But a first-timer may not know where these go in Suno's interface. The copy-ready blocks help with the what but not the where. A user who pastes the exclusion prompt into the style prompt field (a common mistake) would get the opposite of what they intended.", "action": "Add a brief parenthetical after each copy-ready section for first-timers: 'Copy-Ready: Style Prompt (paste into Suno's \"Style of Music\" field)' and 'Copy-Ready: Exclude Styles (paste into Suno's \"Exclude Styles\" field -- Pro/Premier only).' Zero cost for experts, prevents the most common first-timer mistake.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "enhancement-opportunities-015", "scanner": "enhancement-opportunities", "section": "creative", "type": "enhancement", "severity": "low-opportunity", "rank": 3, "category": "delight-opportunity", "file": "scripts/validate-prompt.py", "line": null, "title": "Validation script could check for known genre trigger words from model-prompt-strategies.md", "description": "The validate-prompt.py script checks character limits, critical zone, front-loading, metatag contamination, and asterisks. But it does not check for known dangerous words (baroque, orchestral, cinematic, metal without vocal guidance) that are documented in model-prompt-strategies.md. These are the most impactful prompt quality issues -- a prompt that passes all structural checks can still produce terrible results because it contains 'baroque.'", "action": "Add an optional --check-triggers flag to validate-prompt.py that loads the known trigger words from model-prompt-strategies.md (or a hardcoded subset) and warns when they appear without mitigating context. Example: warn if 'metal' appears without any vocal descriptor, or if 'baroque' appears at all.", "impact": "", "extra": {}, "selectable": true, "action_type": "enhance"}, {"id": "execution-efficiency-000", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "low", "rank": 3, "category": "parallelization", "file": "SKILL.md", "line": 62, "title": "Band profile read and model-prompt-strategies read could overlap", "description": "Step 1 reads the band profile from docs/band-profiles/{name}.yaml, and Step 2 reads references/model-prompt-strategies.md. These are currently sequential across steps. However, model selection often depends on the profile's model_preference field (line 65), creating a soft dependency. The savings would be minimal (one file read latency, ~1-2 seconds) and only applies when the user provides the model upfront.", "action": "Consider loading model-prompt-strategies.md eagerly in Step 1 alongside the band profile read when the model is already known. When model depends on profile, the current sequential order is correct.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "execution-efficiency-001", "scanner": "execution-efficiency", "section": "efficiency", "type": "issue", "severity": "low", "rank": 3, "category": "batching", "file": "SKILL.md", "line": 100, "title": "Reference track web search and model strategy load could be batched", "description": "In Step 2, the skill loads model-prompt-strategies.md (line 84) and may perform web searches for reference track decomposition (line 100). These are independent operations when both are needed. Batching saves one round-trip (~2-3 seconds). Only applies when the user provides reference tracks.", "action": "When reference tracks are provided in Step 1, batch the web search for artist/song decomposition with the model-prompt-strategies.md read in a single tool-call message at the start of Step 2.", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-003", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "token-waste", "file": "SKILL.md", "line": 117, "title": "Instrument bleed-through section is lengthy for SKILL.md", "description": "Lines 117-123 (Step 2, item 10) contain 7 lines of detailed guidance on instrument ordering and bleed-through, including a specific DAW workflow recommendation. While this is genuinely useful domain knowledge, it reads more like reference material than workflow instruction. The core instruction ('warn the user about global instrument palette') could be stated in 2 lines with the details in the reference file.", "action": "Consider extracting the detailed instrument bleed-through guidance (lines 117-123) to references/model-prompt-strategies.md under a new 'Instrument Bleed-Through' section, and replacing with a brief directive in SKILL.md: 'Warn the user that style prompt instruments bleed into ALL sections (see Instrument Bleed-Through in model-prompt-strategies.md for workaround guidance).'", "impact": "", "extra": {}, "selectable": true, "action_type": "fix"}, {"id": "prompt-craft-004", "scanner": "prompt-craft", "section": "prompt-craft", "type": "issue", "severity": "low", "rank": 3, "category": "token-waste", "file": "SKILL.md", "line": 160, "title": "Slider ranges duplicated between SKILL.md and reference file", "description": "Step 4 (lines 160-191) contains Weirdness, Style Influence, and Audio Influence slider ranges. The reference file (model-prompt-strategies.md lines 241-296) contains a more detailed and nuanced version of the same information with song-type-specific recommendations. The SKILL.md version is simpler but overlaps substantially.", "action": "This duplication is borderline acceptable because SKILL.md provides the 'quick answer' while the reference provides song-type specifics. If token budget is a concern, SKILL.md Step 4 could reference the detailed table and keep only the creativity-mode ranges.", "impact": "", "extra": {}, "selectable": tru now which Suno model they want to use or can choose when asked"]}, "top_insights": [{"title": "The model-prompt-strategies reference is a goldmine that the interactive workflow barely mines", "detail": "Production-tested knowledge about genre triggers, dangerous words, vocal behavior, and instrument limitations sits in a reference file that is only consulted during prompt construction. The skill never proactively warns users about known Suno pitfalls based on their input. A user requesting 'progressive metal' will get Dream Theater shred without warning; a user including 'baroque' will get keyboard soup. The reference material could power an active quality gate rather than serving as passive background knowledge.", "action": "Add a 'gotchas check' substep that scans the constructed prompt against known genre triggers and dangerous words, proactively warning the user before presenting the final output. This transforms the reference from a build-time resource into a quality assurance layer."}, {"title": "Version tracking across refinement iterations would transform the experience for power users", "detail": "The refinement loop is the most-used part of the skill for serious users, but each iteration is ephemeral. After 3-4 rounds, users cannot compare variants, revert to earlier versions, or see what changed. Numbering versions and offering a summary at session end would make the refinement loop an exploration tool rather than a replacement cycle.", "action": "Number each prompt version, note what changed, and offer a collected summary of all versions at session end."}, {"title": "Soft gate elicitation would draw out richer creative direction from users", "detail": "The input gathering phase uses a structured checklist approach. Adding 'anything else or shall we move on?' pauses at natural transitions would draw out the best creative direction -- the kind users have but do not know to volunteer. This is the single highest-leverage conversational pattern missing from the skill.", "action": "Insert soft gates after initial genre/mood gathering and after model/creativity selection. These two pauses alone would meaningfully increase the creative richness of user input."}], "prompt_health": {"total_prompts": 1, "prompts_with_config_header": 0, "prompts_with_progression": 0}, "skillmd_assessment": {"overview_quality": "appropriate", "progressive_disclosure": "good", "persona_context": "appropriate", "notes": "SKILL.md is well-crafted for a domain-expert skill. The overview efficiently establishes mission, domain context, and design rationale. Progressive disclosure is properly implemented with model-prompt-strategies.md handling the heavy reference material. At 262 lines / ~5074 tokens, it is at the upper boundary but justified by the complexity of the workflow (6 steps, headless modes, tier-aware logic). Minor opportunities exist to extract instrument bleed-through details and reduce slider duplication."}}, "section_labels": {"structural": "Structural", "structure-capabilities": "Structure & Capabilities", "prompt-craft": "Prompt Craft", "efficiency": "Efficiency", "cohesion": "Cohesion", "quality": "Path & Script Standards", "scripts": "Scripts", "script-opportunities": "Script Opportunities", "creative": "Creative & Enhancements"}}</script>
<script>
const DATA = JSON.parse(document.getElementById('report-data').textContent);
const selected = new Set();

function init() {
  const m = DATA.meta;
  const es = DATA.executive_summary;
  document.getElementById('skill-name').textContent = m.skill_name;
  document.getElementById('subtitle').textContent = `${m.skill_path} \u2022 ${m.timestamp.split('T')[0]} \u2022 ${m.scanner_count} scanners`;

  // Executive summary
  let html = `<div class="grade grade-${es.grade}">${es.grade}</div>`;
  html += `<dl class="summary-grid">`;
  html += `<dt>Issues</dt><dd>${es.total_issues} total \u2014 ${es.counts.critical} critical, ${es.counts.high} high, ${es.counts.medium} medium, ${es.counts.low} low</dd>`;
  if (es.enhancement_count) html += `<dt>Enhancements</dt><dd>${es.enhancement_count} opportunities identified</dd>`;
  if (es.strength_count) html += `<dt>Strengths</dt><dd>${es.strength_count} noted</dd>`;
  if (es.craft_assessment) html += `<dt>Craft</dt><dd>${esc(es.craft_assessment)}</dd>`;
  if (es.overall_cohesion) html += `<dt>Cohesion</dt><dd>${esc(es.overall_cohesion)}</dd>`;
  html += `</dl>`;
  document.getElementById('exec-summary').innerHTML = html;

  // Severity filters
  renderFilters();

  // Sections
  renderSections();
}

// --- Severity filters ---
const activeFilters = new Set(['critical','high','medium','low','high-opportunity','medium-opportunity','low-opportunity','strength','suggestion','note','info']);

function renderFilters() {
  const counts = {};
  DATA.items.forEach(i => { counts[i.severity] = (counts[i.severity]||0) + 1; });
  const order = ['critical','high','medium','low','high-opportunity','medium-opportunity','low-opportunity','strength','suggestion','note'];
  let html = '';
  order.forEach(s => {
    if (!counts[s]) return;
    const active = activeFilters.has(s) ? 'active' : '';
    html += `<span class="badge badge-${s} ${active}" data-sev="${s}" onclick="toggleFilter('${s}')">${s.replace('-',' ')} ${counts[s]}</span>`;
  });
  document.getElementById('filters').innerHTML = html;
}

function toggleFilter(sev) {
  if (activeFilters.has(sev)) activeFilters.delete(sev); else activeFilters.add(sev);
  renderFilters();
  renderSections();
}

// --- Sections ---
function renderSections() {
  const groups = {};
  const sectionOrder = ['structural','structure-capabilities','prompt-craft','cohesion','efficiency','quality','scripts','script-opportunities','creative'];

  DATA.items.forEach(i => {
    if (!activeFilters.has(i.severity)) return;
    const s = i.section;
    if (!groups[s]) groups[s] = [];
    groups[s].push(i);
  });

  // Truly broken (always first, always open)
  const broken = DATA.items.filter(i => i.type === 'issue' && (i.severity === 'critical' || i.severity === 'high'));
  const brokenIds = new Set(broken.map(i => i.id));
  // Strengths
  const strengths = DATA.items.filter(i => i.type === 'strength' && activeFilters.has(i.severity));

  let html = '';

  if (broken.length) {
    html += renderSection('truly-broken', `Truly Broken / Missing (${broken.length})`, broken, true);
  }
  if (strengths.length) {
    html += renderSection('strengths', `Strengths (${strengths.length})`, strengths, false);
  }

  sectionOrder.forEach(sec => {
    // Exclude strengths (shown above) and items already in Truly Broken
    const items = (groups[sec] || []).filter(i => i.type !== 'strength' && !brokenIds.has(i.id));
    if (!items.length) return;
    const label = DATA.section_labels[sec] || sec;
    html += renderSection(sec, `${label} (${items.length})`, items, false);
  });

  // User journeys
  if (DATA.journeys.length) {
    html += renderJourneysSection();
  }

  // Assessments
  if (Object.keys(DATA.assessments).length) {
    html += renderAssessmentsSection();
  }

  document.getElementById('sections').innerHTML = html;
}

function renderSection(id, label, items, startOpen) {
  const openCls = startOpen ? 'open' : '';
  let html = `<div class="section"><div class="section-header ${openCls}" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">${label}</span>`;
  html += `</div><div class="section-body ${openCls}">`;
  items.forEach(i => { html += renderItem(i); });
  html += `</div></div>`;
  return html;
}

function renderItem(item) {
  const isStrength = item.type === 'strength';
  const chk = item.selectable ? `<input type="checkbox" class="item-check" data-id="${item.id}" ${selected.has(item.id)?'checked':''} onchange="toggleSelect('${item.id}', this.checked)">` : '';
  const sev = `<span class="badge badge-${item.severity}">${item.severity.replace('-',' ')}</span>`;
  const file = item.file ? `<span class="item-file">${esc(item.file)}${item.line ? ':'+item.line : ''}</span>` : '';
  const desc = item.description && item.description !== item.title ? `<div class="item-desc">${esc(item.description)}</div>` : '';
  // Suppress action/impact for strengths — "N/A" is noise
  const actionText = item.action && !isStrength && item.action !== 'N/A' ? item.action : '';
  const action = actionText ? `<div class="item-action"><strong>${item.action_type === 'fix' ? 'Fix' : item.action_type === 'create-script' ? 'Script' : 'Suggestion'}:</strong> ${esc(actionText)}</div>` : '';
  const impactText = item.impact && !isStrength && item.impact !== 'N/A' ? item.impact : '';
  const impact = impactText ? `<div class="item-impact">Impact: ${esc(impactText)}</div>` : '';
  const copyBtn = item.selectable ? `<button class="copy-btn" onclick="copySinglePrompt('${item.id}')" title="Copy prompt for this item">\u2398</button>` : '';

  return `<div class="item">${chk}<div class="item-body">${sev} ${file}<div class="item-title">${esc(item.title)}</div>${desc}${action}${impact}</div><div class="item-actions">${copyBtn}</div></div>`;
}

function renderJourneysSection() {
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">User Journeys (${DATA.journeys.length})</span>`;
  html += `</div><div class="section-body">`;
  DATA.journeys.forEach(j => {
    html += `<div class="journey"><h4>${esc(j.archetype)}</h4>`;
    html += `<p>${esc(j.journey_summary)}</p>`;
    if (j.friction_points && j.friction_points.length) {
      html += `<ul class="friction">`;
      j.friction_points.forEach(fp => { html += `<li>${esc(fp)}</li>`; });
      html += `</ul>`;
    }
    if (j.bright_spots && j.bright_spots.length) {
      html += `<ul class="bright">`;
      j.bright_spots.forEach(bs => { html += `<li>${esc(bs)}</li>`; });
      html += `</ul>`;
    }
    html += `</div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderAssessmentsSection() {
  let html = `<div class="section"><div class="section-header" onclick="toggleSection(this)">`;
  html += `<span class="arrow">\u25B6</span><span class="label">Assessments & Analysis</span>`;
  html += `</div><div class="section-body">`;

  const ca = DATA.assessments.cohesion_analysis;
  if (ca) {
    html += `<div class="assessment"><h4>Cohesion Analysis</h4><table><tr><th>Dimension</th><th>Score</th><th>Notes</th></tr>`;
    Object.entries(ca).forEach(([dim, val]) => {
      if (typeof val === 'object' && val.score) {
        html += `<tr><td>${esc(dim.replace(/_/g, ' '))}</td><td>${esc(val.score)}</td><td>${esc(val.notes || '')}</td></tr>`;
      }
    });
    html += `</table></div>`;
  }

  const aa = DATA.assessments.autonomous_assessment;
  if (aa) {
    html += `<div class="assessment"><h4>Autonomous Readiness</h4><table>`;
    html += `<tr><td>Overall Potential</td><td>${esc(aa.potential||aa.overall_potential||'')}</td></tr>`;
    html += `<tr><td>HITL Points</td><td>${aa.hitl_points||aa.hitl_interaction_points||0}</td></tr>`;
    html += `<tr><td>Auto-Resolvable</td><td>${aa.auto_resolvable||0}</td></tr>`;
    html += `<tr><td>Needs Input</td><td>${aa.needs_input||0}</td></tr>`;
    if (aa.notes) html += `<tr><td>Notes</td><td>${esc(aa.notes)}</td></tr>`;
    html += `</table></div>`;
  }

  const ti = DATA.assessments.top_insights;
  if (ti && ti.length) {
    html += `<div class="assessment"><h4>Top Insights</h4>`;
    ti.forEach(t => {
      const tiTitle = t.title || t.insight || '';
      const tiDetail = t.detail || t.why_it_matters || '';
      const tiAction = t.action || t.suggestion || '';
      html += `<div style="margin:0.5rem 0"><strong>${esc(tiTitle)}</strong>`;
      if (tiDetail) html += `<br><em>Context:</em> ${esc(tiDetail)}`;
      if (tiAction) html += `<br><em>Suggestion:</em> ${esc(tiAction)}`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

// --- Interactions ---
function toggleSection(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function toggleSelect(id, checked) {
  if (checked) selected.add(id); else selected.delete(id);
  document.getElementById('sel-count').textContent = selected.size;
  document.getElementById('footer').classList.toggle('hidden', selected.size === 0);
}

// --- Prompt Generation ---
function itemById(id) { return DATA.items.find(i => i.id === id); }

function buildPromptForItem(item) {
  let p = '';
  const sev = item.severity.replace('-', ' ').toUpperCase();
  const loc = item.file ? `${item.file}${item.line ? ':'+item.line : ''}` : '';
  p += `**[${sev}] ${item.title}**\n`;
  if (loc) p += `- File: ${loc}\n`;
  if (item.description && item.description !== item.title) p += `- Context: ${item.description}\n`;
  if (item.action) {
    const label = item.action_type === 'fix' ? 'Fix' : item.action_type === 'create-script' ? 'Create script' : 'Suggestion';
    p += `- ${label}: ${item.action}\n`;
  }
  if (item.impact) p += `- Impact: ${item.impact}\n`;
  return p;
}

function buildPrompt(ids) {
  const items = ids.map(itemById).filter(Boolean);
  const fixes = items.filter(i => i.action_type === 'fix');
  const scripts = items.filter(i => i.action_type === 'create-script');
  const enhancements = items.filter(i => i.action_type === 'enhance' || i.action_type === 'refactor');

  let prompt = `## Task: Quality Improvements for ${DATA.meta.skill_name}\nSkill path: ${DATA.meta.skill_path}\n\n`;

  if (fixes.length) {
    prompt += `### Fix These Issues (${fixes.length})\n\n`;
    fixes.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  if (scripts.length) {
    prompt += `### Create These Scripts (${scripts.length})\n\n`;
    scripts.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  if (enhancements.length) {
    prompt += `### Implement These Enhancements (${enhancements.length})\n\n`;
    enhancements.forEach((item, i) => { prompt += `${i+1}. ${buildPromptForItem(item)}\n`; });
  }
  return prompt.trim();
}

function copySinglePrompt(id) {
  const item = itemById(id);
  if (!item) return;
  let prompt = `## Task: Quality Fix for ${DATA.meta.skill_name}\nSkill path: ${DATA.meta.skill_path}\n\n`;
  prompt += buildPromptForItem(item);
  navigator.clipboard.writeText(prompt).then(() => {
    const btn = document.querySelector(`[onclick="copySinglePrompt('${id}')"]`);
    if (btn) { btn.classList.add('copied'); btn.textContent = '\u2713'; setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '\u2398'; }, 1500); }
  });
}

function showBatchPrompt() {
  const prompt = buildPrompt([...selected]);
  document.getElementById('modal-content').textContent = prompt;
  document.getElementById('modal').classList.add('visible');
}

function closeModal() { document.getElementById('modal').classList.remove('visible'); }

function copyModal() {
  const text = document.getElementById('modal-content').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.modal-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; }, 1500);
  });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

init();
</script>
</body>
</html>
